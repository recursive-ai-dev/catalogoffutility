<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deterministic Conversational Engine</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --void: #0a0a0c;
    --deep: #12121a;
    --surface: #1a1a26;
    --border: #2a2a36;
    --text-primary: #c8c8d4;
    --text-dim: #6a6a7a;
    --text-bright: #e8e8f0;
    --accent-bleak: #4a6fa5;
    --accent-hostile: #8e4a4a;
    --accent-neutral: #6a7a6a;
    --trace-bg: #0f0f15;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--void);
    color: var(--text-primary);
    font-family: 'Garamond', 'Georgia', serif;
    font-size: 16px;
    line-height: 1.6;
  }

  #app {
    display: flex;
    height: 100%;
    flex-direction: column;
  }

  #header {
    padding: 1rem 1.5rem;
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #header h1 {
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #controls {
    display: flex;
    gap: 0.5rem;
  }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 1rem;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  button:hover {
    border-color: var(--accent-bleak);
    color: var(--text-bright);
  }

  button:active {
    transform: scale(0.98);
  }

  button.active {
    background: var(--surface);
    border-color: var(--accent-bleak);
    color: var(--text-bright);
  }

  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  #messages::-webkit-scrollbar {
    width: 4px;
  }

  #messages::-webkit-scrollbar-track {
    background: transparent;
  }

  #messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .message {
    display: flex;
    gap: 1rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .message .avatar {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .message.user .avatar {
    background: var(--deep);
  }

  .message .content {
    flex: 1;
    max-width: 70%;
  }

  .message .bubble {
    background: var(--surface);
    padding: 1rem 1.25rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    word-wrap: break-word;
  }

  .message.user .bubble {
    background: var(--deep);
    text-align: right;
  }

  .message .meta {
    margin-top: 0.25rem;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    opacity: 0.5;
    padding: 0 0.25rem;
  }

  .message.user .meta {
    text-align: right;
  }

  .message.system .bubble {
    background: var(--trace-bg);
    border-color: var(--accent-bleak);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--text-dim);
  }

  #input-zone {
    padding: 1.5rem;
    background: linear-gradient(to top, var(--deep) 60%, transparent);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-container {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 0.75rem 1rem;
    font-family: 'Garamond', 'Georgia', serif;
    font-size: 1rem;
    resize: vertical;
    min-height: 2.5rem;
    max-height: 8rem;
    border-radius: 0.25rem;
    outline: none;
    transition: border-color 0.3s ease;
  }

  #user-input:focus {
    border-color: var(--accent-bleak);
  }

  #send-btn {
    padding: 0.75rem 1.5rem;
    height: 2.5rem;
  }

  #trace-panel {
    width: 0;
    overflow: hidden;
    background: var(--trace-bg);
    border-left: 1px solid var(--border);
    transition: width 0.3s ease;
    display: flex;
    flex-direction: column;

    width: 400px;
  }

    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  #trace-content {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.75rem;
    line-height: 1.8;
    color: var(--text-dim);

    width: 4px;
  }

  #trace-content::-webkit-scrollbar-track {
    background: transparent;
  }

  #trace-content::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .trace-section {
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .trace-section:last-child {
    border-bottom: none;
  }

  .trace-title {
    color: var(--accent-bleak);
    margin-bottom: 0.5rem;
    font-weight: bold;
  }

  .trace-item {
    padding-left: 1rem;
    margin-top: 0.25rem;
  }

  .trace-score {
    color: var(--accent-neutral);
  }

  .trace-winner {
    color: var(--text-bright);
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 12, 0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal.open {
    display: flex;
  }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 2rem;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;

  .modal-content h2 {
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    color: var(--text-bright);
  }

  .modal-content textarea {
    width: 100%;
    min-height: 300px;
    background: var(--trace-bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 1rem;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.75rem;
    border-radius: 0.25rem;
    resize: vertical;
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    justify-content: flex-end;

  .status-bar {
    padding: 0.5rem 1.5rem;
    background: var(--trace-bg);
    border-top: 1px solid var(--border);
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;

  .status-item {
    display: flex;
    gap: 1.5rem;

  .status-item span {

    #trace-panel.open {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      z-index: 100;
    }
  }

// ─── Utilities ───

function stableHash(str) {
  // Simple FNV-1a hash for deterministic number generation
  let hash = 2166136261;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return Math.abs(hash >>> 0);
}

function pickDeterministic(list, key) {
  if (!list || list.length === 0) return undefined;
  const hash = stableHash(key);
  return list[hash % list.length];
}

function tokenize(text) {
  return text
    .toLowerCase()
    .replace(/[^\w\s']/g, ' ')
    .split(/\s+/)
    .filter(t => t.length > 0);
}

function simpleStem(word) {
  // Basic stemming: remove common suffixes
  return word
    .replace(/ing$/, '')
    .replace(/ed$/, '')
    .replace(/s$/, '')
    .replace(/ly$/, '')
    .replace(/ness$/, '')
    .replace(/ment$/, '');
}

function sanitizeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function extractPlayerName(text) {
  // Patterns: "I'm X", "I am X", "call me X", "my name is X"
  const patterns = [
    /(?:i'?m|i am|call me|my name is|name'?s)\s+([a-z]+)/i,
    /^([a-z]+)$/i // single word fallback
  ];
  
  for (const pattern of patterns) {
    const match = text.match(pattern);
    if (match && match[1] && match[1].length > 1) {
      return match[1].charAt(0).toUpperCase() + match[1].slice(1).toLowerCase();
    }
  }
  return null;
}

// ─── Conversation State (Model) ───

class ConversationState {
  constructor() {
    this.history = []; // Array of {role, text, timestamp}
    this.turnCount = 0;
    this.playerName = "stranger";
    this.mood = 50; // 0-100
    this.suspicion = 50; // 0-100
    this.openLoops = [];
    this.lastIntent = null;
    this.lastEntities = {};
    this.tone = 'bleak'; // bleak, neutral, hostile
  }
  
  addMessage(role, text) {
    this.history.push({
      role,
      text,
      timestamp: Date.now()
    });
    
    if (role === 'user') {
      this.turnCount++;
    }
  }
  
  updateMetrics(moodDelta, suspicionDelta) {
    this.mood = Math.max(0, Math.min(100, this.mood + moodDelta));
    this.suspicion = Math.max(0, Math.min(100, this.suspicion + suspicionDelta));
  }
  
  setPlayerName(name) {
    if (name && name.length > 0) {
      this.playerName = name;
    }
  }
  
  addOpenLoop(loop) {
    if (this.openLoops.length < 5) {
      this.openLoops.push(loop);
    }
  }
  
  setTone(tone) {
    if (['bleak', 'neutral', 'hostile'].includes(tone)) {
      this.tone = tone;
    }
  }
  
  cycleTone() {
    const tones = ['bleak', 'neutral', 'hostile'];
    const currentIndex = tones.indexOf(this.tone);
    this.tone = tones[(currentIndex + 1) % tones.length];
    return this.tone;
  }
  
  toJSON() {
    return {
      history: this.history,
      turnCount: this.turnCount,
      playerName: this.playerName,
      mood: this.mood,
      suspicion: this.suspicion,
      openLoops: this.openLoops,
      lastIntent: this.lastIntent,
      lastEntities: this.lastEntities,
      tone: this.tone,
      version: '1.0'
    };
  }
  
  static fromJSON(data) {
    const state = new ConversationState();
    Object.assign(state, data);
    return state;
  }
  
  reset() {
    this.history = [];
    this.turnCount = 0;
    this.playerName = "stranger";
    this.mood = 50;
    this.suspicion = 50;
    this.openLoops = [];
    this.lastIntent = null;
    this.lastEntities = {};
    this.tone = 'bleak';
  }
  
  getConversationHistory() {
    return this.history.map(h => `${h.role}: ${h.text}`).join('\n');
  }
}

// ─── Rules Engine ───

class RulesEngine {
  constructor(bank) {
    this.bank = bank;
    this.trace = {};
  }
  
  classifyIntent(text, state) {
    this.trace = {};
    this.trace.input = text;
    this.trace.tokens = tokenize(text);
    this.trace.scores = {};
    
    const tokens = tokenize(text);
    const stems = tokens.map(simpleStem);
    
    const scores = {};
    
    // Score each intent
    for (const [intentName, intentDef] of Object.entries(this.bank.intents)) {
      let score = 0;
      const matches = [];
      
      // Keyword matching
      for (const {word, weight} of intentDef.keywords) {
        const stemmedKeyword = simpleStem(word);
        if (stems.includes(stemmedKeyword)) {
          score += weight;
          matches.push({type: 'keyword', word, weight});
        }
      }
      
      // Pattern matching
      for (const pattern of intentDef.patterns) {
        if (pattern.test(text)) {
          score += 10;
          matches.push({type: 'pattern', pattern: pattern.toString(), weight: 10});
        }
      }
      
      scores[intentName] = score;
      this.trace.scores[intentName] = {score, matches};
    }
    
    // Determine winner (deterministic tie-breaking by alphabetical order)
    const sorted = Object.entries(scores).sort((a, b) => {
      if (b[1] !== a[1]) return b[1] - a[1]; // Higher score first
      return a[0].localeCompare(b[0]); // Alphabetical for ties
    });
    
    const winner = sorted[0][1] > 0 ? sorted[0][0] : 'help';
    
    this.trace.winner = winner;
    this.trace.winnerScore = sorted[0][1];
    this.trace.sortedScores = sorted;
    
    return winner;
  }
  
  extractEntities(text, state) {
    const entities = {};
    
    // Extract player name
    const name = extractPlayerName(text);
    if (name) {
      entities.playerName = name;
      this.trace.extractedName = name;
    }
    
    // Extract places/objects from word banks
    const tokens = tokenize(text);
    for (const token of tokens) {
      if (this.bank.wordBanks.streetObjects.includes(token)) {
        entities.streetObject = token;
      }
    }
    
    this.trace.entities = entities;
    return entities;
  }
  
  fillTemplate(template, state) {
    this.trace.template = template;
    this.trace.slots = {};
    
    const slots = {};
    
    // Deterministic slot filling based on conversation history
    const historyKey = state.getConversationHistory();
    
    slots.playerName = state.playerName;
    
    // Mood word
    const moodWords = state.mood > 70 ? ['bright', 'hopeful', 'warm'] :
                       state.mood < 30 ? ['bleak', 'heavy', 'cold'] :
                       ['grey', 'neutral', 'still'];
    slots.moodWord = pickDeterministic(moodWords, historyKey + 'mood');
    
    // Street object
    slots.streetObject = pickDeterministic(this.bank.wordBanks.streetObjects, historyKey + 'street');
    
    // Weather
    slots.weatherWord = pickDeterministic(this.bank.wordBanks.weatherWords, historyKey + 'weather');
    
    // Time
    slots.timeWord = pickDeterministic(this.bank.wordBanks.timeWords, historyKey + 'time');
    
    // Lore hint
    slots.loreHint = pickDeterministic(this.bank.loreSnippets, historyKey + 'lore');
    
    // Open loop
    slots.openLoop = pickDeterministic(this.bank.openLoops, historyKey + 'loop');
    
    // Echo (repeat last user input word)
    if (state.history.length > 0) {
      const lastUserMsg = state.history.filter(h => h.role === 'user').pop();
      if (lastUserMsg) {
        const words = tokenize(lastUserMsg.text).filter(w => w.length > 3);
        slots.echo = pickDeterministic(words, historyKey + 'echo') || 'nothing';
      }
    }
    
    this.trace.slots = slots;
    
    // Replace slots in template
    let filled = template;
    for (const [key, value] of Object.entries(slots)) {
      filled = filled.replace(new RegExp(`\\{${key}\\}`, 'g'), value);
    }
    
    this.trace.filled = filled;
    return filled;
  }
  
  generateResponse(intent, state) {
    this.trace.intent = intent;
    this.trace.tone = state.tone;
    
    // Get templates for intent and tone
    const templates = this.bank.templates[intent];
    if (!templates) {
      return "I don't understand.";
    }
    
    const toneTemplates = templates[state.tone] || templates.bleak;
    
    // Pick template deterministically
    const historyKey = state.getConversationHistory();
    const template = pickDeterministic(toneTemplates, historyKey + intent);
    
    this.trace.selectedTemplate = template;
    
    // Fill template
    const response = this.fillTemplate(template, state);
    
    return response;
  }
  
  updateState(intent, entities, state) {
    this.trace.stateChanges = {};
    
    // Update player name if extracted
    if (entities.playerName) {
      state.setPlayerName(entities.playerName);
      this.trace.stateChanges.playerName = entities.playerName;
    }
    
    // Mood adjustments based on intent
    const moodMap = {
      greeting: 5,
      help: -2,
      name_intent: 3,
      status_check: -1,
      ask_world: -3,
      ask_self: -5,
      hostility: -10,
      goodbye: 0
    };
    
    const moodDelta = moodMap[intent] || 0;
    const suspicionDelta = intent === 'hostility' ? 10 : -1;
    
    state.updateMetrics(moodDelta, suspicionDelta);
    
    this.trace.stateChanges.mood = `${state.mood} (${moodDelta >= 0 ? '+' : ''}${moodDelta})`;
    this.trace.stateChanges.suspicion = `${state.suspicion} (${suspicionDelta >= 0 ? '+' : ''}${suspicionDelta})`;
    
    // Add open loop occasionally
    if (state.turnCount % 3 === 0) {
      const loop = pickDeterministic(this.bank.openLoops, state.getConversationHistory());
      state.addOpenLoop(loop);
      this.trace.stateChanges.openLoopAdded = loop;
    }
    
    state.lastIntent = intent;
    state.lastEntities = entities;
  }
  
  getTrace() {
    return this.trace;
  }
}

// ─── Presenter (Orchestrator) ───

class ConversationPresenter {
  constructor() {
    this.state = new ConversationState();
    this.rules = new RulesEngine(CONTENT_BANK);
    
    // Add system greeting
    this.state.addMessage('system', 'You are in a place without certainty. Speak, and the void may answer.');
  }
  
  processInput(userInput) {
    if (!userInput || userInput.trim().length === 0) {
      return null;
    }
    
    // Add user message to history
    this.state.addMessage('user', userInput);
    
    // Classify intent
    const intent = this.rules.classifyIntent(userInput, this.state);
    
    // Extract entities
    const entities = this.rules.extractEntities(userInput, this.state);
    
    // Update state
    this.rules.updateState(intent, entities, this.state);
    
    // Generate response
    const response = this.rules.generateResponse(intent, this.state);
    
    // Add assistant response to history
    this.state.addMessage('assistant', response);
    
    return {
      response,
      trace: this.rules.getTrace()
    };
  }
  
  getState() {
    return this.state;
  }
  
  exportState() {
    return JSON.stringify(this.state.toJSON(), null, 2);
  }
  
  importState(jsonString) {
    try {
      const data = JSON.parse(jsonString);
      this.state = ConversationState.fromJSON(data);
      return true;
    } catch (e) {
      console.error('Import failed:', e);
      return false;
    }
  }
  
  reset() {
    this.state.reset();
    this.state.addMessage('system', 'You are in a place without certainty. Speak, and the void may answer.');
  }
  
  cycleTone() {
    return this.state.cycleTone();
  }
}

// ─── View (UI Renderer) ───

class UIRenderer {
  constructor() {
    this.messagesContainer = document.getElementById('messages');
    this.userInput = document.getElementById('user-input');
    this.sendBtn = document.getElementById('send-btn');
    this.tracePanel = document.getElementById('trace-panel');
    this.traceContent = document.getElementById('trace-content');
    this.traceBtn = document.getElementById('trace-btn');
    this.toneBtn = document.getElementById('tone-btn');
    this.exportBtn = document.getElementById('export-btn');
    this.importBtn = document.getElementById('import-btn');
    this.resetBtn = document.getElementById('reset-btn');
    
    this.statusTurn = document.getElementById('status-turn');
    this.statusMood = document.getElementById('status-mood');
    this.statusSuspicion = document.getElementById('status-suspicion');
    this.statusTone = document.getElementById('status-tone');
    
    this.exportModal = document.getElementById('export-modal');
    this.importModal = document.getElementById('import-modal');
    this.exportTextarea = document.getElementById('export-textarea');
    this.importTextarea = document.getElementById('import-textarea');
  }
  
  renderMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : role === 'system' ? 'S' : 'A';
    
    const content = document.createElement('div');
    content.className = 'content';
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    
    const meta = document.createElement('div');
    meta.className = 'meta';
    const now = new Date();
    meta.textContent = now.toLocaleTimeString();
    
    content.appendChild(bubble);
    content.appendChild(meta);
    
    msg.appendChild(avatar);
    msg.appendChild(content);
    
    this.messagesContainer.appendChild(msg);
    this.scrollToBottom();
  }
  
  scrollToBottom() {
    requestAnimationFrame(() => {
      this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
    });
  }
  
  renderTrace(trace) {
    if (!trace) {
      this.traceContent.innerHTML = '<div class="trace-section">No trace available</div>';
      return;
    }
    
    let html = '';
    
    // Input
    html += '<div class="trace-section">';
    html += '<div class="trace-title">INPUT</div>';
    html += `<div class="trace-item">Raw: "${sanitizeHTML(trace.input)}"</div>`;
    html += `<div class="trace-item">Tokens: [${trace.tokens.map(t => sanitizeHTML(t)).join(', ')}]</div>`;
    html += '</div>';
    
    // Intent Classification
    html += '<div class="trace-section">';
    html += '<div class="trace-title">INTENT CLASSIFICATION</div>';
    for (const [intent, data] of Object.entries(trace.scores)) {
      const isWinner = intent === trace.winner;
      const className = isWinner ? 'trace-winner' : 'trace-score';
      html += `<div class="trace-item ${className}">${intent}: ${data.score}</div>`;
      if (data.matches && data.matches.length > 0) {
        for (const match of data.matches) {
          html += `<div class="trace-item" style="padding-left: 2rem; font-size: 0.7rem;">  → ${match.type}: ${sanitizeHTML(match.word || match.pattern)} (+${match.weight})</div>`;
        }
      }
    }
    html += `<div class="trace-item trace-winner">WINNER: ${trace.winner} (score: ${trace.winnerScore})</div>`;
    html += '</div>';
    
    // Entity Extraction
    if (trace.entities && Object.keys(trace.entities).length > 0) {
      html += '<div class="trace-section">';
      html += '<div class="trace-title">ENTITIES EXTRACTED</div>';
      for (const [key, value] of Object.entries(trace.entities)) {
        html += `<div class="trace-item">${key}: "${sanitizeHTML(value)}"</div>`;
      }
      html += '</div>';
    }
    
    // Template Selection
    html += '<div class="trace-section">';
    html += '<div class="trace-title">RESPONSE GENERATION</div>';
    html += `<div class="trace-item">Intent: ${trace.intent}</div>`;
    html += `<div class="trace-item">Tone: ${trace.tone}</div>`;
    html += `<div class="trace-item">Template: "${sanitizeHTML(trace.selectedTemplate || 'N/A')}"</div>`;
    html += '</div>';
    
    // Slot Filling
    if (trace.slots) {
      html += '<div class="trace-section">';
      html += '<div class="trace-title">SLOT FILLING</div>';
      for (const [key, value] of Object.entries(trace.slots)) {
        html += `<div class="trace-item">{${key}} → "${sanitizeHTML(String(value))}"</div>`;
      }
      html += `<div class="trace-item trace-winner">Final: "${sanitizeHTML(trace.filled || 'N/A')}"</div>`;
      html += '</div>';
    }
    
    // State Changes
    if (trace.stateChanges && Object.keys(trace.stateChanges).length > 0) {
      html += '<div class="trace-section">';
      html += '<div class="trace-title">STATE UPDATES</div>';
      for (const [key, value] of Object.entries(trace.stateChanges)) {
        html += `<div class="trace-item">${key}: ${sanitizeHTML(String(value))}</div>`;
      }
      html += '</div>';
    }
    
    this.traceContent.innerHTML = html;
  }
  
  updateStatus(state) {
    this.statusTurn.textContent = state.turnCount;
    this.statusMood.textContent = state.mood;
    this.statusSuspicion.textContent = state.suspicion;
    this.statusTone.textContent = state.tone;
  }
  
  updateToneButton(tone) {
    this.toneBtn.textContent = `Tone: ${tone.charAt(0).toUpperCase() + tone.slice(1)}`;
  }
  
  toggleTracePanel() {
    this.tracePanel.classList.toggle('open');
    this.traceBtn.classList.toggle('active');
  }
  
  showExportModal(jsonString) {
    this.exportTextarea.value = jsonString;
    this.exportModal.classList.add('open');
  }
  
  hideExportModal() {
    this.exportModal.classList.remove('open');
  }
  
  showImportModal() {
    this.importTextarea.value = '';
    this.importModal.classList.add('open');
  }
  
  hideImportModal() {
    this.importModal.classList.remove('open');
  }
  
  clearMessages() {
    this.messagesContainer.innerHTML = '';
  }
  
  focusInput() {
    this.userInput.focus();
  }
}

// ─── Application Controller ───

class Application {
  constructor() {
    this.presenter = new ConversationPresenter();
    this.view = new UIRenderer();
    
    this.bindEvents();
    this.initialize();
  }
  
  bindEvents() {
    // Send message
    this.view.sendBtn.addEventListener('click', () => this.handleSend());
    this.view.userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.handleSend();
      }
    });
    
    // Trace toggle
    this.view.traceBtn.addEventListener('click', () => {
      this.view.toggleTracePanel();
    });
    
    // Tone toggle
    this.view.toneBtn.addEventListener('click', () => {
      const newTone = this.presenter.cycleTone();
      this.view.updateToneButton(newTone);
      this.view.updateStatus(this.presenter.getState());
    });
    
    // Export
    this.view.exportBtn.addEventListener('click', () => {
      const json = this.presenter.exportState();
      this.view.showExportModal(json);
    });
    
    document.getElementById('copy-export-btn').addEventListener('click', () => {
      this.view.exportTextarea.select();
      document.execCommand('copy');
    });
    
    document.getElementById('close-export-btn').addEventListener('click', () => {
      this.view.hideExportModal();
    });
    
    // Import
    this.view.importBtn.addEventListener('click', () => {
      this.view.showImportModal();
    });
    
    document.getElementById('apply-import-btn').addEventListener('click', () => {
      const json = this.view.importTextarea.value;
      if (this.presenter.importState(json)) {
        this.view.hideImportModal();
        this.reloadConversation();
      } else {
        alert('Invalid JSON format');
      }
    });
    
    document.getElementById('close-import-btn').addEventListener('click', () => {
      this.view.hideImportModal();
    });
    
    // Reset
    this.view.resetBtn.addEventListener('click', () => {
      if (confirm('Reset conversation? This cannot be undone.')) {
        this.presenter.reset();
        this.view.clearMessages();
        this.initialize();
      }
    });
  }
  
  initialize() {
    const state = this.presenter.getState();
    
    // Render initial system message
    for (const msg of state.history) {
      this.view.renderMessage(msg.role, msg.text);
    }
    
    this.view.updateStatus(state);
    this.view.updateToneButton(state.tone);
    this.view.focusInput();
  }
  
  reloadConversation() {
    this.view.clearMessages();
    const state = this.presenter.getState();
    
    for (const msg of state.history) {
      this.view.renderMessage(msg.role, msg.text);
    }
    
    this.view.updateStatus(state);
    this.view.updateToneButton(state.tone);
  }
  
  handleSend() {
    const input = this.view.userInput.value.trim();
    if (!input) return;
    
    // Clear input
    this.view.userInput.value = '';
    
    // Render user message
    this.view.renderMessage('user', input);
    
    // Process
    const result = this.presenter.processInput(input);
    
    if (result) {
      // Render assistant response
      setTimeout(() => {
        this.view.renderMessage('assistant', result.response);
        this.view.renderTrace(result.trace);
        this.view.updateStatus(this.presenter.getState());
      }, 300 + Math.random() * 400);
    }
  }
}

// ─── Initialize ───

document.addEventListener('DOMContentLoaded', () => {
  new Application();
});

</script>
