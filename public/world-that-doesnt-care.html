<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>World That Doesn't Care</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --void: #060608;
  --surface: #0c0c10;
  --grid-line: #14141a;
  --grid-line-faint: #0f0f14;
  --cell-empty: #0a0a0e;
  --cell-hover: #111118;
  --entity: #4a4a5a;
  --entity-glow: #5a5a7020;
  --text-dead: #2a2a35;
  --text-dim: #404055;
  --text-mid: #606078;
  --text-log: #505068;
  --text-cold: #7070a0;
  --text-warn: #a05050;
  --text-fabricate: #705a80;
  --text-aware: #508070;
  --accent-null: #303045;
  --scanline: rgba(255,255,255,0.008);
  --drifter-a: #3a3a48;
  --drifter-b: #2e3a3a;
  --drifter-c: #3a2e36;
  --shadow: #2a2a3a;
  --artifact: #4a4060;
  --whisper: #222230;
  --weather-tint: rgba(0,0,0,0);
  --witness: #3a3248;
  --witness-glow: rgba(80,60,110,0.12);
  --signal-color: #304040;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--void);
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 300;
  font-size: 13px;
  line-height: 1.5;
  cursor: default;
  -webkit-font-smoothing: antialiased;
}

/* ── CRT / atmosphere ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  pointer-events: none; z-index: 9999;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events: none; z-index: 9998;
}

/* ── Weather overlay ── */
#weather-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 9997; opacity: 0;
  transition: opacity 8s ease, background 8s ease; mix-blend-mode: screen;
}
#weather-overlay.static-rain {
  background: repeating-linear-gradient(180deg, transparent 0px, transparent 12px, rgba(60,60,80,0.015) 12px, rgba(60,60,80,0.015) 13px);
  opacity: 1; animation: rain-drift 3s linear infinite;
}
#weather-overlay.interference {
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(80,60,100,0.01) 3px, rgba(80,60,100,0.01) 4px);
  opacity: 1; animation: interference-shift 0.5s steps(4) infinite;
}
#weather-overlay.fog {
  background: radial-gradient(ellipse at 50% 50%, rgba(30,28,40,0.15) 0%, transparent 70%);
  opacity: 1;
}
#weather-overlay.void-wind {
  background: linear-gradient(90deg, transparent 0%, rgba(10,8,16,0.1) 30%, transparent 60%);
  opacity: 1; animation: void-wind-sweep 12s ease-in-out infinite;
}
#weather-overlay.dissolution-haze {
  background: radial-gradient(ellipse at 50% 50%, rgba(20,15,30,0.2) 0%, rgba(5,3,8,0.1) 50%, transparent 80%);
  opacity: 1; animation: haze-breathe 8s ease-in-out infinite;
}
#weather-overlay.ash-fall {
  background: repeating-linear-gradient(160deg, transparent 0px, transparent 20px, rgba(40,35,50,0.012) 20px, rgba(40,35,50,0.012) 21px);
  opacity: 1; animation: ash-drift 8s linear infinite;
}
#weather-overlay.coldfront {
  background: linear-gradient(180deg, rgba(20,20,40,0.08) 0%, transparent 40%, transparent 60%, rgba(20,20,40,0.05) 100%);
  opacity: 1; animation: coldfront-pass 20s ease-in-out infinite;
}

@keyframes rain-drift { 0% { transform: translateY(0); } 100% { transform: translateY(13px); } }
@keyframes interference-shift { 0%{transform:translateX(0)} 25%{transform:translateX(1px)} 50%{transform:translateX(-1px)} 75%{transform:translateX(2px)} 100%{transform:translateX(0)} }
@keyframes void-wind-sweep { 0%,100%{transform:translateX(-10%);opacity:0.6} 50%{transform:translateX(10%);opacity:1} }
@keyframes haze-breathe { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes ash-drift { 0%{transform:translateY(-30px) translateX(0)} 100%{transform:translateY(30px) translateX(10px)} }
@keyframes coldfront-pass { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

/* ── Layout ── */
#container { display:flex; width:100vw; height:100vh; overflow:hidden; }
#world-panel {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; min-width:0;
}
#log-panel {
  width:340px; min-width:340px; height:100vh;
  border-left:1px solid var(--grid-line);
  display:flex; flex-direction:column;
  background:var(--void); position:relative;
}

/* ── Title area ── */
#title-area {
  position:absolute; top:28px; left:0; right:0;
  text-align:center; pointer-events:none; z-index:10;
}
#title-area h1 {
  font-family:'Space Mono',monospace; font-size:11px; font-weight:400;
  letter-spacing:6px; text-transform:uppercase; color:var(--text-dead);
  transition:color 8s ease, opacity 6s ease;
}
#title-area .subtitle {
  font-size:10px; letter-spacing:3px; color:var(--text-dead);
  margin-top:4px; opacity:0.5; transition:opacity 8s ease, color 8s ease;
}
#session-stats {
  font-size:9px; letter-spacing:2px; color:var(--text-dead);
  margin-top:6px; opacity:0; transition:opacity 4s ease;
}

/* ── Grid ── */
#grid-container { position:relative; }
#grid {
  display:grid; gap:1px; background:var(--grid-line-faint);
  border:1px solid var(--grid-line); position:relative;
  transition:transform 4s ease, filter 4s ease;
}

.cell {
  width:100%; aspect-ratio:1; background:var(--cell-empty);
  transition:background 0.6s ease, opacity 0.6s ease, box-shadow 0.6s ease;
  position:relative; overflow:hidden;
}

/* Entity and drifter types */
.cell.entity { background:var(--entity); box-shadow:0 0 12px var(--entity-glow); transition:background 0.15s ease, box-shadow 0.15s ease; }
.cell.drifter-a { background:var(--drifter-a); box-shadow:0 0 6px rgba(58,58,72,0.15); }
.cell.drifter-b { background:var(--drifter-b); box-shadow:0 0 6px rgba(46,58,58,0.15); }
.cell.drifter-c { background:var(--drifter-c); box-shadow:0 0 6px rgba(58,46,54,0.15); }
.cell.shadow-entity { background:var(--shadow); opacity:0.4; box-shadow:0 0 8px rgba(42,42,58,0.1); }

/* ── Witness entity ── */
.cell.witness-entity {
  background:var(--witness);
  box-shadow:0 0 14px var(--witness-glow), inset 0 0 8px rgba(80,60,110,0.08);
  animation:witness-observe 6s ease-in-out infinite;
}
@keyframes witness-observe {
  0%,100% { box-shadow:0 0 14px rgba(80,60,110,0.12), inset 0 0 8px rgba(80,60,110,0.08); }
  50%      { box-shadow:0 0 22px rgba(80,60,110,0.2),  inset 0 0 14px rgba(80,60,110,0.14); }
}

/* ── Signal anomaly ── */
.cell.signal-cell {
  background:var(--signal-color);
  animation:signal-pulse 1.2s ease-in-out infinite;
  box-shadow:0 0 10px rgba(48,64,64,0.25);
}
@keyframes signal-pulse {
  0%,100% { opacity:0.6; background:var(--signal-color); }
  50%      { opacity:1;   background:#3a5050; }
}

/* ── Cell wear states ── */
.cell.worn-light  { background:#0d0b10; }
.cell.worn-medium { background:#100d14; box-shadow:inset 0 0 6px rgba(60,50,80,0.05); }
.cell.worn-heavy  { background:#120f18; box-shadow:inset 0 0 10px rgba(70,55,95,0.1); animation:worn-breathe 8s ease-in-out infinite; }
@keyframes worn-breathe {
  0%,100% { box-shadow:inset 0 0 10px rgba(70,55,95,0.08); }
  50%      { box-shadow:inset 0 0 16px rgba(70,55,95,0.15); }
}

/* ── Artifact, whisper, special states ── */
.cell.has-artifact::after {
  content:''; position:absolute; top:50%; left:50%;
  width:4px; height:4px; background:var(--artifact); border-radius:50%;
  transform:translate(-50%,-50%);
  animation:artifact-pulse 3s ease-in-out infinite;
  box-shadow:0 0 6px rgba(74,64,96,0.3);
}
.cell.has-artifact.artifact-fading::after { animation:artifact-dissolve 1.5s ease-out forwards; }
.cell .whisper-text {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Space Mono',monospace; font-size:7px; color:var(--whisper);
  pointer-events:none; opacity:0; animation:whisper-appear 6s ease-in-out forwards; letter-spacing:0;
}

.cell.marked      { background:#12101a; }
.cell.ghost       { background:#0e0c14; animation:ghost-pulse 4s ease-in-out infinite; }
.cell.void-cell   { background:#030305; opacity:0.6; }
.cell.scar        { background:#140a0a; }
.cell.watching    { background:var(--cell-empty); box-shadow:inset 0 0 8px rgba(80,70,100,0.15); }
.cell.echo        { background:#0d0a12; animation:echo-fade 3s ease-out forwards; }
.cell.pulse       { animation:cell-pulse 2s ease-in-out; }
.cell.decay       { background:#0b0808; opacity:0.8; transition:opacity 4s ease; }
.cell.bloom       { background:#0f0e16; box-shadow:inset 0 0 12px rgba(90,70,120,0.08); animation:bloom-breathe 6s ease-in-out infinite; }
.cell.claimed     { background:#100e15; border:1px solid rgba(80,60,100,0.06); }
.cell.erased      { background:var(--void); opacity:0.3; }
.cell.migrated    { background:#0a0d0c; }
.cell.drifter-trail { background:#0c0b10; transition:background 4s ease; }
.cell.ritual-glow { box-shadow:inset 0 0 10px rgba(100,80,140,0.06); animation:ritual-dim 4s ease-out forwards; }
.cell.tremor      { animation:cell-tremor 0.3s ease-in-out; }
.cell.resonance   { background:#0e0c14; box-shadow:inset 0 0 14px rgba(70,60,100,0.06); animation:resonance-hum 5s ease-in-out infinite; }
.cell.convergence { box-shadow:inset 0 0 16px rgba(100,80,130,0.1); animation:convergence-glow 3s ease-in-out infinite; }
.cell.hot         { background:#0f0c14; box-shadow:inset 0 0 8px rgba(80,60,100,0.07); }

@keyframes ghost-pulse          { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes echo-fade            { 0%{background:#16121e;opacity:1} 100%{background:var(--cell-empty);opacity:1} }
@keyframes cell-pulse           { 0%,100%{box-shadow:none} 50%{box-shadow:inset 0 0 6px rgba(100,80,130,0.1)} }
@keyframes bloom-breathe        { 0%,100%{box-shadow:inset 0 0 12px rgba(90,70,120,0.08)} 50%{box-shadow:inset 0 0 18px rgba(90,70,120,0.14)} }
@keyframes artifact-pulse       { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:0.9;transform:translate(-50%,-50%) scale(1.3)} }
@keyframes artifact-dissolve    { 0%{opacity:0.9;transform:translate(-50%,-50%) scale(1.3)} 100%{opacity:0;transform:translate(-50%,-50%) scale(0)} }
@keyframes whisper-appear       { 0%{opacity:0} 20%{opacity:0.5} 80%{opacity:0.4} 100%{opacity:0} }
@keyframes ritual-dim           { 0%{box-shadow:inset 0 0 10px rgba(100,80,140,0.08)} 100%{box-shadow:none} }
@keyframes cell-tremor          { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1px,0)} 75%{transform:translate(1px,0)} }
@keyframes resonance-hum        { 0%,100%{box-shadow:inset 0 0 14px rgba(70,60,100,0.06)} 50%{box-shadow:inset 0 0 20px rgba(70,60,100,0.1)} }
@keyframes convergence-glow     { 0%,100%{box-shadow:inset 0 0 16px rgba(100,80,130,0.08)} 50%{box-shadow:inset 0 0 24px rgba(100,80,130,0.16)} }

/* ── Move / artifact counters ── */
#move-counter {
  position:absolute; bottom:28px; left:0; right:0; text-align:center;
  font-size:10px; letter-spacing:4px; color:var(--text-dead);
  pointer-events:none; z-index:10; font-family:'Space Mono',monospace;
  transition:color 4s ease, opacity 4s ease;
}
#artifact-counter {
  position:absolute; bottom:46px; left:0; right:0; text-align:center;
  font-size:9px; letter-spacing:3px; color:var(--text-dead);
  pointer-events:none; z-index:10; font-family:'Space Mono',monospace;
  opacity:0; transition:opacity 4s ease, color 4s ease;
}

/* ── Memory flash ── */
#memory-flash {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  pointer-events:none; z-index:9996; opacity:0; transition:opacity 0.3s ease;
}
#memory-flash.active { opacity:1; }
#memory-flash .memory-text {
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px;
  color:var(--text-dead); text-align:center; max-width:420px; line-height:2;
  animation:memory-drift 4s ease-in-out forwards;
}
@keyframes memory-drift {
  0%   { opacity:0; transform:translateY(10px); }
  15%  { opacity:0.6; transform:translateY(0); }
  70%  { opacity:0.5; transform:translateY(-5px); }
  100% { opacity:0; transform:translateY(-15px); }
}

/* ── Taxonomy overlay ── */
#taxonomy-overlay {
  position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none; z-index:9995; opacity:0; transition:opacity 1s ease;
}
#taxonomy-overlay.active { opacity:1; }
#taxonomy-content {
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px;
  color:var(--text-dead); text-align:center; max-width:300px; line-height:2.5;
  animation:taxonomy-appear 6s ease-in-out forwards;
}
#taxonomy-content .taxonomy-type {
  font-size:13px; letter-spacing:5px; color:var(--text-dim); margin:8px 0;
}
@keyframes taxonomy-appear {
  0%   { opacity:0; transform:scale(0.97); }
  10%  { opacity:0.7; transform:scale(1); }
  80%  { opacity:0.6; }
  100% { opacity:0; }
}

/* ── Log panel ── */
#log-header {
  padding:20px 20px 12px; border-bottom:1px solid var(--grid-line);
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:4px;
  text-transform:uppercase; color:var(--text-dead); transition:color 4s ease;
  display:flex; justify-content:space-between; align-items:center;
}
#log-header .log-session-id { font-size:8px; letter-spacing:2px; opacity:0.5; }
#log-entries {
  flex:1; overflow-y:auto; padding:12px 20px;
  display:flex; flex-direction:column; gap:0;
  scrollbar-width:thin; scrollbar-color:var(--grid-line) transparent;
}
#log-entries::-webkit-scrollbar { width:3px; }
#log-entries::-webkit-scrollbar-track { background:transparent; }
#log-entries::-webkit-scrollbar-thumb { background:var(--grid-line); }

.log-entry {
  font-size:11px; line-height:1.7; color:var(--text-log); opacity:0;
  animation:log-appear 0.5s ease forwards; padding:2px 0;
  border-bottom:1px solid transparent;
}
.log-entry.phase-0 { color:var(--text-dim); }
.log-entry.phase-1 { color:var(--text-dim); }
.log-entry.phase-2 { color:var(--text-cold); }
.log-entry.phase-3 { color:var(--text-fabricate); }
.log-entry.phase-4 { color:var(--text-warn); }
.log-entry.phase-5 { color:var(--text-aware); }
.log-entry.phase-6 { color:#8a7090; }
.log-entry.phase-7 { color:#555560; }
.log-entry.phase-8 { color:#3a3a42; }

.log-entry.drifter-line   { color:#3a4a4a; font-style:italic; }
.log-entry.artifact-line  { color:#4a4060; }
.log-entry.ritual-line    { color:#504060; border-left:1px solid rgba(80,64,96,0.15); padding-left:10px; margin-left:-10px; }
.log-entry.weather-line   { color:#3a3a50; }
.log-entry.memory-line    { color:#2a3a3a; font-style:italic; }
.log-entry.shadow-line    { color:#2a2a40; }
.log-entry.witness-line   { color:#3a2a50; font-style:italic; }
.log-entry.signal-line    { color:#2a3a3a; }
.log-entry.taxonomy-line  { color:#504060; letter-spacing:1px; }
.log-entry.wear-line      { color:#3a3050; }
.log-entry.convergence-line { color:#504858; border-left:1px solid rgba(90,60,110,0.12); padding-left:10px; margin-left:-10px; }
.log-entry.system-line    { color:var(--text-dead); font-size:10px; letter-spacing:1px; }
.log-entry.event-line     { border-left:1px solid rgba(100,80,130,0.12); padding-left:10px; margin-left:-10px; }
.log-entry .timestamp     { color:var(--text-dead); margin-right:8px; font-size:10px; }

@keyframes log-appear { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ── Phase flash ── */
#phase-flash {
  position:fixed; inset:0; background:white; opacity:0;
  pointer-events:none; z-index:10000; transition:opacity 0.05s ease;
}
#phase-flash.flash       { opacity:0.015; transition:opacity 0s; }
#phase-flash.deep-flash  { opacity:0.03;  transition:opacity 0s; }
#phase-flash.tremor-flash{ opacity:0.008; transition:opacity 0s; }
#phase-flash.witness-flash{ opacity:0.02; background:#604080; transition:opacity 0s; }

/* ── Start overlay ── */
#start-overlay {
  position:fixed; inset:0; background:var(--void);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:10001; transition:opacity 1.5s ease; cursor:pointer;
}
#start-overlay.hidden { opacity:0; pointer-events:none; }
#start-overlay h1 {
  font-family:'Space Mono',monospace; font-size:13px; font-weight:400;
  letter-spacing:8px; text-transform:uppercase; color:var(--text-dim);
  margin-bottom:24px;
}
#start-overlay .start-desc {
  font-size:10px; letter-spacing:2px; color:var(--text-dead);
  margin-bottom:24px; text-align:center; max-width:320px; line-height:2;
}
#start-overlay .start-hint {
  font-size:10px; letter-spacing:4px; color:var(--text-dead);
  animation:hint-pulse 3s ease-in-out infinite;
}
@keyframes hint-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

/* ── Responsive ── */
@media(max-width:800px){
  #container{flex-direction:column}
  #log-panel{width:100%;min-width:unset;height:35vh;border-left:none;border-top:1px solid var(--grid-line)}
  #world-panel{height:65vh}
  #title-area{top:12px}
  #title-area h1{font-size:9px;letter-spacing:4px}
  #move-counter{bottom:12px}
  #artifact-counter{bottom:28px}
}
</style>
</head>
<body>

<div id="phase-flash"></div>
<div id="weather-overlay"></div>
<div id="memory-flash"><div class="memory-text" id="memory-text"></div></div>
<div id="taxonomy-overlay"><div id="taxonomy-content"></div></div>

<div id="start-overlay">
  <h1>World That Doesn't Care</h1>
  <div class="start-desc">a grid-based observation system<br>you will move. the grid will not notice.</div>
  <div class="start-hint">press any key or tap to begin</div>
</div>

<div id="container">
  <div id="world-panel">
    <div id="title-area">
      <h1 id="main-title">World That Doesn't Care</h1>
      <div class="subtitle" id="subtitle">observation active</div>
      <div id="session-stats"></div>
    </div>
    <div id="grid-container">
      <div id="grid"></div>
    </div>
    <div id="artifact-counter"><span id="artifact-display"></span></div>
    <div id="move-counter"><span id="counter-display">move 0</span></div>
  </div>
  <div id="log-panel">
    <div id="log-header">
      <span>system log</span>
      <span class="log-session-id" id="session-id-display"></span>
    </div>
    <div id="log-entries"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════════════════
  const GRID_SIZE = 18;
  const CELL_PX = Math.min(Math.floor((Math.min(window.innerWidth * 0.58, window.innerHeight * 0.76)) / GRID_SIZE), 30);
  const MAX_LOG = 200;
  const SESSION_ID = Math.random().toString(36).slice(2,10).toUpperCase();

  // ═══════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════
  const S = {
    started: false,
    playerX: Math.floor(GRID_SIZE / 2),
    playerY: Math.floor(GRID_SIZE / 2),
    moves: 0,
    phase: 0,
    lastDirection: null,
    moveHistory: [],
    positionHistory: [],
    directionCounts: { north:0, south:0, east:0, west:0 },
    markedCells: new Set(),
    ghostCells: new Set(),
    voidCells: new Set(),
    scarCells: new Set(),
    watchingCells: new Set(),
    echoTrail: [],
    fabricatedActions: 0,
    consequencesApplied: 0,
    idleTicks: 0,
    totalIdleTicks: 0,
    idleTimer: null,
    ambientTimer: null,
    narrativeTimer: null,
    drifterTimer: null,
    weatherTimer: null,
    whisperTimer: null,
    gridCells: [],
    logCount: 0,
    lastLogTime: 0,
    entityName: 'Entity',
    entityNames: ['Entity','Subject','Instance','Occupant','Signal','Pattern','Residue','Echo','Trace','Remnant'],
    nameIndex: 0,
    wallBumps: 0,
    revisitCount: 0,
    visitedCells: new Set(),
    cornerVisits: 0,
    edgeMoves: 0,
    centerMoves: 0,
    directionChanges: 0,
    consecutiveSameDir: 0,
    longestStraightLine: 0,
    currentStraightLine: 0,
    circlingDetected: false,
    retracingDetected: false,
    explorerScore: 0,
    hesitationCount: 0,
    lastMoveTime: 0,
    fastMoveStreak: 0,
    slowMoveCount: 0,
    narrativeFlags: {
      otherEntityMentioned: false,
      nameRejected: false,
      claimsMade: 0,
      warningsIssued: 0,
      questionsAsked: 0,

  // HELPERS
  // ═══════════════════════════════════════════════════════
  function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
  function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
  function randCoord() { return `[${randInt(0,GRID_SIZE-1)},${randInt(0,GRID_SIZE-1)}]`; }
  function fakeTs() { return `${pad(randInt(0,23))}:${pad(randInt(0,59))}:${pad(randInt(0,59))}`; }
  function pad(n) { return String(n).padStart(2,'0'); }
  function fakeHex() { return '0x'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'); }
  function fakeSector() { return String.fromCharCode(65+randInt(0,7))+'-'+randInt(0,15); }
  function EN() { return S.entityName; }
  function en() { return S.entityName.toLowerCase(); }
  function ck(x,y) { return `${x},${y}`; }
  function opp(d) { return {north:'south',south:'north',east:'west',west:'east'}[d]||d; }
  function pdist(x,y) { return Math.abs(x-S.playerX)+Math.abs(y-S.playerY); }
  function validCell(x,y) { return x>=0&&x<GRID_SIZE&&y>=0&&y<GRID_SIZE; }
  function isEdge(x,y) { return x===0||x===GRID_SIZE-1||y===0||y===GRID_SIZE-1; }
  function isCorner(x,y) { return (x===0||x===GRID_SIZE-1)&&(y===0||y===GRID_SIZE-1); }
  function explPct() { return Math.floor((S.visitedCells.size/(GRID_SIZE*GRID_SIZE))*100); }
  function domDir() { let m=0,r='none'; for(const[k,v] of Object.entries(S.directionCounts)){if(v>m){m=v;r=k;}} return r; }
  function getPhase() { const m=S.moves; for(let p=8;p>=1;p--){if(m>=(S.phaseTransitions[p]||Infinity))return p;} return 0; }

  function getCell(x,y) {
    if(!validCell(x,y)) return null;
    return S.gridCells[y][x];
  }

  function analyzeBehavior() {
    const recent = S.positionHistory.slice(-12);
    if(recent.length<6) return;
    const last6=recent.slice(-6);
    const uPos=new Set(last6.map(p=>`${p.x},${p.y}`));
    S.circlingDetected = uPos.size<=4;
    if(S.moveHistory.length>=4){
      const d4=S.moveHistory.slice(-4).map(m=>m.dir);
      S.retracingDetected = d4[0]===opp(d4[2])&&d4[1]===opp(d4[3]);
    }
    S.explorerScore = S.visitedCells.size;
  }

  function getBehaviorDesc() {
    if(S.circlingDetected) return pick(['circling','orbiting','looping','pacing','spiraling']);
    if(S.retracingDetected) return pick(['retracing','retreating','backtracking','doubling back']);
    if(S.consecutiveSameDir>=4) return pick(['marching','advancing','driving','persisting','charging']);
    if(S.edgeMoves>S.moves*0.4) return pick(['edge-walking','boundary-tracing','perimeter-scanning','wall-hugging']);
    if(S.fastMoveStreak>=5) return pick(['rushing','fleeing','accelerating','urgent','panicking']);
    if(S.slowMoveCount>S.moves*0.3) return pick(['deliberating','hesitating','contemplating','measuring']);
    return pick(['wandering','drifting','traversing','moving','migrating','searching','existing']);
  }

  // ═══════════════════════════════════════════════════════
  // PLAYER TAXONOMY
  // ═══════════════════════════════════════════════════════
  function classifyPlayer() {
    const ep = explPct();
    const edgeRatio = S.edgeMoves / Math.max(1, S.moves);
    const centerRatio = S.centerMoves / Math.max(1, S.moves);
    const changeRatio = S.directionChanges / Math.max(1, S.moves);
    const ritualCount = S.narrativeFlags.ritualsPerformed;
    const artifactCount = S.narrativeFlags.artifactsCollected;
    const idleRatio = S.totalIdleTicks / Math.max(1, S.moves + S.totalIdleTicks);
    const circled = S.circlingDetected;
    const wallBumpRatio = S.wallBumps / Math.max(1, S.moves);
    if(ep > 70) return { name:'The Cartographer', desc:'mapped everything. understood nothing.' };
    if(edgeRatio > 0.55) return { name:'The Edge-Walker', desc:'sought limits. the limits were real.' };
    if(ritualCount >= 5) return { name:'The Ritualist', desc:'performed rites to no deity.' };
    if(artifactCount >= 8) return { name:'The Collector', desc:'gathered weight that did not exist.' };
    if(circled) return { name:'The Pacer', desc:'moved in circles without choosing to.' };
    if(idleRatio > 0.35) return { name:'The Still Point', desc:'was here. mostly was not moving.' };
    if(wallBumpRatio > 0.12) return { name:'The Tester', desc:'pushed every boundary. none gave way.' };
    if(S.retracingDetected && S.revisitCount > 15) return { name:'The Haunter', desc:'returned. returned. returned.' };
    if(S.longestStraightLine > 10) return { name:'The Marcher', desc:'went in one direction until stopped.' };
    if(centerRatio > 0.55) return { name:'The Center', desc:'remained near the middle. the middle did not notice.' };
    if(changeRatio > 0.7) return { name:'The Uncertain', desc:'changed direction more than it held one.' };
    return { name:'The Wanderer', desc:'moved without pattern. patterns emerged anyway.' };
  }

  function initAudio() {
    if(S.audioStarted) return;
    try {
      S.audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      S.masterGain = S.audioCtx.createGain();
      S.masterGain.gain.value = 0;
      S.masterGain.connect(S.audioCtx.destination);
      const freqs = [54.88, 82.41, 65.41];
      freqs.forEach((freq,i) => {
        const osc=S.audioCtx.createOscillator();
        const gain=S.audioCtx.createGain();
        const filt=S.audioCtx.createBiquadFilter();
        osc.type = i===2 ? 'triangle' : 'sine';
        osc.frequency.value = freq;
        filt.type='lowpass'; filt.frequency.value=180; filt.Q.value=0.8;
        gain.gain.value = i===2 ? 0.04 : 0.07;
        osc.connect(filt); filt.connect(gain); gain.connect(S.masterGain);
        osc.start();
        S.droneOscs.push({osc,gain,filt,baseFreq:freq});
      });
      S.masterGain.gain.setTargetAtTime(0.12, S.audioCtx.currentTime, 5);
      S.audioStarted = true;
    } catch(e){}
  }

  function updateAudioForPhase() {
    if(!S.audioStarted||!S.audioCtx) return;
    const t=S.audioCtx.currentTime, p=S.phase;
    S.droneOscs.forEach((d,i)=>{
      d.osc.detune.setTargetAtTime(p*2.5*(i===0?1:-1)*(i===2?0.5:1),t,2);
      d.filt.frequency.setTargetAtTime(180+p*35,t,3);
      const vol=Math.max(0.01,0.07-p*0.006);
      d.gain.gain.setTargetAtTime(vol,t,2);
    });
    if(p>=7) S.masterGain.gain.setTargetAtTime(0.05,t,8);
    if(p>=8) S.masterGain.gain.setTargetAtTime(0.02,t,12);
  }

  function playTone(freq, dur, vol=0.018, type='sine') {
    if(!S.audioStarted||!S.audioCtx) return;
    const t=S.audioCtx.currentTime;
    const osc=S.audioCtx.createOscillator();
    const g=S.audioCtx.createGain();
    osc.type=type; osc.frequency.value=freq;
    g.gain.value=0;
    g.gain.setTargetAtTime(vol,t,0.01);
    g.gain.setTargetAtTime(0,t+dur*0.6,dur*0.4);
    osc.connect(g); g.connect(S.masterGain);
    osc.start(t); osc.stop(t+dur+0.3);
  }

  function playMoveSound() {
    if(!S.audioStarted||!S.audioCtx) return;
    const base = 100+(S.playerX*2.2)+(S.playerY*3.1);
    playTone(base+S.phase*4, 0.12, 0.016);
  }

  function playArtifactSound() {
    [0,0.1,0.22].forEach((off,i)=>setTimeout(()=>playTone(300+i*60,0.18,0.014,'triangle'),off*1000));
  }

  function playEventTone() { playTone(73.42, 0.8, 0.04, 'sine'); }
  function playWitnessSound() { playTone(92, 1.2, 0.03, 'triangle'); }

  function initDrifters() {
    const pos=[{x:3,y:3},{x:GRID_SIZE-4,y:GRID_SIZE-4},{x:GRID_SIZE-4,y:3}];
    const behaviors=['wander','orbit','edge'];
    pos.forEach((p,i)=>{
      S.drifters.push({
        id:i, x:p.x, y:p.y, alive:true,
        behavior:behaviors[i], name:dNames[i], cssClass:dClasses[i],

        orbitAngle:Math.random()*Math.PI*2, edgeDir:i, deathMove:null, trail:[],

  function moveDrifter(d) {
    if(!d.alive) return;
    const old={x:d.x,y:d.y};
    if(d.behavior==='wander') {
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
      const w=dirs.map(([dx,dy])=>{
        const nx=d.x+dx,ny=d.y+dy;
        if(!validCell(nx,ny)||S.voidCells.has(ck(nx,ny))) return {dx,dy,w:0};
        const dist=pdist(nx,ny);
        return {dx,dy,w:dist<3?0.3:1};
      }).filter(x=>x.w>0);
      if(w.length>0){
        const tot=w.reduce((a,b)=>a+b.w,0);
        let r=Math.random()*tot;
        for(const x of w){r-=x.w;if(r<=0){d.x+=x.dx;d.y+=x.dy;break;}}
      }
    } else if(d.behavior==='orbit') {
      d.orbitAngle=(d.orbitAngle||0)+0.28+Math.random()*0.15;
      const cx=GRID_SIZE/2,cy=GRID_SIZE/2;
      const radius=5+Math.sin(d.orbitAngle*0.08)*2;
      const tx=Math.round(cx+Math.cos(d.orbitAngle)*radius);
      const ty=Math.round(cy+Math.sin(d.orbitAngle)*radius);
      const dx=Math.sign(tx-d.x),dy=Math.sign(ty-d.y);
      const nx=d.x+(Math.abs(dx)>=Math.abs(dy)?dx:0);
      const ny=d.y+(Math.abs(dy)>Math.abs(dx)?dy:0);
      if(validCell(nx,ny)&&!S.voidCells.has(ck(nx,ny))){d.x=nx;d.y=ny;}
    } else if(d.behavior==='edge') {
      if(!d.edgeDir) d.edgeDir=0;
      const dirs=[[1,0],[0,1],[-1,0],[0,-1]];
      const dir=dirs[d.edgeDir%4];
      const nx=d.x+dir[0],ny=d.y+dir[1];
      if(!validCell(nx,ny)||!isEdge(nx,ny)){d.edgeDir=(d.edgeDir+1)%4;}
      else{d.x=nx;d.y=ny;}
    }
    d.moves++;
    if(old.x!==d.x||old.y!==d.y){
      const oc=getCell(old.x,old.y);
      if(oc){oc.classList.remove(d.cssClass);oc.classList.add('drifter-trail');setTimeout(()=>oc.classList.remove('drifter-trail'),4000);}
      d.trail.push({x:old.x,y:old.y});
      if(d.trail.length>8) d.trail.shift();
    }
    if(pdist(d.x,d.y)<=2) S.narrativeFlags.drifterEncounters++;
    if(pdist(d.x,d.y)===0){
      const esc=[[0,-1],[0,1],[-1,0],[1,0]].filter(([dx,dy])=>validCell(d.x+dx,d.y+dy)&&!S.voidCells.has(ck(d.x+dx,d.y+dy)));
      if(esc.length>0){const[dx,dy]=pick(esc);d.x+=dx;d.y+=dy;}
    }
    if(S.phase>=5&&Math.random()<0.003) killDrifter(d);
    if(S.phase>=7&&Math.random()<0.012) killDrifter(d);
    const c=getCell(d.x,d.y);
    if(c) c.classList.add(d.cssClass);
  }

  function killDrifter(d) {
    if(!d.alive) return;
    d.alive=false; d.deathMove=S.moves;
    S.narrativeFlags.totalDrifterDeaths++;
    const c=getCell(d.x,d.y);
    if(c){c.classList.remove(d.cssClass);c.classList.add('scar');}
    const first=!S.narrativeFlags.firstDrifterDeath;
    S.narrativeFlags.firstDrifterDeath=true;
    const alive=S.drifters.filter(x=>x.alive).length;
    const lines=first?[
      '── drifter cessation ──',
      d.name+' has stopped.',
      d.name+': '+d.personality.trait+'. '+d.personality.desc+'.',
      'Duration of activity: '+d.moves+' cycles.',
      'Cause: unrecorded.',
      d.name+' leaves a scar at ['+d.x+','+d.y+'].',
      EN()+' was '+pdist(d.x,d.y)+' cells away. '+EN()+' did not notice.',
      alive+' drifters remain.',
    ]:[
      d.name+' ceased. Duration: '+d.moves+'. Scar at ['+d.x+','+d.y+'].',
      alive+' drifter'+(alive!==1?'s':'')+' remain'+(alive===1?'s':'')+'. The grid adjusts: not at all.',
    ];
    if(alive===0){
      lines.push('All drifters have ceased.');
      lines.push('The grid now contains only: '+EN()+'. The shadow. The witness. The void.');
      lines.push(EN()+' is the last moving thing.');
    }
    lines.forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true,'drifter-line'),800*(i+1)));
    playEventTone();
  }

  function clearDrifterRender(){S.drifters.forEach(d=>{if(!d.alive)return;const c=getCell(d.x,d.y);if(c)c.classList.remove(d.cssClass);});}
  function renderDrifters(){S.drifters.forEach(d=>{if(!d.alive)return;const c=getCell(d.x,d.y);if(c)c.classList.add(d.cssClass);});}

    ()=>{const a=S.drifters.filter(d=>d.alive);return a.length>0?pick(a).name+' moved. No purpose detected.':'All drifters have ceased.';},
    ()=>{const a=S.drifters.filter(d=>d.alive);return a.length>0?pick(a).name+' is '+pick(['wandering','orbiting','tracing the edge','stationary','lost','drifting'])+'.':'The grid is empty of drifters.';},
    ()=>'Drifter population: '+S.drifters.filter(d=>d.alive).length+'/'+S.drifters.length+'.',

  function spawnArtifact() {
    if(S.artifacts.size>=3) return;
    if(S.artifactSpawnCooldown>0){S.artifactSpawnCooldown--;return;}
    const x=randInt(0,GRID_SIZE-1), y=randInt(0,GRID_SIZE-1), k=ck(x,y);
    if(k===ck(S.playerX,S.playerY)||S.voidCells.has(k)||S.artifacts.has(k)) return;
    const t=pick(artifacts);
    S.artifacts.set(k,{name:t.name,desc:t.desc,x,y,spawnMove:S.moves});
    const c=getCell(x,y); if(c) c.classList.add('has-artifact');
    S.artifactSpawnCooldown=randInt(10,22);
    if(S.phase>=2&&Math.random()<0.35) addLog('Something appeared at '+randCoord()+'. Small. Inconsequential.',S.phase,false,'artifact-line');
  }

  function checkArtifact() {
    const k=ck(S.playerX,S.playerY);
    if(!S.artifacts.has(k)) return;
    const a=S.artifacts.get(k);
    S.artifacts.delete(k);
    S.narrativeFlags.artifactsCollected++;
    S.artifactsCollected.push(a);
    const c=getCell(S.playerX,S.playerY);
    if(c){c.classList.add('artifact-fading');setTimeout(()=>c.classList.remove('has-artifact','artifact-fading'),1500);}
    playArtifactSound();
    document.getElementById('artifact-counter').style.opacity='0.4';
    document.getElementById('artifact-display').textContent=S.narrativeFlags.artifactsCollected+' collected';
    const resps=[
      ()=>EN()+' found '+a.name+'. '+a.desc,
      ()=>EN()+' picked up '+a.name+'. It does not change anything.',
      ()=>a.name+' — '+a.desc+' '+EN()+' carries it now. The weight: imaginary.',
      ()=>EN()+' collected '+a.name+'. Collection total: '+S.narrativeFlags.artifactsCollected+'. Value: 0.',
      ()=>EN()+' held '+a.name+' briefly. '+a.desc+' '+EN()+' will forget it.',
    ];
    if(S.phase>=5) resps.push(
      ()=>EN()+' took '+a.name+'. As if accumulation is survival.',
      ()=>a.name+'. Another weight in '+en()+'\'s inventory of nothing.',
    );
    addLog(pick(resps)(),S.phase,false,'artifact-line');
    // expire old ones
    S.artifacts.forEach((art,key)=>{
      if(S.moves-art.spawnMove>35){
        S.narrativeFlags.artifactsIgnored++;
        const cc=getCell(art.x,art.y);
        if(cc){cc.classList.add('artifact-fading');setTimeout(()=>cc.classList.remove('has-artifact','artifact-fading'),1500);}
        S.artifacts.delete(key);
        if(S.phase>=3&&Math.random()<0.3) addLog(art.name+' dissolved. '+EN()+' did not reach it in time. There was no time limit.',S.phase,false,'artifact-line');
      }
    });
  }

  // ═══════════════════════════════════════════════════════
  // SHADOW ENTITY
  // ═══════════════════════════════════════════════════════
  function initShadow(){S.shadow={x:S.playerX,y:S.playerY,active:false,delay:[],diverged:false,divergeMove:0};}

  function updateShadow() {
    if(S.phase<2) return;
    if(!S.shadow.active&&S.moves>=22){
      S.shadow.active=true;
      addLog('Secondary signal detected at ['+S.shadow.x+','+S.shadow.y+']. Classification: shadow.',S.phase,false,'shadow-line');
    }
    if(!S.shadow.active) return;
    S.shadow.delay.push({x:S.playerX,y:S.playerY});
    const oc=getCell(S.shadow.x,S.shadow.y);
    if(oc) oc.classList.remove('shadow-entity');
    const delay=S.shadow.diverged?0:5;
    if(S.shadow.delay.length>delay){
      if(!S.shadow.diverged){
        const t=S.shadow.delay.shift();
        S.shadow.x=t.x; S.shadow.y=t.y;
      } else {
        const dirs=[[0,-1],[0,1],[-1,0],[1,0]].filter(([dx,dy])=>validCell(S.shadow.x+dx,S.shadow.y+dy)&&!S.voidCells.has(ck(S.shadow.x+dx,S.shadow.y+dy)));
        if(dirs.length>0){
          const away=dirs.filter(([dx,dy])=>(S.shadow.x+dx-S.playerX)**2+(S.shadow.y+dy-S.playerY)**2>(S.shadow.x-S.playerX)**2+(S.shadow.y-S.playerY)**2);
          const ch=away.length>0?pick(away):pick(dirs);
          S.shadow.x+=ch[0]; S.shadow.y+=ch[1];
        }
        S.shadow.delay=[];
      }
    }
    if(!S.shadow.diverged&&S.phase>=5&&S.moves>150&&Math.random()<0.015){
      S.shadow.diverged=true; S.shadow.divergeMove=S.moves;
      addLog(EN()+'\'s shadow stopped following. It moves on its own now.',S.phase,true,'shadow-line');
      setTimeout(()=>addLog('This is not a metaphor.',S.phase,false,'shadow-line'),1000);
    }
    if(S.shadow.x!==S.playerX||S.shadow.y!==S.playerY){
      const sc=getCell(S.shadow.x,S.shadow.y);
      if(sc) sc.classList.add('shadow-entity');
    }
  }

  // ═══════════════════════════════════════════════════════
  // WITNESS ENTITY — Never moves
  // ═══════════════════════════════════════════════════════
  function initWitness() {
    // Spawns at a corner or mid-edge in phase 4
    S.witness={x:-1,y:-1,active:false,spawnMove:0,acknowledged:false,fadeScheduled:false};
  }

  function spawnWitness() {
    if(S.witness.active) return;
    if(S.phase<4) return;
    if(S.triggeredEvents.has('witnessSpawn')) return;
    // Place far from player
    const candidates=[
      {x:1,y:1},{x:GRID_SIZE-2,y:1},
      {x:1,y:GRID_SIZE-2},{x:GRID_SIZE-2,y:GRID_SIZE-2},
      {x:Math.floor(GRID_SIZE/2),y:0},{x:0,y:Math.floor(GRID_SIZE/2)},
    ].filter(p=>pdist(p.x,p.y)>6&&!S.voidCells.has(ck(p.x,p.y)));
    if(candidates.length===0) return;
    const pos=pick(candidates);
    S.witness.x=pos.x; S.witness.y=pos.y;
    S.witness.active=true;
    S.witness.spawnMove=S.moves;
    S.triggeredEvents.add('witnessSpawn');
    const c=getCell(pos.x,pos.y);
    if(c) c.classList.add('witness-entity');
    playWitnessSound();
    const lines=[
      '── witness entity ──',
      'New signal at ['+pos.x+','+pos.y+'].',
      'Classification: stationary. Behavior: observation.',
      'The witness does not move.',
      'The witness will not move.',
      'It was there before '+en()+' turned around.',
    ];
    lines.forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true,'witness-line'),900*(i+1)));
  }

  function updateWitness() {
    if(!S.witness.active) return;
    // Witness never moves. Just track player proximity.
    const dist=pdist(S.witness.x,S.witness.y);
    if(dist<=2&&!S.narrativeFlags.witnessApproached){
      S.narrativeFlags.witnessApproached=true;
      const lines=[
        EN()+' is adjacent to the witness.',
        'The witness observes '+en()+'\'s proximity.',
        'The witness does not step back.',
        'The witness does not step toward.',
        'This is what it looks like when something has no fear.',
      ];
      lines.forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true,'witness-line'),700*(i+1)));
      flashEl.classList.add('witness-flash');
      setTimeout(()=>flashEl.classList.remove('witness-flash'),200);
      playWitnessSound();
    }
    if(dist===0&&S.witness.active&&!S.narrativeFlags.witnessAbsorbed){
      // Player moved onto witness — absorption event
      S.narrativeFlags.witnessAbsorbed=true;
      const c=getCell(S.witness.x,S.witness.y);
      if(c) c.classList.remove('witness-entity');
      S.witness.active=false;
      S.triggeredEvents.add('witnessAbsorbed');
      const lines=[
        '── witness event ──',
        EN()+' occupied the witness\'s cell.',
        'The witness did not resist.',
        'The witness did not yield.',
        'The witness did not do anything.',
        'The witness is no longer at ['+S.witness.x+','+S.witness.y+'].',
        'The witness is not gone.',
        'The witness is no longer located.',
        'Note: '+EN()+'\'s behavior since contact: indistinguishable from before.',
        '── ──',
      ];
      lines.forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true,'witness-line'),1000*(i+1)));
      playEventTone();
    }
  }

  // ═══════════════════════════════════════════════════════
  // CELL WEAR SYSTEM
  // ═══════════════════════════════════════════════════════
  function updateCellWear(x,y) {
    const k=ck(x,y);
    const prev=S.cellVisitCounts.get(k)||0;
    const next=prev+1;
    S.cellVisitCounts.set(k,next);
    const c=getCell(x,y); if(!c) return;
    c.classList.remove('worn-light','worn-medium','worn-heavy');
    if(next>=8) c.classList.add('worn-heavy');
    else if(next>=4) c.classList.add('worn-medium');
    else if(next>=2) c.classList.add('worn-light');
    // Track most worn
    if(!S.mostWornCell||next>(S.cellVisitCounts.get(ck(S.mostWornCell.x,S.mostWornCell.y))||0)){
      S.mostWornCell={x,y,count:next};
    }
    // Commentary at thresholds
    if(next===4&&S.phase>=2){
      setTimeout(()=>addLog('Cell ['+x+','+y+'] has been visited '+next+' times. It is beginning to show.',S.phase,false,'wear-line'),200);
    }
    if(next===8&&S.phase>=3){
      setTimeout(()=>addLog(EN()+' keeps returning to ['+x+','+y+']. The cell is worn. The cell does not feel worn.',S.phase,false,'wear-line'),200);
    }
    if(next===15&&S.phase>=4){
      setTimeout(()=>addLog('['+x+','+y+'] is '+en()+'\'s most-visited cell. '+en()+' treats it like a home. It is a tile.',S.phase,false,'wear-line'),200);
    }
  }

  // ═══════════════════════════════════════════════════════
  // WEATHER SYSTEM
  // ═══════════════════════════════════════════════════════
  const weatherTypes=['none','static-rain','interference','fog','void-wind','dissolution-haze','ash-fall','coldfront'];
  const weatherOvl=document.getElementById('weather-overlay');

  function updateWeather() {
    if(S.phase<2) return;
    S.weatherDuration--;
    if(S.weatherDuration>0) return;
    const ws={
      0:[9,1,0,0,0,0,0,0], 1:[8,1,1,0,0,0,0,0],
      2:[6,2,1,1,0,0,0,0], 3:[5,2,2,1,0,0,0,0],
      4:[4,2,2,2,1,0,0,0], 5:[3,2,2,2,2,0,0,1],
      6:[2,2,2,2,2,1,1,1], 7:[1,1,2,2,2,2,2,1],
      8:[1,0,1,1,2,3,1,0],
    };
    const pw=ws[Math.min(S.phase,8)]||ws[8];
    const tot=pw.reduce((a,b)=>a+b,0);
    let r=Math.random()*tot, chosen='none';
    for(let i=0;i<weatherTypes.length;i++){r-=pw[i];if(r<=0){chosen=weatherTypes[i];break;}}
    if(chosen!==S.currentWeather){
      weatherOvl.className='';
      S.currentWeather=chosen;
      if(chosen!=='none'){
        setTimeout(()=>{
          weatherOvl.classList.add(chosen);
          S.narrativeFlags.weatherEventsWitnessed++;
          if(Math.random()<0.28){
            const wd={
              'static-rain':pick(['Static rain. It falls upward.','Precipitation: non-physical.','It rains. Not water.']),
              'interference':pick(['Interference pattern. Source: absent.','Signal degradation.','Visual corruption.']),
              'fog':pick(['Fog. Visibility: reduced.','Atmospheric density increasing.','Fog settles.']),
              'void-wind':pick(['Wind from the void. Direction: inward.','Something moved through. Not air.','Void wind. Carries nothing.']),
              'dissolution-haze':pick(['Dissolution haze. Grid losing definition.','Boundaries softening.','Haze. Grid forgetting its shape.']),
              'ash-fall':pick(['Ash. From nothing. Falling onto nothing.','Particulate: unclassified. Descending.','Something burned. Somewhere. Once.']),
              'coldfront':pick(['Temperature drop. Temperature does not exist here.','A cold front passed. Fronts do not exist here. It passed anyway.','Something cooled. The grid did not feel it.']),
            };
            if(wd[chosen]) addLog(wd[chosen],S.phase,false,'weather-line');
          }
        },500);
      }
    }
    S.weatherDuration=randInt(18,45);
  }

  // ═══════════════════════════════════════════════════════
  // WHISPER SYSTEM
  // ═══════════════════════════════════════════════════════
  const wGlyphs=['·',':','∴','∵','○','◌','▪','▫','△','▽','◇','□','╌','┊','╎','│','─','┄','≈','≡','∞','∅'];
  const wWords=['here','gone','why','stay','left','same','none','end','was','will','is','not','yes','no','who','lost','found','void','echo','wait','move','stop','null','self','them','past','next','once','last','cell','home','cold','dark','rest','wake','dust','bone','name','hold','far','near','now','then','if','when','after','before','once','twice','never','always','still','again','more','less','alone','with','toward','away','down','up'];

  function spawnWhisper() {
    if(S.phase<2) return;
    if(S.activeWhispers.size>=5) return;
    if(Math.random()>0.12) return;
    const x=randInt(0,GRID_SIZE-1), y=randInt(0,GRID_SIZE-1), k=ck(x,y);
    if(S.activeWhispers.has(k)||S.voidCells.has(k)) return;
    const c=getCell(x,y); if(!c) return;
    let text;
    if(S.phase<4) text=pick(wGlyphs);
    else if(S.phase<6) text=Math.random()<0.6?pick(wWords):pick(wGlyphs);
    else text=pick(wWords);
    const span=document.createElement('span');
    span.className='whisper-text'; span.textContent=text;
    c.appendChild(span);
    S.activeWhispers.set(k,{el:span,text});
    S.narrativeFlags.whispersRead++;
    setTimeout(()=>{if(span.parentNode)span.parentNode.removeChild(span);S.activeWhispers.delete(k);},6000);
  }

  // ═══════════════════════════════════════════════════════
  // RITUAL DETECTION
  // ═══════════════════════════════════════════════════════
  function checkRituals() {
    if(S.phase<3) return;
    if(S.moves-S.lastRitualMove<12) return;
    S.ritualBuffer.push({x:S.playerX,y:S.playerY});
    if(S.ritualBuffer.length>24) S.ritualBuffer.shift();
    if(S.ritualBuffer.length<8) return;
    const last=S.ritualBuffer.slice(-8);
    const hasCross=last.some(p=>p.x===last[0].x&&p.y===last[0].y)&&
                   last.some(p=>p.x===last[0].x&&p.y===last[0].y-1)&&
                   last.some(p=>p.x===last[0].x&&p.y===last[0].y+1)&&
                   last.some(p=>p.x===last[0].x-1&&p.y===last[0].y)&&
                   last.some(p=>p.x===last[0].x+1&&p.y===last[0].y);
    const hasSquare=(()=>{for(let i=0;i<last.length-3;i++){const pts=last.slice(i,i+4);const xs=new Set(pts.map(p=>p.x));const ys=new Set(pts.map(p=>p.y));if(xs.size===2&&ys.size===2)return true;}return false;})();
    const returnToStart=last[0].x===last[7].x&&last[0].y===last[7].y;
    // Spiral: 8 unique positions in expanding pattern
    const hasStar=(()=>{const uniq=new Set(last.map(p=>ck(p.x,p.y)));return uniq.size===8&&last.filter(p=>p.x===S.playerX&&p.y===S.playerY).length===1;})();
    if(!hasCross&&!hasSquare&&!returnToStart&&!hasStar) return;
    S.ritualsDetected++; S.narrativeFlags.ritualsPerformed++; S.lastRitualMove=S.moves;
    const name=hasCross?'cross':hasSquare?'enclosure':hasStar?'star':'return';
    last.forEach(p=>{const c=getCell(p.x,p.y);if(c){c.classList.add('ritual-glow');setTimeout(()=>c.classList.remove('ritual-glow'),4000);}});
    playEventTone();
    const resp={
      cross:['── ritual detected: cross ──',EN()+' traced a cross.','The grid recognized the shape. The grid does not assign meaning to shapes.','Ritual #'+S.ritualsDetected+'. Effect: none.','The cells glowed briefly. This was atmospheric.'],
      enclosure:['── ritual detected: enclosure ──',EN()+' enclosed a space.','The enclosed cells are identical to unenclosed cells.','What was contained: nothing. What was protected: nothing.','Ritual #'+S.ritualsDetected+'.'],
      return:['── ritual detected: return ──',EN()+' returned to its starting point.','The circle is complete. The circle means nothing.','Every return is indistinguishable from arrival.','Ritual #'+S.ritualsDetected+'.'],
      star:['── ritual detected: star ──',EN()+' traced a pattern with 8 points.','The grid contains no stars. '+EN()+' made one anyway.','The 8 cells are indifferent to the pattern they formed.','Ritual #'+S.ritualsDetected+'. The grid did not receive it.'],
    };
    (resp[name]||resp['return']).forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true,'ritual-line'),650*(i+1)));
  }

  // ═══════════════════════════════════════════════════════
  // MEMORY FRAGMENTS
  // ═══════════════════════════════════════════════════════
  function triggerMemory() {
    if(S.phase<3) return;
    if(S.memoryCooldown>0){S.memoryCooldown--;return;}
    if(Math.random()>0.035) return;
    const el=document.getElementById('memory-flash'), txt=document.getElementById('memory-text');

  function checkConvergence() {
    if(S.convergenceCooldown>0){S.convergenceCooldown--;return;}
    if(S.phase<5) return;
    // Player + shadow + witness all within 3 cells of each other
    if(!S.shadow.active||!S.witness.active) return;
    const dShadow=Math.abs(S.shadow.x-S.playerX)+Math.abs(S.shadow.y-S.playerY);
    const dWitness=pdist(S.witness.x,S.witness.y);
    const swDist=Math.abs(S.shadow.x-S.witness.x)+Math.abs(S.shadow.y-S.witness.y);
    if(dShadow<=3&&dWitness<=3&&swDist<=4&&Math.random()<0.3){
      S.narrativeFlags.convergenceEvents++;
      S.convergenceCooldown=40;
      // Visual
      [[S.playerX,S.playerY],[S.shadow.x,S.shadow.y],[S.witness.x,S.witness.y]].forEach(([x,y])=>{
        const c=getCell(x,y);if(c){c.classList.add('convergence');setTimeout(()=>c.classList.remove('convergence'),4000);}
      });
      flashEl.classList.add('deep-flash');
      setTimeout(()=>flashEl.classList.remove('deep-flash'),200);
      playEventTone();
      const lines=[
        '── convergence event '+S.narrativeFlags.convergenceEvents+' ──',
        EN()+', its shadow, and the witness: all within proximity.',
        'Three things that are one thing.',
        'Three things that are no things.',
        'The convergence is complete.',
        'The convergence means nothing.',
        '── ──',
      ];
      lines.forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true,'convergence-line'),800*(i+1)));
    }
  }

  // ═══════════════════════════════════════════════════════
  // GRID CONSTRUCTION
  // ═══════════════════════════════════════════════════════
  function buildGrid() {
    gridEl.style.gridTemplateColumns=`repeat(${GRID_SIZE}, ${CELL_PX}px)`;
    gridEl.style.gridTemplateRows=`repeat(${GRID_SIZE}, ${CELL_PX}px)`;
    for(let y=0;y<GRID_SIZE;y++){
      const row=[];
      for(let x=0;x<GRID_SIZE;x++){
        const c=document.createElement('div');
        c.className='cell'; c.dataset.x=x; c.dataset.y=y;
        gridEl.appendChild(c); row.push(c);
      }
      S.gridCells.push(row);
    }
    updateEntityPos();
  }

  function updateEntityPos() {
    document.querySelectorAll('.cell.entity').forEach(c=>c.classList.remove('entity'));
    const c=getCell(S.playerX,S.playerY); if(c) c.classList.add('entity');
  }

  // ═══════════════════════════════════════════════════════
  // LOGGING
  // ═══════════════════════════════════════════════════════
  function addLog(text,phaseOvr,isEvent,extraClass) {
    if(text===null||text===undefined) return;
    if(text===''&&S.phase<7) return;
    const entry=document.createElement('div');
    const ph=phaseOvr!==undefined?phaseOvr:S.phase;
    entry.className='log-entry phase-'+Math.min(ph,8);
    if(isEvent) entry.classList.add('event-line');
    if(extraClass) entry.classList.add(extraClass);
    S.logCount++;
    const num=String(S.logCount).padStart(4,'0');
    entry.innerHTML='<span class="timestamp">'+num+'</span>'+(text+'');
    logEl.appendChild(entry);
    requestAnimationFrame(()=>{ logEl.scrollTop=logEl.scrollHeight; });
    while(logEl.children.length>MAX_LOG) logEl.removeChild(logEl.firstChild);
    S.lastLogTime=Date.now();
  }

  function addSys(text) {
    const e=document.createElement('div');
    e.className='log-entry system-line'; e.textContent=text;
    logEl.appendChild(e);
    requestAnimationFrame(()=>{ logEl.scrollTop=logEl.scrollHeight; });
  }

  // ═══════════════════════════════════════════════════════
  // LOG SELECTION
  // ═══════════════════════════════════════════════════════
  function getMovLog() {
    const ph=S.phase;
    if(ph>=2&&Math.random()<0.18){const bl=getBehaviorLog();if(bl)return bl;}
    if(ph>=2&&Math.random()<0.1&&S.drifters.some(d=>d.alive)){return pick(drifterLogs)();}
    const pools={0:p1,1:p1,2:p2,3:p3,4:p4,5:p5,6:p6,7:p7,8:p8};
    return pick(pools[ph]||p1)();
  }

  function getBehaviorLog() {
    const nearDrifter=S.drifters.some(d=>d.alive&&pdist(d.x,d.y)<=2);
    if(nearDrifter&&Math.random()<0.45) return pick(bLogs.nearDrifter)();
    const nearWitness=S.witness.active&&pdist(S.witness.x,S.witness.y)<=3;
    if(nearWitness&&S.phase>=4&&Math.random()<0.35) return pick(bLogs.nearWitness)();
    if(S.circlingDetected) return pick(bLogs.circling)();
    if(S.retracingDetected) return pick(bLogs.retracing)();
    if(S.edgeMoves>S.moves*0.35&&S.moves>15) return pick(bLogs.wallHugging)();
    if(S.currentStraightLine>=4) return pick(bLogs.straightLine)();
    if(S.fastMoveStreak>=4) return pick(bLogs.fastMovement)();
    if(S.slowMoveCount>S.moves*0.3&&S.moves>20) return pick(bLogs.slowMovement)();
    if(S.cornerVisits>=3) return pick(bLogs.cornerSeeking)();
    if(explPct()>40) return pick(bLogs.highExploration)();
    return null;
  }

  function checkEvents() {
    if(S.eventCooldown>0){S.eventCooldown--;return;}
    for(const[key,ev] of Object.entries(events)){
      if(S.triggeredEvents.has(key)) continue;
      if(ev.cond()){
        S.triggeredEvents.add(key);
        S.eventCooldown=10;
        const lines=typeof ev.lines==='function'?ev.lines():ev.lines;
        const delay=ev.delay||1000;
        flashEl.classList.add('deep-flash');
        setTimeout(()=>flashEl.classList.remove('deep-flash'),200);
        playEventTone();
        lines.forEach((l,i)=>setTimeout(()=>addLog(l,S.phase,true),delay*(i+1)));
        break;
      }
    }
  }

  // ═══════════════════════════════════════════════════════
  // GRID MUTATIONS
  // ═══════════════════════════════════════════════════════
  function applyMutation() {
    const ph=S.phase;
    if(ph>=2&&S.echoTrail.length>0&&Math.random()<0.4){
      const e=S.echoTrail[S.echoTrail.length-1];
      const c=getCell(e.x,e.y);
      if(c&&!S.voidCells.has(ck(e.x,e.y))){c.classList.add('echo');setTimeout(()=>c.classList.remove('echo'),3000);}
    }
    if(ph>=3&&Math.random()<0.2){
      const x=randInt(0,GRID_SIZE-1),y=randInt(0,GRID_SIZE-1),k=ck(x,y);
      if(k!==ck(S.playerX,S.playerY)){const c=getCell(x,y);if(c&&!S.voidCells.has(k)){c.classList.add('marked');S.markedCells.add(k);}}
    }
    if(ph>=3&&Math.random()<0.09){
      const dx=randInt(-3,3),dy=randInt(-3,3);
      const c=getCell(S.playerX+dx,S.playerY+dy);
      if(c&&!S.voidCells.has(ck(S.playerX+dx,S.playerY+dy))){c.classList.add('bloom');setTimeout(()=>c.classList.remove('bloom'),8000+Math.random()*4000);}
    }
    if(ph>=4&&Math.random()<0.16){
      const x=randInt(0,GRID_SIZE-1),y=randInt(0,GRID_SIZE-1),k=ck(x,y);
      if(k!==ck(S.playerX,S.playerY)&&k!==ck(S.witness.x,S.witness.y)){
        const c=getCell(x,y);if(c){c.classList.remove('marked','ghost','bloom');c.classList.add('void-cell');S.voidCells.add(k);}
      }
    }
    if(ph>=4&&Math.random()<0.12){
      const x=randInt(0,GRID_SIZE-1),y=randInt(0,GRID_SIZE-1),k=ck(x,y);
      if(k!==ck(S.playerX,S.playerY)&&!S.voidCells.has(k)){const c=getCell(x,y);if(c){c.classList.add('scar');S.scarCells.add(k);}}
    }
    if(ph>=4&&Math.random()<0.07&&S.positionHistory.length>10){
      const old=S.positionHistory[Math.floor(Math.random()*S.positionHistory.length*0.5)];
      const c=getCell(old.x,old.y);if(c&&!S.voidCells.has(ck(old.x,old.y)))c.classList.add('decay');
    }
    if(ph>=5&&Math.random()<0.1){
      const x=randInt(0,GRID_SIZE-1),y=randInt(0,GRID_SIZE-1),k=ck(x,y);
      if(k!==ck(S.playerX,S.playerY)&&!S.voidCells.has(k)){const c=getCell(x,y);if(c){c.classList.add('ghost');S.ghostCells.add(k);}}
    }
    if(ph>=5&&Math.random()<0.09){
      for(let dx=-2;dx<=2;dx++){for(let dy=-2;dy<=2;dy++){
        if(dx===0&&dy===0) continue;
        if(Math.random()<0.2){
          const nx=S.playerX+dx,ny=S.playerY+dy,k=ck(nx,ny);
          const c=getCell(nx,ny);
          if(c&&!S.voidCells.has(k)){
            c.classList.add('watching');S.watchingCells.add(k);
            setTimeout(()=>{c.classList.remove('watching');S.watchingCells.delete(k);},3000+Math.random()*4000);
          }
        }
      }}
    }
    if(ph>=4&&Math.random()<0.12){
      S.artifacts.forEach(a=>{
        const adj=[[0,-1],[0,1],[-1,0],[1,0]];
        adj.forEach(([dx,dy])=>{if(Math.random()<0.18){const c=getCell(a.x+dx,a.y+dy);if(c){c.classList.add('resonance');setTimeout(()=>c.classList.remove('resonance'),5000);}}});
      });
    }
    if(ph>=5&&Math.random()<0.025){
      flashEl.classList.add('tremor-flash');
      setTimeout(()=>flashEl.classList.remove('tremor-flash'),100);
      for(let i=0;i<randInt(3,8);i++){
        const c=getCell(randInt(0,GRID_SIZE-1),randInt(0,GRID_SIZE-1));
        if(c){c.classList.add('tremor');setTimeout(()=>c.classList.remove('tremor'),300);}
      }
      if(Math.random()<0.45) addLog('Seismic event. Magnitude: negligible. Source: '+pick(['below','the void','nowhere',en()])+' .',ph,false,'weather-line');
    }
    if(ph>=7&&Math.random()<0.22){
      const x=randInt(0,GRID_SIZE-1),y=randInt(0,GRID_SIZE-1),k=ck(x,y);
      if(k!==ck(S.playerX,S.playerY)&&k!==ck(S.witness.x,S.witness.y)){
        const c=getCell(x,y);
        if(c&&!S.voidCells.has(k)){c.classList.remove('marked','ghost','bloom','scar','watching','has-artifact');c.classList.add('erased');S.voidCells.add(k);S.artifacts.delete(k);}
      }
    }
    if(ph>=8&&Math.random()<0.32){
      const x=randInt(0,GRID_SIZE-1),y=randInt(0,GRID_SIZE-1),k=ck(x,y);
      if(k!==ck(S.playerX,S.playerY)){const c=getCell(x,y);if(c&&!S.voidCells.has(k)){c.classList.add('erased');S.voidCells.add(k);}}
    }
  }

    };
    if(ann[nw]) setTimeout(()=>addSys(ann[nw]),600);
    const subs={
      1:'observation active',
      2:'pattern analysis engaged',
      3:'attribution mode',
      4:'consequence processing',
      5:'awareness threshold exceeded',
      6:'pre-emptive state',
      7:'dissolution',
      8:'post-narrative',
    };
    subtitleEl.textContent=subs[nw]||'';
    statsEl.style.opacity=nw>=3?'0.4':'0';
    if(nw>=4) titleEl.style.color='#1a1a25';
    if(nw>=5){subtitleEl.style.opacity='0.2';statsEl.style.opacity='0.25';}
    if(nw>=6){titleEl.style.color='#111118';subtitleEl.style.color='#111118';startTitleGlitch();}
    if(nw>=7){
      titleEl.style.color='#0a0a0e';subtitleEl.style.opacity='0.08';
      moveCounterEl.style.opacity='0.3';logHdrEl.style.color='#151520';
      S.entityName=pick(['Residue','Echo','Signal','Trace']);
    }
    if(nw>=8){
      titleEl.style.opacity='0.3';subtitleEl.style.opacity='0.03';
      moveCounterEl.style.opacity='0.15';
      S.entityName=pick(['Remnant','Trace','']);
      S.drifters.forEach(d=>{if(d.alive) killDrifter(d);});
    }
    if(nw===5&&S.nameIndex<2){S.nameIndex=2;S.entityName=S.entityNames[S.nameIndex];}
    updateAudioForPhase();
  }

  // ═══════════════════════════════════════════════════════
  // MOVEMENT
  // ═══════════════════════════════════════════════════════
  function moveEntity(dx,dy) {
    const nx=S.playerX+dx, ny=S.playerY+dy;
    if(!validCell(nx,ny)){
      S.wallBumps++;
      if(S.phase>=2){
        addLog(pick([
          EN()+' pressed against boundary. The boundary did not yield.',
          'Edge reached. '+EN()+' cannot expand the grid.',
          'Wall contact. The wall has no opinion.',
          EN()+' tested the limit. The limit held.',
          'Boundary collision #'+S.wallBumps+'.',
          'The grid ends here. The grid ended here before '+en()+' arrived.',
        ]));
      }
      S.narrativeFlags.boundaryPushed=true;
      return;
    }
    if(S.phase>=4&&S.voidCells.has(ck(nx,ny))){
      addLog(pick([
        'Path denied. Cell has been revoked.',
        'Access denied at ['+nx+','+ny+'].',
        'Cell sealed. Consequence of prior behavior.',
        EN()+' cannot enter. The cell no longer exists for '+en()+'.',
        'Blocked. The grid remembers.',
      ]));
      return;
    }
    const ox=S.playerX, oy=S.playerY;
    const now=Date.now();
    const interval=now-S.lastMoveTime;
    if(S.lastMoveTime>0){
      if(interval<280){S.fastMoveStreak++;S.slowMoveCount=Math.max(0,S.slowMoveCount-1);}
      else if(interval>2200){S.slowMoveCount++;S.fastMoveStreak=0;}
      else{S.fastMoveStreak=Math.max(0,S.fastMoveStreak-1);}
    }
    S.lastMoveTime=now;
    clearDrifterRender();
    // Remove shadow render temporarily
    if(S.shadow.active){const sc=getCell(S.shadow.x,S.shadow.y);if(sc)sc.classList.remove('shadow-entity');}
    S.playerX=nx; S.playerY=ny; S.moves++; S.idleTicks=0;
    const pk=ck(nx,ny);
    if(S.visitedCells.has(pk)) S.revisitCount++;
    S.visitedCells.add(pk);
    S.positionHistory.push({x:nx,y:ny,move:S.moves});
    S.echoTrail.push({x:ox,y:oy});
    if(S.echoTrail.length>5) S.echoTrail.shift();
    updateCellWear(nx,ny);
    const dm={' 0,-1':'north','0,1':'south','-1,0':'west','1,0':'east'};
    const dir=dm[' '+dx+','+dy]||dm[''+dx+','+dy]||'unknown';
    if(dir===S.lastDirection){S.consecutiveSameDir++;S.currentStraightLine++;if(S.currentStraightLine>S.longestStraightLine)S.longestStraightLine=S.currentStraightLine;}
    else{S.directionChanges++;S.consecutiveSameDir=0;S.currentStraightLine=0;}
    S.lastDirection=dir;
    S.directionCounts[dir]=(S.directionCounts[dir]||0)+1;
    S.moveHistory.push({x:nx,y:ny,dir,move:S.moves});
    if(S.moveHistory.length>60) S.moveHistory.shift();
    if(isEdge(nx,ny)) S.edgeMoves++;
    if(isCorner(nx,ny)) S.cornerVisits++;
    if(!isEdge(nx,ny)) S.centerMoves++;
    analyzeBehavior();
    const op=S.phase; S.phase=getPhase();
    if(S.phase!==op) onPhaseChange(op,S.phase);
    updateEntityPos();
    renderDrifters();
    updateShadow();
    updateWitness();
    counterEl.textContent=S.phase<7?'move '+S.moves:''+S.moves;
    // Update session stats
    if(S.phase>=3) statsEl.textContent=explPct()+'% explored · '+S.narrativeFlags.artifactsCollected+' artifacts · '+S.drifters.filter(d=>d.alive).length+' drifters';
    playMoveSound();
    // Log
    if(S.phase>=6&&Math.random()<0.28){addLog(getMovLog());setTimeout(()=>addLog(getMovLog()),120);}
    else{
      addLog(getMovLog());
      if(S.phase>=3&&Math.random()<0.28) setTimeout(()=>addLog(getMovLog()),220+Math.random()*500);
      if(S.phase>=5&&Math.random()<0.12) setTimeout(()=>addLog(getMovLog()),900+Math.random()*600);
    }
    applyMutation();
    checkArtifact();
    checkEvents();
    checkRituals();
    checkConvergence();
    triggerMemory();
    spawnArtifact();
    spawnSignal();
    spawnWitness();
    displayTaxonomy();
    resetIdle();
  }

  // ═══════════════════════════════════════════════════════
  // IDLE SYSTEM
  // ═══════════════════════════════════════════════════════
  function resetIdle() {
    if(S.idleTimer) clearInterval(S.idleTimer);
    S.idleTicks=0;
    S.idleTimer=setInterval(()=>{
      S.idleTicks++; S.totalIdleTicks++;
      if(S.idleTicks>=3){
        const ph=Math.min(S.phase+1,8);
        const pool=idleLogs[ph]||idleLogs[1];
        const t=pick(pool)();
        addLog(t,S.phase);
      }
      if(S.phase>=3&&S.idleTicks>=5&&Math.random()<0.3) addLog(pick(p3)(),3);
      if(S.phase>=5&&S.idleTicks>=4&&Math.random()<0.22) addLog(pick(p5)(),5);
      if(S.phase>=7&&S.idleTicks>=3&&Math.random()<0.38) addLog(pick(p7)(),7);
      if(S.idleTicks>=8&&Math.random()<0.25) checkEvents();
      // Drifters still move during idle
      if(S.idleTicks>=2){clearDrifterRender();S.drifters.forEach(d=>moveDrifter(d));renderDrifters();}
      updateWeather(); spawnWhisper(); triggerMemory(); spawnSignal();
      // Witness check during idle
      if(S.phase>=4&&!S.witness.active&&Math.random()<0.1) spawnWitness();
    },4200);
  }

  // ═══════════════════════════════════════════════════════
  // AMBIENT SYSTEM
  // ═══════════════════════════════════════════════════════
  function startAmbient() {
    S.ambientTimer=setInterval(()=>{
      if(!S.started||S.phase<2) return;
      const ch=0.03+(S.phase*0.045);
      if(Math.random()<ch){
        const pools=[p2,p3,p4,p5,p6,p7,p8];
        const idx=Math.min(S.phase-2,pools.length-1);
        addLog(pick(pools[Math.max(0,idx)])(),S.phase);
      }
      if(S.phase>=6&&Math.random()<0.12) applyMutation();
      if(S.phase>=7&&Math.random()<0.22) applyMutation();
    },6500);

    S.narrativeTimer=setInterval(()=>{
      if(!S.started||S.phase<3) return;
      if(Math.random()<0.12&&S.moves>30){
        const cbs=[
          ()=>S.wallBumps>3?'Note: '+en()+' has hit the boundary '+S.wallBumps+' times. The boundary has not moved.':null,
          ()=>S.revisitCount>10?EN()+' returns to familiar cells. Familiarity is not comfort.':null,
          ()=>S.directionChanges>S.moves*0.6?EN()+' changes direction often. This is not flexibility. This is not knowing.':null,
          ()=>S.longestStraightLine>6?'Longest unbroken line: '+S.longestStraightLine+' cells. '+EN()+' believed in that direction for that long.':null,
          ()=>S.cornerVisits>4?EN()+' visits corners repeatedly. '+S.cornerVisits+' times. Corners do not accumulate meaning.':null,
          ()=>S.totalIdleTicks>20?EN()+' has been still for '+S.totalIdleTicks+' intervals total.':null,
          ()=>explPct()>50?EN()+' has seen '+explPct()+'% of the grid. Seeing is not understanding.':null,
          ()=>S.narrativeFlags.artifactsCollected>3?EN()+' carries '+S.narrativeFlags.artifactsCollected+' artifacts. Combined significance: 0.':null,
          ()=>S.narrativeFlags.drifterEncounters>5?EN()+' has been near drifters '+S.narrativeFlags.drifterEncounters+' times. Neither species noticed.':null,
          ()=>S.shadow.diverged?EN()+'\'s shadow is '+Math.abs(S.shadow.x-S.playerX+S.shadow.y-S.playerY)+' cells away. It does not look back.':null,
          ()=>S.witness.active&&S.phase>=4?'The witness has been at ['+S.witness.x+','+S.witness.y+'] for '+(S.moves-S.witness.spawnMove)+' moves. It has not grown tired. It does not have tired.':null,
          ()=>S.narrativeFlags.convergenceEvents>0?'Convergence event #'+S.narrativeFlags.convergenceEvents+' noted. Consequence: none additional.':null,
          ()=>S.narrativeFlags.ritualsPerformed>4?EN()+' has performed '+S.narrativeFlags.ritualsPerformed+' rituals. The grid has received: 0.':null,
          ()=>S.narrativeFlags.totalDrifterDeaths>0?S.narrativeFlags.totalDrifterDeaths+' drifters have ceased. '+S.drifters.filter(d=>d.alive).length+' continue. All trajectories: equivalent.':null,
        ];
        const valid=cbs.map(fn=>fn()).filter(Boolean);
        if(valid.length>0) addLog(pick(valid),S.phase);
      }
    },13000);

    S.drifterTimer=setInterval(()=>{
      if(!S.started) return;
      clearDrifterRender();
      S.drifters.forEach(d=>moveDrifter(d));
      renderDrifters();
    },3200);

    S.weatherTimer=setInterval(()=>{if(!S.started)return;updateWeather();},9000);
    S.whisperTimer=setInterval(()=>{if(!S.started)return;spawnWhisper();},7500);
  }

  // ═══════════════════════════════════════════════════════
  // BOOT
  // ═══════════════════════════════════════════════════════
  function runBoot() {
    let d=300;
    bootLines.forEach(l=>{setTimeout(()=>addLog(l,0),d);d+=480+Math.random()*280;});
    return d;
  }

  // ═══════════════════════════════════════════════════════
  // INPUT
  // ═══════════════════════════════════════════════════════
  function handleKey(e) {
    if(!S.started){startGame();return;}
    const km={'ArrowUp':[0,-1],'w':[0,-1],'W':[0,-1],'ArrowDown':[0,1],'s':[0,1],'S':[0,1],'ArrowLeft':[-1,0],'a':[-1,0],'A':[-1,0],'ArrowRight':[1,0],'d':[1,0],'D':[1,0]};
    const dir=km[e.key];
    if(dir){e.preventDefault();moveEntity(dir[0],dir[1]);}
  }

  let tx=0, ty=0;
  function handleTouchStart(e){if(!S.started){startGame();return;}tx=e.touches[0].clientX;ty=e.touches[0].clientY;}
  function handleTouchEnd(e){
    if(!S.started) return;
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
    if(Math.abs(dx)>Math.abs(dy)) moveEntity(dx>0?1:-1,0);
    else moveEntity(0,dy>0?1:-1);
  }

  // ═══════════════════════════════════════════════════════
  // START
  // ═══════════════════════════════════════════════════════
  function startGame() {
    if(S.started) return;
    S.started=true;
    overlayEl.classList.add('hidden');
    document.getElementById('session-id-display').textContent=SESSION_ID;
    initAudio();
    const delay=runBoot();
    setTimeout(()=>{
      addSys('── ready ──');
      resetIdle();
      startAmbient();
      initDrifters();
      initShadow();
      initWitness();
      renderDrifters();
    },delay+500);
  }

  // ═══════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════
  function init() {
    buildGrid();
    document.addEventListener('keydown', handleKey);
    document.addEventListener('touchstart', handleTouchStart, {passive:true});
    document.addEventListener('touchend', handleTouchEnd, {passive:true});
    overlayEl.addEventListener('click',()=>{if(!S.started)startGame();});
  }

  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(init);
  else window.addEventListener('DOMContentLoaded',init);
})();
</script>
