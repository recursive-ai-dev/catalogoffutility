<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABM GENERATOR</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --text-primary: #c8c8c8;
      --text-dim: #555555;
      --accent: #7a8a6e;
      --border: #1a1a1a;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      overflow: hidden;
    }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
    const SCALES = {
      "Natural Minor": [0,2,3,5,7,8,10],
      "Harmonic Minor": [0,2,3,5,7,8,11],
      "Dorian": [0,2,3,5,7,9,10],
      "Phrygian": [0,1,3,5,7,8,10],
    };

    const MODES = {
      "Frozen Tundra": { bpm: 68, style: "ambient" },
      "Twilight March": { bpm: 115, style: "melodic" },
      "Boreal Storm": { bpm: 172, style: "intense" },
      "Grief Eternal": { bpm: 78, style: "doom" },
      "Pale Autumn": { bpm: 140, style: "drive" },
    };

    function ABMGenerator() {
      const [isPlaying, setIsPlaying] = useState(false);
      const [selectedMode, setSelectedMode] = useState('Frozen Tundra');
      const [selectedScale, setSelectedScale] = useState('Natural Minor');
      const [currentNote, setCurrentNote] = useState('-');
      const synthRef = useRef(null);
      const loopRef = useRef(null);

      useEffect(() => {
        synthRef.current = new Tone.PolySynth(Tone.Synth).toDestination();
        return () => {
          if (loopRef.current) loopRef.current.stop();
          if (synthRef.current) synthRef.current.dispose();
        };
      }, []);

      const midiToNote = (midi) => {
        return NOTE_NAMES[((midi % 12) + 12) % 12] + (Math.floor(midi / 12) - 1);
      };

      const startAudio = async () => {
        await Tone.start();
        const mode = MODES[selectedMode];
        const scale = SCALES[selectedScale];

        Tone.Transport.bpm.value = mode.bpm;

        if (isPlaying) {
          Tone.Transport.stop();
          if (loopRef.current) loopRef.current.stop();
          setIsPlaying(false);
          setCurrentNote('-');
          return;
        }

        const notes = [];
        for (let oct = 3; oct <= 5; oct++) {
          for (const interval of scale) {
            notes.push(48 + (oct - 3) * 12 + interval);
          }
        }

        let noteIndex = 0;
        loopRef.current = new Tone.Loop((time) => {
          const note = notes[noteIndex % notes.length];
          const noteName = midiToNote(note);
          setCurrentNote(noteName);
          synthRef.current.triggerAttackRelease(noteName, '8n', time);
          noteIndex++;
        }, '8n');

        loopRef.current.start(0);
        Tone.Transport.start();
        setIsPlaying(true);
      };

      return (
        <div style={{
          height: '100%',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '2rem'
        }}>
          <h1 style={{
            fontSize: '2rem',
            fontWeight: 300,
            letterSpacing: '0.3em',
            marginBottom: '2rem'
          }}>ABM GENERATOR</h1>
          
          <p style={{ color: 'var(--text-dim)', marginBottom: '2rem', textAlign: 'center' }}>
            Atmospheric Black Metal progression generator
          </p>

          <div style={{ display: 'flex', gap: '1rem', marginBottom: '2rem', flexWrap: 'wrap', justifyContent: 'center' }}>
            <select
              value={selectedMode}
              onChange={(e) => setSelectedMode(e.target.value)}
              style={{
                background: 'var(--surface)',
                color: 'var(--text-primary)',
                border: '1px solid var(--border)',
                padding: '0.75rem 1rem',
                borderRadius: '4px',
                fontSize: '0.75rem',
                letterSpacing: '0.1em'
              }}
            >
              {Object.keys(MODES).map(mode => (
                <option key={mode} value={mode}>{mode}</option>
              ))}
            </select>

            <select
              value={selectedScale}
              onChange={(e) => setSelectedScale(e.target.value)}
              style={{
                background: 'var(--surface)',
                color: 'var(--text-primary)',
                border: '1px solid var(--border)',
                padding: '0.75rem 1rem',
                borderRadius: '4px',
                fontSize: '0.75rem',
                letterSpacing: '0.1em'
              }}
            >
              {Object.keys(SCALES).map(scale => (
                <option key={scale} value={scale}>{scale}</option>
              ))}
            </select>
          </div>

          <button
            onClick={startAudio}
            style={{
              background: isPlaying ? 'var(--accent)' : 'var(--surface)',
              color: 'var(--text-primary)',
              border: '1px solid var(--border)',
              padding: '1rem 2rem',
              borderRadius: '999px',
              cursor: 'pointer',
              fontSize: '0.75rem',
              letterSpacing: '0.2em',
              transition: 'all 0.2s ease'
            }}
          >
            {isPlaying ? 'STOP' : 'START'}
          </button>

          {isPlaying && (
            <div style={{
              marginTop: '2rem',
              padding: '1rem 2rem',
              background: 'var(--surface)',
              border: '1px solid var(--border)',
              borderRadius: '4px'
            }}>
              <span style={{ color: 'var(--text-dim)', fontSize: '0.625rem', letterSpacing: '0.2em' }}>CURRENT NOTE</span>
              <div style={{ fontSize: '1.5rem', marginTop: '0.5rem' }}>{currentNote}</div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ABMGenerator />);
  </script>
</body>
</html>
