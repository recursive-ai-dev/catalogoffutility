<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#030308"/>
  <!-- Scan lines -->
  <g stroke="#0a1a0a" stroke-opacity="0.5" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="520" x2="800" y2="520"/>
    <line x1="0" y1="560" x2="800" y2="560"/>
  </g>
  <!-- Radial glow behind figure -->
  <radialGradient id="glow" cx="50%" cy="45%" r="35%">
    <stop offset="0%" stop-color="#00c864" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#00c864" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#glow)"/>
  <!-- Silhouette: Agent Smith figure (abstract) -->
  <!-- Body -->
  <rect x="345" y="200" width="110" height="180" rx="6" fill="#0a1a0a" stroke="#00c864" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Head -->
  <rect x="362" y="145" width="76" height="70" rx="8" fill="#0a1a0a" stroke="#00c864" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Eyes -->
  <rect x="375" y="168" width="18" height="8" rx="2" fill="#00c864" fill-opacity="0.7"/>
  <rect x="407" y="168" width="18" height="8" rx="2" fill="#00c864" fill-opacity="0.7"/>
  <!-- Tie -->
  <rect x="393" y="200" width="14" height="60" rx="2" fill="#00c864" fill-opacity="0.15" stroke="#00c864" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Left arm -->
  <rect x="300" y="205" width="45" height="14" rx="4" fill="#0a1a0a" stroke="#00c864" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Right arm -->
  <rect x="455" y="205" width="45" height="14" rx="4" fill="#0a1a0a" stroke="#00c864" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Legs -->
  <rect x="352" y="375" width="38" height="80" rx="4" fill="#0a1a0a" stroke="#00c864" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="410" y="375" width="38" height="80" rx="4" fill="#0a1a0a" stroke="#00c864" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Terminal text lines overlaid -->
  <rect x="60" y="90" width="200" height="7" rx="2" fill="#00c864" fill-opacity="0.08"/>
  <rect x="60" y="106" width="140" height="7" rx="2" fill="#00c864" fill-opacity="0.05"/>
  <rect x="60" y="122" width="170" height="7" rx="2" fill="#00c864" fill-opacity="0.06"/>
  <rect x="540" y="90" width="200" height="7" rx="2" fill="#00c864" fill-opacity="0.08"/>
  <rect x="540" y="106" width="160" height="7" rx="2" fill="#00c864" fill-opacity="0.05"/>
  <rect x="540" y="122" width="140" height="7" rx="2" fill="#00c864" fill-opacity="0.06"/>
  <!-- Bottom terminal -->
  <rect x="60" y="500" width="680" height="8" rx="2" fill="#00c864" fill-opacity="0.07"/>
  <rect x="60" y="516" width="440" height="8" rx="2" fill="#00c864" fill-opacity="0.05"/>
  <!-- Cursor -->
  <rect x="60" y="535" width="7" height="12" rx="1" fill="#00c864" fill-opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="565" font-family="monospace" font-size="10" fill="#00c864" fill-opacity="0.5" text-anchor="middle" letter-spacing="8">AGENT SMITH // #892</text>
</svg>
