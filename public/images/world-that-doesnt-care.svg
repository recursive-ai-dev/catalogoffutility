    <rect x="200" y="150" width="2" height="20"/>
    <rect x="300" y="200" width="2" height="20"/>
    <rect x="400" y="250" width="2" height="20"/>
    <rect x="500" y="300" width="2" height="20"/>
    <rect x="600" y="350" width="2" height="20"/>
    <rect x="700" y="400" width="2" height="20"/>
