  <text x="400" y="550" text-anchor="middle" font-family="Space Grotesk" font-size="28" fill="#4a90e2" opacity="0.9">THE WORLD THAT DOESN'T CARE</text>
  <!-- Log entries -->
  <text x="100" y="50" font-family="Courier New" font-size="10" fill="#ffffff" opacity="0.6">[00:01:23] Entity_7 moved from (150,150) to (160,160)</text>
