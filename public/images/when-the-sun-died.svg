<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a1a"/>
  <!-- Star field -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="100" cy="150" r="2"/>
    <circle cx="200" cy="250" r="1"/>
    <circle cx="300" cy="100" r="3"/>
    <circle cx="400" cy="300" r="1"/>
    <circle cx="500" cy="200" r="2"/>
    <circle cx="600" cy="400" r="1"/>
    <circle cx="700" cy="350" r="2"/>
    <circle cx="150" cy="450" r="1"/>
    <circle cx="250" cy="500" r="2"/>
    <circle cx="350" cy="400" r="1"/>
    <circle cx="450" cy="550" r="2"/>
    <circle cx="550" cy="450" r="1"/>
    <circle cx="650" cy="500" r="2"/>
    <circle cx="750" cy="250" r="1"/>
  </g>
  <!-- Dying star -->
  <radialGradient id="starGradient" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff9900"/>
    <stop offset="50%" stop-color="#ff3300"/>
    <stop offset="100%" stop-color="#990000"/>
  </radialGradient>
  <circle cx="400" cy="300" r="80" fill="url(#starGradient)" opacity="0.9"/>
  <!-- Supernova effect -->
  <circle cx="400" cy="300" r="120" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="300" r="160" fill="none" stroke="#ff9900" stroke-width="1" opacity="0.2"/>
  <!-- Text overlay -->
  <text x="400" y="320" text-anchor="middle" font-family="Space Grotesk" font-size="24" fill="#ffffff" opacity="0.8">WHEN THE SUN DIED</text>
</svg>