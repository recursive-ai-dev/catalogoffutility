<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0d0d1a"/>
  <!-- Graph nodes -->
  <g fill="#4a90e2">
    <circle cx="200" cy="200" r="20"/>
    <circle cx="300" cy="150" r="20"/>
    <circle cx="400" cy="250" r="20"/>
    <circle cx="500" cy="200" r="20"/>
    <circle cx="600" cy="150" r="20"/>
    <circle cx="200" cy="400" r="20"/>
    <circle cx="300" cy="450" r="20"/>
    <circle cx="400" cy="350" r="20"/>
    <circle cx="500" cy="400" r="20"/>
    <circle cx="600" cy="450" r="20"/>
  </g>
  <!-- Edges -->
  <g stroke="#4a90e2" stroke-width="2" opacity="0.7">
    <line x1="200" y1="200" x2="300" y2="150"/>
    <line x1="300" y1="150" x2="400" y2="250"/>
    <line x1="400" y1="250" x2="500" y2="200"/>
    <line x1="500" y1="200" x2="600" y2="150"/>
    <line x1="200" y1="400" x2="300" y2="450"/>
    <line x1="300" y1="450" x2="400" y2="350"/>
    <line x1="400" y1="350" x2="500" y2="400"/>
    <line x1="500" y1="400" x2="600" y2="450"/>
    <line x1="200" y1="200" x2="200" y2="400"/>
    <line x1="300" y1="150" x2="300" y2="450"/>
    <line x1="400" y1="250" x2="400" y2="350"/>
    <line x1="500" y1="200" x2="500" y2="400"/>
    <line x1="600" y1="150" x2="600" y2="450"/>
  </g>
  <!-- Labels -->
  <text x="200" y="180" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Hope</text>
  <text x="300" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Conflict</text>
  <text x="400" y="230" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Climax</text>
  <text x="500" y="180" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Resolution</text>
  <text x="600" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Tragedy</text>
  <text x="200" y="380" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Dread</text>
  <text x="300" y="430" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Transformation</text>
  <text x="400" y="330" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Revelation</text>
  <text x="500" y="380" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Acceptance</text>
  <text x="600" y="430" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">Epiphany</text>
  <!-- Title -->
  <text x="400" y="550" text-anchor="middle" font-family="Space Grotesk" font-size="28" fill="#4a90e2" opacity="0.9">NARRATIVE BEAT GRAPH</text>
</svg>