<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#040410"/>
  <!-- Scan lines -->
  <g stroke="#0a0a30" stroke-opacity="0.4" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="550" x2="800" y2="550"/>
  </g>
  <!-- Neural network nodes -->
  <g fill="none" stroke="#1a1a6e" stroke-width="1" stroke-opacity="0.6">
    <line x1="100" y1="300" x2="280" y2="180"/>
    <line x1="100" y1="300" x2="280" y2="300"/>
    <line x1="100" y1="300" x2="280" y2="420"/>
    <line x1="280" y1="180" x2="460" y2="210"/>
    <line x1="280" y1="180" x2="460" y2="300"/>
    <line x1="280" y1="300" x2="460" y2="210"/>
    <line x1="280" y1="300" x2="460" y2="300"/>
    <line x1="280" y1="300" x2="460" y2="390"/>
    <line x1="280" y1="420" x2="460" y2="300"/>
    <line x1="280" y1="420" x2="460" y2="390"/>
    <line x1="460" y1="210" x2="640" y2="300"/>
    <line x1="460" y1="300" x2="640" y2="300"/>
    <line x1="460" y1="390" x2="640" y2="300"/>
    <line x1="640" y1="300" x2="720" y2="300"/>
  </g>
  <!-- Active pulse line -->
  <line x1="100" y1="300" x2="720" y2="300" stroke="#3030cc" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="8,6"/>
  <!-- Nodes -->
  <circle cx="100" cy="300" r="8" fill="#0a0a40" stroke="#4444cc" stroke-width="1.5" stroke-opacity="0.8"/>
  <circle cx="280" cy="180" r="6" fill="#0a0a40" stroke="#3333aa" stroke-width="1" stroke-opacity="0.7"/>
  <circle cx="280" cy="300" r="6" fill="#0a0a40" stroke="#3333aa" stroke-width="1" stroke-opacity="0.7"/>
  <circle cx="280" cy="420" r="6" fill="#0a0a40" stroke="#3333aa" stroke-width="1" stroke-opacity="0.7"/>
  <circle cx="460" cy="210" r="6" fill="#0a0a40" stroke="#3333aa" stroke-width="1" stroke-opacity="0.7"/>
  <circle cx="460" cy="300" r="7" fill="#0a0a50" stroke="#5555cc" stroke-width="1.5" stroke-opacity="0.9"/>
  <circle cx="460" cy="390" r="6" fill="#0a0a40" stroke="#3333aa" stroke-width="1" stroke-opacity="0.7"/>
  <circle cx="640" cy="300" r="8" fill="#0a0a40" stroke="#4444cc" stroke-width="1.5" stroke-opacity="0.8"/>
  <!-- Terminal text lines -->
  <rect x="160" y="80" width="480" height="10" rx="2" fill="#0d0d3a" fill-opacity="0.7"/>
  <rect x="160" y="100" width="320" height="10" rx="2" fill="#0d0d3a" fill-opacity="0.5"/>
  <rect x="160" y="480" width="400" height="10" rx="2" fill="#0d0d3a" fill-opacity="0.7"/>
  <rect x="160" y="500" width="240" height="10" rx="2" fill="#0d0d3a" fill-opacity="0.5"/>
  <!-- Cursor blink -->
  <rect x="160" y="520" width="8" height="14" rx="1" fill="#5555cc" fill-opacity="0.7"/>
  <!-- Title -->
  <text x="400" y="560" font-family="monospace" font-size="11" fill="#3333aa" fill-opacity="0.6" text-anchor="middle" letter-spacing="6">NEURAL RUNNER // v3</text>
</svg>
