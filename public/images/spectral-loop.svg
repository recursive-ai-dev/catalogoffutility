<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a1a"/>
  <!-- Oscilloscope display -->
  <rect x="100" y="100" width="600" height="300" fill="#1a1a2e" rx="8" ry="8"/>
  <!-- Waveform -->
  <g stroke="#4ade80" stroke-width="2">
    <path d="M120,250 Q150,200 180,250 Q210,300 240,250 Q270,200 300,250 Q330,300 360,250 Q390,200 420,250 Q450,300 480,250 Q510,200 540,250 Q570,300 600,250"/>
  </g>
  <!-- Frequency spectrum -->
  <g fill="#4ade80" opacity="0.7">
    <rect x="120" y="320" width="20" height="40"/>
    <rect x="150" y="310" width="20" height="50"/>
    <rect x="180" y="330" width="20" height="30"/>
    <rect x="210" y="300" width="20" height="60"/>
    <rect x="240" y="320" width="20" height="40"/>
    <rect x="270" y="310" width="20" height="50"/>
    <rect x="300" y="330" width="20" height="30"/>
    <rect x="330" y="300" width="20" height="60"/>
    <rect x="360" y="320" width="20" height="40"/>
    <rect x="390" y="310" width="20" height="50"/>
    <rect x="420" y="330" width="20" height="30"/>
    <rect x="450" y="300" width="20" height="60"/>
    <rect x="480" y="320" width="20" height="40"/>
    <rect x="510" y="310" width="20" height="50"/>
    <rect x="540" y="330" width="20" height="30"/>
    <rect x="570" y="300" width="20" height="60"/>
    <rect x="600" y="320" width="20" height="40"/>
  </g>
  <!-- Static interference -->
  <g stroke="#ff6666" stroke-width="1" opacity="0.3">
    <line x1="100" y1="100" x2="700" y2="400"/>
    <line x1="100" y1="400" x2="700" y2="100"/>
    <line x1="100" y1="250" x2="700" y2="250"/>
    <line x1="400" y1="100" x2="400" y2="400"/>
  </g>
  <!-- Signal indicators -->
  <text x="120" y="90" font-family="Courier New" font-size="12" fill="#ffffff" opacity="0.8">FREQ: 1420.405751 MHz</text>
  <text x="120" y="110" font-family="Courier New" font-size="12" fill="#ffffff" opacity="0.8">SIGNAL: DETECTED</text>
  <text x="120" y="130" font-family="Courier New" font-size="12" fill="#ffffff" opacity="0.8">STATUS: LOOPING</text>
  <!-- Title -->
  <text x="400" y="550" text-anchor="middle" font-family="Space Grotesk" font-size="28" fill="#4ade80" opacity="0.9">SPECTRAL LOOP</text>
</svg>