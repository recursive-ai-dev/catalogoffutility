<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a1a"/>
  <!-- Dialogue tree -->
  <g stroke="#4a90e2" stroke-width="2" opacity="0.5">
    <!-- Root -->
    <circle cx="400" cy="100" r="20" fill="#2d2d44"/>
    <!-- Level 1 -->
    <circle cx="250" cy="200" r="15" fill="#2d2d44"/>
    <circle cx="550" cy="200" r="15" fill="#2d2d44"/>
    <!-- Level 2 -->
    <circle cx="150" cy="300" r="12" fill="#2d2d44"/>
    <circle cx="350" cy="300" r="12" fill="#2d2d44"/>
    <circle cx="450" cy="300" r="12" fill="#2d2d44"/>
    <circle cx="650" cy="300" r="12" fill="#2d2d44"/>
    <!-- Level 3 -->
    <circle cx="100" cy="400" r="10" fill="#2d2d44"/>
    <circle cx="200" cy="400" r="10" fill="#2d2d44"/>
    <circle cx="300" cy="400" r="10" fill="#2d2d44"/>
    <circle cx="400" cy="400" r="10" fill="#2d2d44"/>
    <circle cx="500" cy="400" r="10" fill="#2d2d44"/>
    <circle cx="600" cy="400" r="10" fill="#2d2d44"/>
    <circle cx="700" cy="400" r="10" fill="#2d2d44"/>
  </g>
  <!-- Connections -->
  <g stroke="#4a90e2" stroke-width="1" opacity="0.7">
    <line x1="400" y1="100" x2="250" y2="200"/>
    <line x1="400" y1="100" x2="550" y2="200"/>
    <line x1="250" y1="200" x2="150" y2="300"/>
    <line x1="250" y1="200" x2="350" y2="300"/>
    <line x1="550" y1="200" x2="450" y2="300"/>
    <line x1="550" y1="200" x2="650" y2="300"/>
    <line x1="150" y1="300" x2="100" y2="400"/>
    <line x1="150" y1="300" x2="200" y2="400"/>
    <line x1="350" y1="300" x2="300" y2="400"/>
    <line x1="350" y1="300" x2="400" y2="400"/>
    <line x1="450" y1="300" x2="500" y2="400"/>
    <line x1="450" y1="300" x2="600" y2="400"/>
    <line x1="650" y1="300" x2="700" y2="400"/>
  </g>
  <!-- Ghost branches (not taken) -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.2">
    <line x1="400" y1="100" x2="300" y2="200"/>
    <line x1="400" y1="100" x2="450" y2="200"/>
    <line x1="250" y1="200" x2="200" y2="300"/>
    <line x1="250" y1="200" x2="400" y2="300"/>
    <line x1="550" y1="200" x2="500" y2="300"/>
    <line x1="550" y1="200" x2="600" y2="300"/>
  </g>
  <!-- Labels -->
  <text x="400" y="90" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">START</text>
  <text x="250" y="190" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">CHOICE A</text>
  <text x="550" y="190" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#ffffff" opacity="0.8">CHOICE B</text>
  <text x="150" y="290" text-anchor="middle" font-family="Space Grotesk" font-size="10" fill="#ffffff" opacity="0.7">PATH 1</text>
  <text x="350" y="290" text-anchor="middle" font-family="Space Grotesk" font-size="10" fill="#ffffff" opacity="0.7">PATH 2</text>
  <text x="450" y="290" text-anchor="middle" font-family="Space Grotesk" font-size="10" fill="#ffffff" opacity="0.7">PATH 3</text>
  <text x="650" y="290" text-anchor="middle" font-family="Space Grotesk" font-size="10" fill="#ffffff" opacity="0.7">PATH 4</text>
  <!-- Title -->
  <text x="400" y="550" text-anchor="middle" font-family="Space Grotesk" font-size="28" fill="#4a90e2" opacity="0.9">LUDIC STRATA</text>
</svg>