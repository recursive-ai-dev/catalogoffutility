<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a1a"/>
  <!-- Street -->
  <rect x="0" y="400" width="800" height="200" fill="#1a1a2e"/>
  <!-- Street lights -->
  <g fill="#ffcc00">
    <circle cx="100" cy="100" r="15"/>
    <circle cx="300" cy="120" r="15"/>
    <circle cx="500" cy="110" r="15"/>
    <circle cx="700" cy="90" r="15"/>
  </g>
  <!-- Light beams -->
  <g fill="#ffcc00" opacity="0.2">
    <ellipse cx="100" cy="100" rx="80" ry="200"/>
    <ellipse cx="300" cy="120" rx="80" ry="200"/>
    <ellipse cx="500" cy="110" rx="80" ry="200"/>
    <ellipse cx="700" cy="90" rx="80" ry="200"/>
  </g>
  <!-- Street details -->
  <g stroke="#333344" stroke-width="2" opacity="0.5">
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="460" x2="800" y2="460"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="520" x2="800" y2="520"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="0" y1="560" x2="800" y2="560"/>
    <line x1="0" y1="580" x2="800" y2="580"/>
  </g>
  <!-- Person silhouette -->
  <rect x="400" y="450" width="20" height="60" fill="#ffffff" opacity="0.3"/>
  <!-- Title -->
  <text x="400" y="550" text-anchor="middle" font-family="Space Grotesk" font-size="28" fill="#ffffff" opacity="0.8">2:35 AM</text>
  <!-- Time indicator -->
  <text x="400" y="150" text-anchor="middle" font-family="Courier New" font-size="24" fill="#ffcc00" opacity="0.9">02:35:00</text>
</svg>