    <line x1="0" y1="310" x2="800" y2="310" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="330" x2="800" y2="330" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="340" x2="800" y2="340" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#e94560" stroke-width="2"/>
