    <line x1="0" y1="200" x2="800" y2="200" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="210" x2="800" y2="210" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="220" x2="800" y2="220" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="230" x2="800" y2="230" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#e94560" stroke-width="2"/>
