    <line x1="0" y1="420" x2="800" y2="420" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="430" x2="800" y2="430" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="440" x2="800" y2="440" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="460" x2="800" y2="460" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="470" x2="800" y2="470" stroke="#e94560" stroke-width="2"/>
