    <line x1="0" y1="490" x2="800" y2="490" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="510" x2="800" y2="510" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="520" x2="800" y2="520" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="530" x2="800" y2="530" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="540" x2="800" y2="540" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="550" x2="800" y2="550" stroke="#e94560" stroke-width="2"/>
