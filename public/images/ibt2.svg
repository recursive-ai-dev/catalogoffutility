    <line x1="0" y1="590" x2="800" y2="590" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="600" x2="800" y2="600" stroke="#e94560" stroke-width="2"/>
  </g>
  
  <!-- Terminal border -->
  <rect x="50" y="100" width="700" height="400" fill="none" stroke="#e94560" stroke-width="4" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Inner terminal screen -->
  <rect x="60" y="110" width="680" height="380" fill="#0a0a0a" opacity="0.9"/>
  
  <!-- IBT2 Title -->
  <text x="400" y="220" text-anchor="middle" font-family="Courier New, monospace" font-size="72" font-weight="bold" fill="#e94560" filter="url(#glow)">IBT2</text>
  
  <!-- Subtitle -->
  <text x="400" y="270" text-anchor="middle" font-family="Courier New, monospace" font-size="20" fill="#ff6b7a" opacity="0.9">IMAGINE BEING TRAPPED</text>
  
  <!-- Terminal prompt -->
  <text x="100" y="350" font-family="Courier New, monospace" font-size="16" fill="#e94560" opacity="0.8">&gt; INITIALIZING TERROR PROTOCOLS...</text>
  <text x="100" y="380" font-family="Courier New, monospace" font-size="16" fill="#e94560" opacity="0.8">&gt; SANITY LEVEL: CRITICAL</text>
  <text x="100" y="410" font-family="Courier New, monospace" font-size="16" fill="#e94560" opacity="0.8">&gt; ENTITIES: ACTIVE</text>
  
  <!-- Blinking cursor -->
  <rect x="340" y="425" width="12" height="20" fill="#e94560" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Warning symbol -->
  <text x="400" y="550" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#ff6b7a" opacity="0.7">⚠️ THE DARKNESS SEES YOU...</text>
  
  <!-- Corner decorations -->
  <g stroke="#e94560" stroke-width="2" opacity="0.5">
    <line x1="40" y1="80" x2="80" y2="80"/>
    <line x1="40" y1="80" x2="40" y2="120"/>
    <line x1="760" y1="80" x2="720" y2="80"/>
    <line x1="760" y1="80" x2="760" y2="120"/>
    <line x1="40" y1="520" x2="80" y2="520"/>
    <line x1="40" y1="520" x2="40" y2="480"/>
    <line x1="760" y1="520" x2="720" y2="520"/>
    <line x1="760" y1="520" x2="760" y2="480"/>
  </g>
