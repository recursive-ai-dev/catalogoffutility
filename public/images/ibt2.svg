    <line x1="0" y1="110" x2="800" y2="110" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="130" x2="800" y2="130" stroke="#e94560" stroke-width="2"/>
