<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terminalGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff6b7a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark terminal background -->
  <rect width="800" height="600" fill="#0f0f23"/>
  
  <!-- CRT scanlines -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#e94560" stroke-width="2"/>
