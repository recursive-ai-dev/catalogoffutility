<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a1a"/>
  <!-- Game board -->
  <rect x="200" y="150" width="400" height="300" fill="#1a1a2e" rx="8" ry="8"/>
  <!-- Grid lines -->
  <g stroke="#333344" stroke-width="1" opacity="0.5">
    <!-- Horizontal -->
    <line x1="200" y1="150" x2="600" y2="150"/>
    <line x1="200" y1="200" x2="600" y2="200"/>
    <line x1="200" y1="250" x2="600" y2="250"/>
    <line x1="200" y1="300" x2="600" y2="300"/>
    <line x1="200" y1="350" x2="600" y2="350"/>
    <line x1="200" y1="400" x2="600" y2="400"/>
    <line x1="200" y1="450" x2="600" y2="450"/>
    <!-- Vertical -->
    <line x1="200" y1="150" x2="200" y2="450"/>
    <line x1="250" y1="150" x2="250" y2="450"/>
    <line x1="300" y1="150" x2="300" y2="450"/>
    <line x1="350" y1="150" x2="350" y2="450"/>
    <line x1="400" y1="150" x2="400" y2="450"/>
    <line x1="450" y1="150" x2="450" y2="450"/>
    <line x1="500" y1="150" x2="500" y2="450"/>
    <line x1="550" y1="150" x2="550" y2="450"/>
    <line x1="600" y1="150" x2="600" y2="450"/>
  </g>
  <!-- Crimson pieces -->
  <g fill="#ff3333">
    <circle cx="225" cy="175" r="12"/>
    <circle cx="275" cy="225" r="12"/>
    <circle cx="325" cy="275" r="12"/>
    <circle cx="375" cy="325" r="12"/>
    <circle cx="425" cy="375" r="12"/>
    <circle cx="475" cy="425" r="12"/>
    <circle cx="525" cy="375" r="12"/>
    <circle cx="575" cy="325" r="12"/>
  </g>
  <!-- Azure pieces -->
  <g fill="#4ade80">
    <circle cx="225" cy="425" r="12"/>
    <circle cx="275" cy="375" r="12"/>
    <circle cx="325" cy="325" r="12"/>
    <circle cx="375" cy="275" r="12"/>
    <circle cx="425" cy="225" r="12"/>
    <circle cx="475" cy="175" r="12"/>
    <circle cx="525" cy="225" r="12"/>
    <circle cx="575" cy="275" r="12"/>
  </g>
  <!-- Nexus (center) -->
  <circle cx="400" cy="300" r="20" fill="#ffcc00"/>
  <text x="400" y="305" text-anchor="middle" font-family="Space Grotesk" font-size="12" fill="#000000">NEXUS</text>
  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="Space Grotesk" font-size="28" fill="#ff3333" opacity="0.9">NEXUS WAR</text>
  <!-- Faction indicators -->
  <text x="250" y="120" font-family="Courier New" font-size="14" fill="#ff3333">CRIMSON</text>
  <text x="550" y="120" font-family="Courier New" font-size="14" fill="#4ade80">AZURE</text>
</svg>