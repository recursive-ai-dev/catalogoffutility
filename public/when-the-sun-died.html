<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHEN THE SUN DIED</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:wght@400;700&display=swap');

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0c0a09;
      }

      /* CRT scanline effect */

      #root::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          rgba(251, 191, 36, 0.03) 50%,
          transparent 50%
        );
        background-size: 100% 4px;
        z-index: 1000;
        pointer-events: none;
        animation: scan 8s linear infinite;
      }

      @keyframes scan {
        0% { transform: translateY(0); }
        100% { transform: translateY(10px); }
      }

      /* CRT flicker */

      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.98; }
      }

      #root {
        animation: flicker 0.15s infinite;
      }

      /* Custom scrollbar */

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #1c1917;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: #92400e;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #d97706;
      }
    </style>
