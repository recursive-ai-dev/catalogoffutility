<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHEN THE SUN DIED</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=VT323&display=swap");

      :root {
        --bg: #080604;
        --amber: #d97706;
        --amber-dim: #92400e;
        --text: #f3e6cf;
        --text-dim: #c9ac80;
        --glass: rgba(22, 14, 10, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
        font-family: "Courier Prime", monospace;
      }

      #bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.26;
        filter: saturate(0.45) contrast(1.05) brightness(0.55);
        z-index: 0;
      }

      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.72) 100%);
        z-index: 1;
      }

      .scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 8;
        background: linear-gradient(rgba(217, 119, 6, 0.05) 50%, transparent 50%);
        background-size: 100% 4px;
        animation: scan 8s linear infinite;
      }

      @keyframes scan {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(10px);
        }
      }

      .app {
        position: relative;
        z-index: 5;
        display: grid;
        grid-template-rows: auto 1fr auto;
        width: 100%;
        height: 100%;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 22px;
        border-bottom: 1px solid rgba(217, 119, 6, 0.25);
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.25));
      }

      .title {
        margin: 0;
        font-family: "VT323", monospace;
        font-size: clamp(1.6rem, 2.6vw, 2.4rem);
        letter-spacing: 0.15em;
        color: var(--text);
      }

      .status {
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .main {
        display: grid;
        grid-template-columns: minmax(220px, 26%) 1fr;
        min-height: 0;
      }

      .chapters {
        border-right: 1px solid rgba(217, 119, 6, 0.18);
        background: var(--glass);
        padding: 16px;
        overflow-y: auto;
      }

      .chapter-btn {
        width: 100%;
        display: block;
        text-align: left;
        margin: 0 0 8px 0;
        padding: 12px;
        border: 1px solid rgba(217, 119, 6, 0.18);
        background: rgba(0, 0, 0, 0.22);
        color: var(--text-dim);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.84rem;
        letter-spacing: 0.04em;
      }

      .chapter-btn.active {
        border-color: rgba(217, 119, 6, 0.56);
        background: rgba(217, 119, 6, 0.12);
        color: var(--text);
      }

      .content {
        display: grid;
        grid-template-rows: auto auto 1fr;
        padding: 20px;
        gap: 14px;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.5));
        min-height: 0;
      }

      .chapter-title {
        margin: 0;
        font-family: "VT323", monospace;
        font-size: clamp(1.4rem, 2.6vw, 2.2rem);
        letter-spacing: 0.12em;
        color: #ffd9a1;
      }

      .chapter-description {
        margin: 0;
        color: var(--text-dim);
        line-height: 1.55;
        max-width: 72ch;
      }

      .logs {
        margin: 0;
        padding: 0;
        list-style: none;
        overflow-y: auto;
        border: 1px solid rgba(217, 119, 6, 0.2);
        background: rgba(0, 0, 0, 0.34);
      }

      .log {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(217, 119, 6, 0.1);
        color: #f6dfb7;
        line-height: 1.5;
        opacity: 0;
        animation: reveal 260ms ease forwards;
      }

      .log:last-child {
        border-bottom: 0;
      }

      .log-time {
        color: var(--amber);
        margin-right: 8px;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 20px 16px;
        border-top: 1px solid rgba(217, 119, 6, 0.22);
        background: rgba(0, 0, 0, 0.45);
      }

      .control-group {
        display: flex;
        gap: 8px;
      }

      button.ctrl {
        border: 1px solid rgba(217, 119, 6, 0.3);
        background: rgba(18, 10, 6, 0.8);
        color: var(--text-dim);
        padding: 9px 12px;
        cursor: pointer;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.72rem;
      }

      button.ctrl:hover {
        color: var(--text);
        border-color: rgba(217, 119, 6, 0.64);
      }

      .progress {
        font-size: 0.76rem;
        letter-spacing: 0.14em;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .start-overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        background: rgba(0, 0, 0, 0.86);
        padding: 24px;
      }

      .start-overlay.hidden {
        display: none;
      }

      .start-overlay h2 {
        margin: 0;
        font-family: "VT323", monospace;
        font-size: clamp(2rem, 5vw, 3.2rem);
        letter-spacing: 0.18em;
        color: #ffcc86;
      }

      .start-overlay p {
        margin: 0;
        max-width: 52ch;
        color: var(--text-dim);
        line-height: 1.6;
      }

      #audio-status {
        color: var(--amber);
      }

      @media (max-width: 900px) {
        .main {
          grid-template-columns: 1fr;
          grid-template-rows: 180px 1fr;
        }

        .chapters {
          border-right: 0;
          border-bottom: 1px solid rgba(217, 119, 6, 0.18);
          display: grid;
          grid-auto-flow: column;
          grid-auto-columns: minmax(180px, 1fr);
          overflow-x: auto;
          overflow-y: hidden;
          gap: 8px;
        }

        .chapter-btn {
          margin-bottom: 0;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <video id="bg-video" autoplay muted loop playsinline></video>
    <audio id="bg-audio" preload="auto" loop></audio>

    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div class="app">
      <header class="top-bar">
        <h1 class="title">WHEN THE SUN DIED</h1>
        <div class="status">ARCHIVE LINK STABLE | <span id="audio-status">AUDIO READY</span></div>
      </header>

      <main class="main">
        <aside class="chapters" id="chapters"></aside>
        <section class="content">
          <h2 class="chapter-title" id="chapter-title"></h2>
          <p class="chapter-description" id="chapter-description"></p>
          <ul class="logs" id="log-feed"></ul>
        </section>
      </main>

      <footer class="controls">
        <div class="control-group">
          <button class="ctrl" id="prev-btn" type="button">Prev</button>
          <button class="ctrl" id="next-btn" type="button">Next</button>
        </div>
        <div class="control-group">
          <button class="ctrl" id="mode-btn" type="button">Mode: Classical</button>
          <button class="ctrl" id="mute-btn" type="button">Audio: On</button>
        </div>
        <div class="progress" id="progress"></div>
      </footer>
    </div>

    <div class="start-overlay" id="start-overlay">
      <h2>BEGIN TRANSMISSION</h2>
      <p>
        The footage and soundtrack archives are now available.
        Initialize playback to review the final five phases.
      </p>
      <button class="ctrl" id="start-btn" type="button">Initialize</button>
    </div>

    <script>
      const phases = [
        {
          id: "LOG-00",
          title: "PRE-EVENT // ROUTINE",
          description: "Ordinary fragments before thermal collapse. Signals are calm. Voices are casual.",
          video: "/videos/bar-ambient.mp4",
          classical: "/soundtrack/phase-a-denial-classical.wav",
          hiphop: "/soundtrack/denial_hiphop.mp3",
          logs: [
            "[00:08:11] Transit reports stable weather over Sector 3.",
            "[00:11:49] Librarian note: ambient noise elevated, no source identified.",
            "[00:14:10] Recommendation: continue observations."
          ]
        },
        {
          id: "PHASE-A",
          title: "DENIAL // FALSE DAWN",
          description: "The sky dims by fractions and everyone calls it cloud cover.",
          video: "/videos/beach-ambient.mp4",
          classical: "/soundtrack/phase-a-denial-classical.wav",
          hiphop: "/soundtrack/denial_hiphop.mp3",
          logs: [
            "[01:02:02] Stellar output down 3.8%. Instrument recalibration requested.",
            "[01:08:17] Public bulletin labels event as temporary anomaly.",
            "[01:15:42] Children ask why noon looks like late evening."
          ]
        },
        {
          id: "PHASE-B",
          title: "HEIGHTENED // STATIC",
          description: "Every screen carries emergency graphics. No one agrees on the timeline.",
          video: "/videos/rooftop-ambient.mp4",
          classical: "/soundtrack/phase-b-heightened-classical.wav",
          hiphop: "/soundtrack/heightened_hiphop.mp3",
          logs: [
            "[02:21:04] Orbital station confirms spectral collapse trajectory.",
            "[02:26:55] Traffic control overwhelmed. Evacuation corridors saturated.",
            "[02:30:19] Internal memo: maintain composure protocol."
          ]
        },
        {
          id: "PHASE-C",
          title: "CRISIS // ABSENCE",
          description: "The warmth leaves first. Then the power. Then the tone of every voice.",
          video: "/videos/hospital-ambient.mp4",
          classical: "/soundtrack/phase-c-crisis-classical.wav",
          hiphop: "/soundtrack/crisis_hiphop.mp3",
          logs: [
            "[03:04:07] Core temperature drop exceeds all forecasts.",
            "[03:10:23] Medical wards report panic and hypothermic shock.",
            "[03:16:59] Last external transmission: 'Light source no longer visible.'"
          ]
        },
        {
          id: "PHASE-D",
          title: "ACCEPTANCE // LOW FIRE",
          description: "The urgency burns out. What remains is cataloging, memory, and witness.",
          video: "/videos/park-ambient.mp4",
          classical: "/soundtrack/phase-d-acceptance-classical.wav",
          hiphop: "/soundtrack/acceptance_hiphop.mp3",
          logs: [
            "[04:01:12] Remaining stations switch to archival mode.",
            "[04:07:40] Message traffic declines to ceremonial statements.",
            "[04:13:08] Protocol rewritten: preserve testimony over survival metrics."
          ]
        },
        {
          id: "THE-END",
          title: "POST-SUN // QUIET",
          description: "This entry has no corrective action. Only a record that we were here.",
          video: "/videos/library-ambient.mp4",
          classical: "/soundtrack/the-end-classical.wav",
          hiphop: null,
          logs: [
            "[05:00:01] Archive sealed. No future updates expected.",
            "[05:03:29] Manual note: silence has measurable weight.",
            "[05:05:00] End of line."
          ]
        }
      ];

      const chaptersEl = document.getElementById("chapters");
      const chapterTitleEl = document.getElementById("chapter-title");
      const chapterDescEl = document.getElementById("chapter-description");
      const logFeedEl = document.getElementById("log-feed");
      const progressEl = document.getElementById("progress");
      const bgVideo = document.getElementById("bg-video");
      const bgAudio = document.getElementById("bg-audio");
      const audioStatusEl = document.getElementById("audio-status");

      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const modeBtn = document.getElementById("mode-btn");
      const muteBtn = document.getElementById("mute-btn");
      const startOverlay = document.getElementById("start-overlay");
      const startBtn = document.getElementById("start-btn");

      let currentIndex = 0;
      let audioMode = "classical";
      let audioMuted = false;
      let started = false;

      function trackForPhase(phase) {
        if (audioMode === "hiphop" && phase.hiphop) return phase.hiphop;
        return phase.classical;
      }

      function pathToAbsolute(path) {
        return new URL(path, window.location.href).href;
      }

      function renderChapters() {
        chaptersEl.innerHTML = "";
        phases.forEach((phase, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "chapter-btn";
          btn.textContent = phase.id + " // " + phase.title;
          btn.dataset.index = String(index);
          btn.addEventListener("click", () => setPhase(index));
          chaptersEl.appendChild(btn);
        });
      }

      function renderLogs(lines) {
        logFeedEl.innerHTML = "";
        lines.forEach((line, idx) => {
          const item = document.createElement("li");
          item.className = "log";
          item.style.animationDelay = String(idx * 70) + "ms";
          const parsed = line.match(/^\[(.*?)\]\s*(.*)$/);
          if (parsed) {
            const time = document.createElement("span");
            time.className = "log-time";
            time.textContent = "[" + parsed[1] + "]";
            item.appendChild(time);
            item.appendChild(document.createTextNode(parsed[2]));
          } else {
            item.textContent = line;
          }
          logFeedEl.appendChild(item);
        });
      }

      function applyMedia(phase) {
        const nextVideo = pathToAbsolute(phase.video);
        if (bgVideo.src !== nextVideo) {
          bgVideo.src = phase.video;
          bgVideo.load();
        }

        const nextTrack = trackForPhase(phase);
        const nextAudio = pathToAbsolute(nextTrack);
        if (bgAudio.src !== nextAudio) {
          bgAudio.src = nextTrack;
          bgAudio.load();
        }

        if (started) {
          bgVideo.play().catch(() => {});
          if (!audioMuted) {
            bgAudio.play().catch(() => {
              audioStatusEl.textContent = "AUDIO BLOCKED";
            });
          }
        }
      }

      function setPhase(nextIndex) {
        currentIndex = ((nextIndex % phases.length) + phases.length) % phases.length;
        const phase = phases[currentIndex];

        chapterTitleEl.textContent = phase.title;
        chapterDescEl.textContent = phase.description;
        progressEl.textContent = "Entry " + String(currentIndex + 1).padStart(2, "0") + " / " + String(phases.length).padStart(2, "0");

        for (const btn of chaptersEl.querySelectorAll(".chapter-btn")) {
          btn.classList.toggle("active", Number(btn.dataset.index) === currentIndex);
        }

        renderLogs(phase.logs);
        applyMedia(phase);
      }

      function refreshModeLabel() {
        modeBtn.textContent = "Mode: " + (audioMode === "classical" ? "Classical" : "Hiphop");
      }

      function refreshMuteLabel() {
        muteBtn.textContent = "Audio: " + (audioMuted ? "Off" : "On");
      }

      prevBtn.addEventListener("click", () => setPhase(currentIndex - 1));
      nextBtn.addEventListener("click", () => setPhase(currentIndex + 1));

      modeBtn.addEventListener("click", () => {
        audioMode = audioMode === "classical" ? "hiphop" : "classical";
        refreshModeLabel();
        setPhase(currentIndex);
      });

      muteBtn.addEventListener("click", () => {
        audioMuted = !audioMuted;
        refreshMuteLabel();
        if (audioMuted) {
          bgAudio.pause();
          audioStatusEl.textContent = "AUDIO MUTED";
        } else if (started) {
          bgAudio.play().then(() => {
            audioStatusEl.textContent = "AUDIO LIVE";
          }).catch(() => {
            audioStatusEl.textContent = "AUDIO BLOCKED";
          });
        }
      });

      startBtn.addEventListener("click", () => {
        started = true;
        startOverlay.classList.add("hidden");
        audioStatusEl.textContent = audioMuted ? "AUDIO MUTED" : "AUDIO LIVE";
        bgVideo.play().catch(() => {});
        if (!audioMuted) {
          bgAudio.play().catch(() => {
            audioStatusEl.textContent = "AUDIO BLOCKED";
          });
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") setPhase(currentIndex - 1);
        if (event.key === "ArrowRight") setPhase(currentIndex + 1);
      });

      renderChapters();
      refreshModeLabel();
      refreshMuteLabel();
      setPhase(0);
    </script>
  </body>
</html>
