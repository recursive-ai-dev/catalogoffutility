<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHEN THE SUN DIED</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:wght@400;700&display=swap');
      
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0c0a09;
      }
      
      /* CRT scanline effect */
      
      #root::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          rgba(251, 191, 36, 0.03) 50%,
          transparent 50%
        );
        background-size: 100% 4px;
        z-index: 1000;
        pointer-events: none;
        animation: scan 8s linear infinite;
      }
      
      @keyframes scan {
        0% { transform: translateY(0); }
        100% { transform: translateY(10px); }
      }
      
      /* CRT flicker */
      
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.98; }
      }
      
      #root {
        animation: flicker 0.15s infinite;
      }
      
      /* Custom scrollbar */
      
      ::-webkit-scrollbar {
        width: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #1c1917;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #92400e;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #d97706;
      }
    </style>

ks",category:"character",defaultValue:50,min:0,max:100},{id:"fear",name:"Fear",description:"Anxiety and caution",category:"character",defaultValue:40,min:0,max:100},{id:"familiarity",name:"Location Familiarity",description:"Knowledge of current location",category:"character",defaultValue:50,min:0,max:100},{id:"energy",name:"Energy",description:"Physical and emotional stamina for the day",category:"character",defaultValue:100,min:0,max:100},{id:"hasMadePeace",name:"Made Peace",description:"Has accepted something important",category:"character",defaultValue:!1},{id:"hasBurnedBridge",name:"Burned Bridge",description:"Has destroyed a relationship",category:"character",defaultValue:!1},{id:"hasFoundPurpose",name:"Found Purpose",description:"Has discovered meaning in the end",category:"character",defaultValue:!1},{id:"hasConfessed",name:"Has Confessed",description:"Has shared a secret truth",category:"character",defaultValue:!1},{id:"isFirstTimeLocation",name:"First Time Here",description:"Never visited this location before",category:"character",defaultValue:!0},{id:"collectiveHope",name:"City Hope",description:"The collective optimism of the city",category:"run",defaultValue:50,min:0,max:100},{id:"collectiveDespair",name:"City Despair",description:"The collective grief of the city",category:"run",defaultValue:30,min:0,max:100},{id:"connectionsFormed",name:"Connections Formed",description:"Total connections made across all characters",category:"run",defaultValue:0},{id:"bridgesBurned",name:"Bridges Burned",description:"Total relationships destroyed",category:"run",defaultValue:0},{id:"hasWitnessedMiracle",name:"Witnessed Miracle",description:"Saw something inexplicably good",category:"run",defaultValue:!1},{id:"hasWitnessedBetrayal",name:"Witnessed Betrayal",description:"Saw profound betrayal",category:"run",defaultValue:!1}],Pl=[{id:"awakening_panic",title:"The Weight of Waking",scene:"You surface into consciousness with a gasp. This body's heart is racing. Nightmares of darkness cling to the edges of your vision.",baseSalience:30,requirements:[{qualityId:"fear",min:60},{qualityId:"energy",min:20}],locationIds:void 0,dayMin:1,dayMax:30,tags:["morning","emotional","universal"],branches:[{id:"breathe_through_it",label:"Breathe through the panic",style:"accept",tone:"quiet",description:"You place this body's hands on its chest and breathe slowly. The fear does not leave, but it becomes manageable.",consequence:"The panic recedes to a background hum. You are here now, whatever that means.",memory:"Woke into fear and breathed through it.",effects:[{qualityId:"fear",subtract:15},{qualityId:"courage",add:5},{qualityId:"energy",subtract:10}]},{id:"lean_into_dread",label:"Lean into the dread",style:"risk",tone:"dark",description:"Let the fear have its voice. What does it know that hope has been hiding?",consequence:"The dread speaks: time is short, love is fragile, and you are wearing a stranger's final days. The knowledge burns.",memory:"Let dread speak its truth.",effects:[{qualityId:"fear",add:10},{qualityId:"despair",add:10},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"seek_comfort",label:"Seek immediate comfort",style:"connect",tone:"bright",description:"Find someone, anyone. The presence of another body is its own medicine.",consequence:"You reach out. A neighbor, a passerby, a familiar face—they do not understand why you need them, but they stay.",memory:"Sought comfort and found it in a stranger's patience.",effects:[{qualityId:"fear",subtract:20},{qualityId:"connection",add:15},{qualityId:"energy",subtract:5}]}]},{id:"moment_of_clarity",title:"Sudden Clarity",scene:"Something shifts. The light, the angle of a shadow, a phrase overheard—and suddenly this life makes sense in a way it never has before.",baseSalience:25,requirements:[{qualityId:"isolation",min:40},{qualityId:"hasFoundPurpose",is:!1},{qualityId:"energy",min:30}],locationIds:void 0,tags:["epiphany","universal"],maxAppearances:3,branches:[{id:"write_it_down",label:"Write it down before it fades",style:"risk",tone:"bright",description:"Find paper, a napkin, your phone—capture this before the moment passes.",consequence:"The words flow. You are writing to someone specific, though you may never send it. The clarity becomes permanent.",memory:"Captured a moment of clarity in words.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"hope",add:20},{qualityId:"energy",subtract:15}]},{id:"stay_in_the_moment",label:"Stay in the moment without grasping",style:"accept",tone:"quiet",description:"Let it be fleeting. Let it be enough that it happened, even if you forget the specifics.",consequence:"The clarity fades like a dream, but its warmth remains. You move differently now, lighter.",memory:"Let clarity pass through like water.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"hope",add:10},{qualityId:"despair",subtract:10}]},{id:"dismiss_as_fantasy",label:"Dismiss it as fantasy",style:"retreat",tone:"dark",description:"False hope is worse than honest despair. This feeling is a lie the brain tells itself.",consequence:"You crush the feeling. The clarity dies unexamined. You are left with the familiar weight of knowing nothing matters.",memory:"Rejected clarity in favor of familiar despair.",effects:[{qualityId:"despair",add:15},{qualityId:"hope",subtract:10},{qualityId:"hasFoundPurpose",setFalse:!0}]}]},{id:"the_stranger_remembers",title:"The Stranger Remembers",scene:`Someone approaches you with recognition in their eyes. "You don't remember me," they say. "But I remember you. From the other day, the other body."`,baseSalience:15,requirements:[{qualityId:"day",min:5},{qualityId:"connection",min:30}],locationIds:void 0,tags:["meta","mystery","rare"],maxAppearances:1,branches:[{id:"admit_the_truth",label:"Admit you are not who they think",style:"risk",tone:"bright",description:"Tell them the impossible truth. You are a witness wearing lives like coats.",consequence:`They listen. They do not run. "I knew," they whisper. "I've seen you in a dozen faces."`,memory:"Found someone who sees the witness behind the mask.",effects:[{qualityId:"connection",add:30},{qualityId:"hasWitnessedMiracle",setTrue:!0},{qualityId:"collectiveHope",add:10}]},{id:"play_along",label:"Play along, gather information",style:"accept",tone:"quiet",description:"Let them believe you remember. Learn what they know about... yourself.",consequence:"They speak of other bodies, other days. Patterns you did not know you left behind. You are not as invisible as you thought.",memory:"Learned that the witness leaves traces.",effects:[{qualityId:"familiarity",add:20},{qualityId:"isolation",subtract:10}]},{id:"flee",label:"Flee without explanation",style:"retreat",tone:"dark",description:"This is too much. Too close. You turn and walk away before they can say more.",consequence:`Their voice follows you: "You can't run from yourself forever." But you can. You do.`,memory:"Ran from the one who sees too clearly.",effects:[{qualityId:"isolation",add:20},{qualityId:"fear",add:15},{qualityId:"connection",subtract:10}]}]},{id:"park_seed_vault",title:"The Secret Seed Vault",scene:"Beneath the old greenhouse, you discover a cache: envelopes labeled in fading ink, containing seeds from before. Tomatoes, peppers, flowers no one has seen in years.",baseSalience:40,requirements:[{qualityId:"familiarity",min:30},{qualityId:"hope",min:20}],locationIds:["park"],tags:["park","discovery","hope"],maxAppearances:2,branches:[{id:"plant_them_immediately",label:"Plant them immediately",style:"risk",tone:"bright",description:"They may not grow. The sun is dying. But you plant them anyway, hands in dirt, faith in darkness.",consequence:"You plant until your back aches. If the world continues, these will bloom. If not, you spent your last days planting hope.",memory:"Planted seeds that may never see sunlight.",effects:[{qualityId:"hope",add:25},{qualityId:"energy",subtract:25},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"save_them_for_someone_else",label:"Save them for someone else",style:"connect",tone:"quiet",description:"Hide them better. Label them clearer. Make sure the next person finds them.",consequence:"You write instructions, draw maps. Someone else will plant these. You are a bridge between past and possible future.",memory:"Became a bridge to a future I will not see.",effects:[{qualityId:"connection",add:15},{qualityId:"isolation",subtract:10},{qualityId:"energy",subtract:10}]},{id:"burn_them",label:"Burn them",style:"retreat",tone:"dark",description:"False hope is cruel. Better to end the possibility than watch it fail.",consequence:"The seeds curl and blacken. The smoke carries the smell of endings. You feel a strange satisfaction in the completion of loss.",memory:"Destroyed hope to spare it from failing.",effects:[{qualityId:"hope",subtract:20},{qualityId:"despair",add:15},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"bar_last_confession",title:"The Last Confession Booth",scene:`The bartender slides a shot glass your way. "We're doing confessions tonight," they say. "No priests. Just witnesses. Five minutes to say anything."`,baseSalience:50,requirements:[{qualityId:"hasConfessed",is:!1},{qualityId:"energy",min:15}],locationIds:["bar"],tags:["bar","confession","social"],maxAppearances:1,branches:[{id:"confess_everything",label:"Confess everything—who you really are",style:"risk",tone:"bright",description:"Tell them about the witness, the bodies, the 30 days. Tell them everything.",consequence:"The room goes silent. Then someone laughs—then another. They think it's performance art. But the weight lifts. You have been heard, even if not believed.",memory:"Confessed the impossible and was met with laughter.",effects:[{qualityId:"hasConfessed",setTrue:!0},{qualityId:"isolation",subtract:20},{qualityId:"connection",add:15},{qualityId:"fear",subtract:15}]},{id:"confess_this_bodys_sins",label:"Confess this body's sins",style:"connect",tone:"quiet",description:"Speak the secrets of the person you are wearing. Let their shame breathe.",consequence:"You speak words this mouth has never said. The relief in these shoulders is real, even if you are not.",memory:"Gave voice to a stranger's hidden shame.",effects:[{qualityId:"hasConfessed",setTrue:!0},{qualityId:"connection",add:10},{qualityId:"despair",subtract:10}]},{id:"refuse_listen_instead",label:"Refuse—listen to others instead",style:"accept",tone:"quiet",description:"You do not need to speak. You need to hear. You need to witness.",consequence:"You sit in the corner and listen. Story after story. Pain after pain. You carry them all now, the weight of a dozen souls in addition to your own.",memory:"Listened to confessions and carried them all.",effects:[{qualityId:"connection",add:20},{qualityId:"fear",add:5},{qualityId:"hasFoundPurpose",setTrue:!0}]}]},{id:"hospital_the_choice",title:"The Choice",scene:'A patient asks you: "Should I take the treatment? It might buy a week. Or should I let go now, while I can still feel the sun?" They look at you like you have answers.',baseSalience:60,requirements:[{qualityId:"familiarity",min:20},{qualityId:"hasMadePeace",is:!1}],locationIds:["hospital"],tags:["hospital","moral","heavy"],maxAppearances:2,branches:[{id:"advise_fight",label:"Advise them to fight",style:"connect",tone:"bright",description:"Every day matters. Every hour. Take the treatment. Stay as long as you can.",consequence:"They nod. They will fight. You have given them permission to hope, and hope is heavy but necessary.",memory:"Gave permission to hope for more time.",effects:[{qualityId:"hope",add:15},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"collectiveHope",add:5}]},{id:"advise_release",label:"Advise them to let go",style:"accept",tone:"quiet",description:"Quality over quantity. Feel the sun. Say the goodbyes. Do not trade today for a painful tomorrow.",consequence:"They weep, but it is relief. You have given them permission to stop fighting. This is its own mercy.",memory:"Gave permission to stop fighting.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"despair",subtract:10},{qualityId:"courage",add:10}]},{id:"refuse_to_choose",label:"Refuse to choose for them",style:"retreat",tone:"dark",description:"You are not a god. You are not even yourself. You cannot carry this decision.",consequence:"They look betrayed. You have abandoned them to their own devices. The weight of that abandonment stays with you.",memory:"Refused to help someone decide how to die.",effects:[{qualityId:"isolation",add:15},{qualityId:"connection",subtract:10},{qualityId:"fear",add:10}]}]},{id:"rooftop_the_broadcast",title:"The Broadcast",scene:`Your radio crackles. Not the usual channels—something else. A voice: "If you're hearing this, you're not alone. We're organizing. Rooftop network."`,baseSalience:45,requirements:[{qualityId:"isolation",min:40},{qualityId:"connection",max:50}],locationIds:["rooftop"],tags:["rooftop","connection","technology"],maxAppearances:1,branches:[{id:"respond_reveal_location",label:"Respond—reveal your location",style:"risk",tone:"bright",description:"Key the mic. Tell them where you are. Trust strangers.",consequence:"Static, then voices. Multiple voices. They know your building now. They will come, or they will not, but you are no longer alone.",memory:"Joined the rooftop network.",effects:[{qualityId:"connection",add:25},{qualityId:"isolation",subtract:30},{qualityId:"fear",subtract:10},{qualityId:"connectionsFormed",add:1}]},{id:"listen_only",label:"Listen only—do not respond",style:"accept",tone:"quiet",description:"Let them talk. Learn their patterns. Stay invisible.",consequence:"You learn their names, their locations, their fears. You are a ghost in their network, but knowledge is its own comfort.",memory:"Listened to the network without joining.",effects:[{qualityId:"familiarity",add:20},{qualityId:"isolation",subtract:10}]},{id:"jam_the_signal",label:"Jam the signal",style:"retreat",tone:"dark",description:"If you cannot connect, no one should. Broadcast noise. End this fragile hope.",consequence:"The voices cut to static. You have silenced something beautiful because it excluded you. This is who you are now.",memory:"Destroyed connection out of jealousy.",effects:[{qualityId:"isolation",add:25},{qualityId:"despair",add:15},{qualityId:"connectionsFormed",subtract:1},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"library_the_last_book",title:"The Last Book",scene:"You find it: the book you need right now. The one that explains everything, or at least makes it bearable. There is only one copy, and you have it in your hands.",baseSalience:40,requirements:[{qualityId:"familiarity",min:25},{qualityId:"hasFoundPurpose",is:!1}],locationIds:["library"],tags:["library","meaning","knowledge"],maxAppearances:1,branches:[{id:"read_it_now",label:"Read it now, completely",style:"accept",tone:"quiet",description:"Sit down. Ignore everything. Let the book speak.",consequence:"Hours pass. The book speaks directly to your situation—this body's, the witness's, humanity's. You are different when you close the cover.",memory:"Found a book that spoke directly to the soul.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"hope",add:15},{qualityId:"despair",subtract:15},{qualityId:"energy",subtract:30}]},{id:"hide_it_for_later",label:"Hide it for later",style:"risk",tone:"bright",description:"You will not finish it today. Someone else might need it. Preserve it.",consequence:"You find the perfect hiding spot. This knowledge will survive. Even if you do not return, someone worthy will find it.",memory:"Became a guardian of knowledge.",effects:[{qualityId:"hope",add:10},{qualityId:"connection",add:10},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"destroy_it",label:"Destroy it",style:"retreat",tone:"dark",description:"If you cannot keep it, no one should have it. Tear out the pages.",consequence:"Paper confetti in the waste bin. You have destroyed something irreplaceable. The satisfaction is immediate; the regret will come later.",memory:"Destroyed knowledge out of spite.",effects:[{qualityId:"despair",add:20},{qualityId:"hope",subtract:15},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"beach_the_message",title:"The Message in the Ash",scene:'Written in the ash on the seawall, a message: "I forgive you." No signature. No context. Just those three words, written large enough for everyone to see.',baseSalience:35,requirements:[{qualityId:"hasMadePeace",is:!1},{qualityId:"despair",min:30}],locationIds:["beach"],tags:["beach","forgiveness","mystery"],maxAppearances:1,branches:[{id:"accept_the_forgiveness",label:"Accept the forgiveness",style:"accept",tone:"quiet",description:"It was not meant for you, but you need it. Let it be yours anyway.",consequence:"You touch the ash. You let the words enter you. Whoever wrote them, whatever their intent, you are forgiven. The relief is oceanic.",memory:"Accepted forgiveness not meant for me.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"despair",subtract:25},{qualityId:"hope",add:15}]},{id:"add_to_it",label:"Add to the message",style:"connect",tone:"bright",description:"Write your own words. Extend the conversation.",consequence:'You find a stick, write in the ash below: "And I forgive you too." The conversation continues, anonymous and healing.',memory:"Joined a conversation in ash.",effects:[{qualityId:"connection",add:20},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"collectiveHope",add:5}]},{id:"erase_it",label:"Erase it",style:"retreat",tone:"dark",description:"Forgiveness is a lie. You smear the ash until the words are gone.",consequence:"The wall is blank again. You have restored the world to its proper state: unforgiving, cold, honest.",memory:"Erased forgiveness from the world.",effects:[{qualityId:"despair",add:15},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"park_the_last_gardener",title:"The Last Gardener",scene:'An old woman tends roses that have no business blooming this late. She has dirt under her fingernails and a name tag that reads "Esther - Volunteer". She looks up as you approach. "They told me to stop coming," she says, "but someone has to witness the last bloom."',baseSalience:45,requirements:[{qualityId:"familiarity",min:20}],locationIds:["park"],tags:["park","witness","preservation"],maxAppearances:1,branches:[{id:"help_tend_garden",label:"Help her tend the roses",style:"connect",tone:"bright",description:"Pick up a trowel. Work the soil. Share the witness of something beautiful dying well.",consequence:"She teaches you their names: Mister Lincoln, Queen Elizabeth, Peace. You prune together in silence. When you leave, she presses a fallen petal into your palm.",memory:"Tended the last roses with a stranger who remembered their names.",effects:[{qualityId:"connection",add:20},{qualityId:"hope",add:15},{qualityId:"energy",subtract:15}]},{id:"ask_about_the_end",label:"Ask what she will do when the sun dies",style:"accept",tone:"quiet",description:"The question hangs between you like the scent of the roses.",consequence:'"I will be here," she says. "Someone should hold the earth when the light goes. The roses will not know the difference." She smiles. "Or maybe they will. Maybe they will feel me holding them."',memory:"Learned that witness can be a form of embrace.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"despair",subtract:10},{qualityId:"courage",add:10}]},{id:"tell_her_to_stop",label:"Tell her it is pointless",style:"retreat",tone:"dark",description:"The roses will die. She will die. The earth will freeze. Why pretend?",consequence:'She looks at you with something like pity. "Pointless is the only point left, dear." She turns back to her roses. You have not touched her hope, but you have dimmed your own.',memory:"Failed to understand why someone would tend dying roses.",effects:[{qualityId:"hope",subtract:15},{qualityId:"despair",add:10},{qualityId:"isolation",add:10}]}]},{id:"park_children_at_play",title:"Children at Play",scene:'Three children race between the broken fountains, laughing. They have built a fort from branches and a tarp. One of them—a girl with mud on her cheeks—waves at you. "We are guarding the park," she announces. "From what?" you ask. She shrugs. "Everything."',baseSalience:40,requirements:[{qualityId:"despair",max:60}],locationIds:["park"],tags:["park","children","hope"],maxAppearances:2,branches:[{id:"join_their_game",label:"Join their fort-building",style:"connect",tone:"bright",description:"Crawl through their branch doorway. Accept the stick they offer as a sword.",consequence:'You are assigned the role of "Guardian of the West Gate." The girl with muddy cheeks takes your hand to show you where to stand. For an hour, you are not a witness to the end—you are a hero defending a kingdom that believes it will last forever.',memory:"Defended a cardboard kingdom with children who did not know to be afraid.",effects:[{qualityId:"connection",add:25},{qualityId:"hope",add:20},{qualityId:"fear",subtract:15},{qualityId:"energy",subtract:20}]},{id:"watch_from_distance",label:"Watch them from a bench",style:"accept",tone:"quiet",description:"Do not intrude. Let them have their game without the weight of your presence.",consequence:"You sit on a rusted swing and watch them invent rules you will never know. Their laughter carries over the weeds. You try to memorize the sound—what hope used to look like before it knew about endings.",memory:"Memorized the sound of children who did not yet know.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"despair",subtract:5},{qualityId:"courage",add:5}]},{id:"warn_them",label:"Warn them about the sun",style:"retreat",tone:"dark",description:"They deserve to know. They should not play in ignorance.",consequence:"You kneel to their level and speak words that freeze their smiles. The girl with muddy cheeks starts to cry. The others run home. You have given them knowledge too heavy for their small shoulders. The fort stands empty behind you.",memory:"Destroyed a child's innocence because you could not bear their joy.",effects:[{qualityId:"despair",add:20},{qualityId:"hope",subtract:20},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"bar_last_call_romance",title:"Last Call Romance",scene:'They sit two stools down, nursing something amber. You have seen them here before—maybe yesterday, maybe in another body. They catch your eye and smile. "I have a theory," they say. "No one should die without kissing a stranger." The bar clock shows 1:47 AM.',baseSalience:50,requirements:[{qualityId:"isolation",min:30},{qualityId:"energy",min:25}],locationIds:["bar"],tags:["bar","romance","intimacy"],maxAppearances:1,branches:[{id:"accept_the_kiss",label:"Accept the theory",style:"risk",tone:"bright",description:"Slide onto the stool beside them. Let the stranger's lips meet yours in the neon dark.",consequence:'They taste like whiskey and cinnamon. The kiss is clumsy, real, urgent. When you pull apart, they press their forehead to yours. "Thank you for being my stranger," they whisper. You never learn their name.',memory:"Kissed a stranger who needed to not be alone.",effects:[{qualityId:"connection",add:30},{qualityId:"isolation",subtract:25},{qualityId:"hope",add:15},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"talk_instead",label:"Decline, but stay and talk",style:"accept",tone:"quiet",description:'"I am not that stranger," you say. "But I will be your witness."',consequence:"You talk until the bar closes. They tell you about the person they never confessed to, the trip they never took, the life they thought they had time for. You listen. When the lights come up, they squeeze your hand and leave lighter than they arrived.",memory:"Listened to a stranger's unlived life until dawn.",effects:[{qualityId:"connection",add:20},{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"energy",subtract:15}]},{id:"leave_alone",label:"Leave them alone with their theory",style:"retreat",tone:"dark",description:"You have enough ghosts. You do not need a stranger's lips haunting you.",consequence:"You settle your tab and walk into the rain without looking back. Behind you, they find someone else—someone braver or lonelier. You wonder, walking home, if you have just refused the only thing that mattered tonight.",memory:"Walked away from a stranger who offered connection.",effects:[{qualityId:"isolation",add:15},{qualityId:"fear",add:10},{qualityId:"regret",add:1}]}]},{id:"bar_the_regular_who_never_came",title:"The Empty Stool",scene:'The bartender keeps glancing at the door. "Joe always sits there," she says, nodding to a worn stool at the end. "Every night for twelve years." The stool is empty. She polishes a glass that does not need polishing. "I should have asked where he lived. Someone should check on him."',baseSalience:45,requirements:[{qualityId:"familiarity",min:15}],locationIds:["bar"],tags:["bar","loss","absence"],maxAppearances:1,branches:[{id:"offer_to_check",label:"Offer to look for Joe",style:"connect",tone:"bright",description:"Take the address she has. Walk the streets. Knock on doors.",consequence:`You find him in a third-floor walk-up. He had a stroke three days ago. His neighbor had been bringing him water. When you tell him the bartender sent you, he weeps. "She remembered," he says. You help him to the window so he can see the bar's neon sign glowing in the distance.`,memory:"Reconnected a missing man with the bartender who noticed.",effects:[{qualityId:"connection",add:25},{qualityId:"hope",add:15},{qualityId:"collectiveHope",add:5},{qualityId:"energy",subtract:20}]},{id:"sit_in_his_place",label:"Sit in Joe's stool and wait",style:"accept",tone:"quiet",description:"Someone should hold the space. Someone should witness the absence.",consequence:"The stool fits you wrong—worn by someone else's shape. You order what Joe always ordered (she tells you: bourbon, neat). The bartender talks about him: his jokes, his tips, his silence. By midnight, you understand that some grief is just love with nowhere to go.",memory:"Held space for a stranger's grief over another stranger.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"despair",subtract:5},{qualityId:"courage",add:5}]},{id:"tell_her_to_forget",label:"Tell her he is probably dead",style:"retreat",tone:"dark",description:"Why pretend? He is gone. She should get used to people leaving.",consequence:`"I know," she says quietly. But something in her shoulders settles—grief acknowledged is different from grief feared. She leaves the glass upside down on Joe's spot. The gesture is small and devastating. You have not helped her, but you have named her truth.`,memory:"Named a loss that someone was afraid to speak.",effects:[{qualityId:"despair",add:15},{qualityId:"hope",subtract:10},{qualityId:"hasMadePeace",setTrue:!0}]}]},{id:"hospital_a_birth_in_final_days",title:"New Arrival",scene:'The maternity ward is three floors down, but you hear the news: a baby, born at 3:47 AM, screaming like it knows exactly what it is getting into. A nurse finds you in the corridor, crying and laughing. "Seven pounds," she says. "Healthy. A girl." She looks at you with desperate hope. "What should we tell her? About the world?"',baseSalience:55,requirements:[{qualityId:"day",max:25}],locationIds:["hospital"],tags:["hospital","birth","hope","bittersweet"],maxAppearances:1,branches:[{id:"tell_her_she_is_loved",label:"Tell her she was wanted and loved",style:"connect",tone:"bright",description:"That is the only truth that matters. Everything else is weather.",consequence:'The nurse writes your words on a card. You never see the baby, but you imagine her mother reading it years from now—if there are years. "She was born when the world was ending, and she was loved." Some truths are bigger than endings.',memory:"Gave a newborn her first truth: that she was loved.",effects:[{qualityId:"connection",add:25},{qualityId:"hope",add:25},{qualityId:"collectiveHope",add:10},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"tell_her_nothing",label:"Tell her nothing. Let her experience it.",style:"accept",tone:"quiet",description:"Every generation enters a broken world. She will make her own meaning.",consequence:'The nurse nods slowly. "My grandmother was born during a war," she says. "She never needed anyone to explain it. She just lived." You walk away knowing that the baby will have whatever life is left—and that life, however brief, is its own gift.',memory:"Let a child enter the world without the weight of explanation.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"courage",add:15},{qualityId:"despair",subtract:10}]},{id:"tell_her_the_truth",label:"Tell her the sun is dying",style:"retreat",tone:"dark",description:"She deserves to know what she has been born into. Honesty is the only mercy.",consequence:'The nurse slaps you. Hard. Then she breaks down sobbing. "Get out," she whispers. You leave, your cheek stinging, wondering if you were cruel or kind. The baby screams on, ignorant of everything—her own birth, her own death, the dark rushing toward her.',memory:"Tried to give a newborn the burden of knowledge.",effects:[{qualityId:"despair",add:20},{qualityId:"hope",subtract:15},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"hospital_code_in_next_room",title:"The Code",scene:'The alarm sounds three rooms down. "Code Blue," someone shouts, and the corridor fills with running bodies. You press yourself against the wall as they rush past—a river of competence flowing toward death. Through the open door, you see them working: compressions, breaths, electricity. A life being argued for in the language of medicine.',baseSalience:50,requirements:[{qualityId:"fear",min:30}],locationIds:["hospital"],tags:["hospital","mortality","intensity"],maxAppearances:2,branches:[{id:"pray_for_them",label:"Pray for the stranger you cannot see",style:"connect",tone:"bright",description:"Even if you do not believe. Even if no one is listening. Wish them well.",consequence:'You close your eyes and send whatever you have—hope, fear, love—toward that room. Ten minutes later, a nurse emerges, exhausted. "We got them back," she says. She does not know you prayed. You do not know if it mattered. But for a moment, you were both trying to keep a stranger alive.',memory:"Sent hope toward a stranger's death and they returned.",effects:[{qualityId:"hope",add:20},{qualityId:"connection",add:15},{qualityId:"fear",subtract:10}]},{id:"watch_and_learn",label:"Watch the team work",style:"accept",tone:"quiet",description:"This is how we fight. This is what competence looks like when death comes early.",consequence:"You watch them move like one organism—no wasted motion, no hesitation. They have done this a hundred times, and they are still trying. The flatline tone persists. They keep working. You understand something about dignity that you did not know before.",memory:"Witnessed humans fight death with their whole competence.",effects:[{qualityId:"courage",add:15},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"energy",subtract:10}]},{id:"walk_away_fast",label:"Walk away from the dying",style:"retreat",tone:"dark",description:"You do not need to see this. You do not need to feel this.",consequence:"You turn the corner before the tone changes. You will never know if they lived or died. Your hands shake as you find the exit. You tell yourself you are protecting yourself, but you know you are abandoning them—not to death, but to anonymity. Someone should have seen them go.",memory:"Walked away from a stranger's death because you could not bear it.",effects:[{qualityId:"fear",add:20},{qualityId:"isolation",add:15},{qualityId:"courage",subtract:10}]}]},{id:"rooftop_the_last_sunset",title:"The Last Sunset",scene:"You are not the only one up here. Three others have gathered at the roof's edge, watching the sun bleed into the horizon. No one speaks. The haze makes everything look like a watercolor left out in rain—a dissolving world. A man to your right raises a flask in silent toast. You understand: this is not the last sunset, but it is the last one some of you will see.",baseSalience:48,requirements:[{qualityId:"hasMadePeace",is:!1}],locationIds:["rooftop"],tags:["rooftop","sunset","transcendent"],maxAppearances:1,branches:[{id:"share_the_flask",label:"Accept the flask and pass it on",style:"connect",tone:"bright",description:"Let the whiskey burn. Let the stranger's lips touch where yours touched.",consequence:"The liquor is cheap and burns like forgiveness. You pass it to the woman on your left. She passes it to the teenager beside her. The circle completes. No names are exchanged. The sun dips below the skyline, and four strangers share one warm silence.",memory:"Shared a sunset and a flask with strangers who needed both.",effects:[{qualityId:"connection",add:25},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"isolation",subtract:20}]},{id:"photograph_it",label:"Try to capture the light",style:"accept",tone:"quiet",description:"Your phone will not do it justice, but you have to try. Someone should remember this color.",consequence:"The photo is a lie—too bright, too sharp. But you take twelve more, each slightly different. The strangers drift away. You stay until the last orange fades to gray. You will look at these pictures later and remember not how it looked, but how it felt to know you were watching something precious disappear.",memory:"Tried to trap sunset light in a machine that could not hold it.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"hope",add:10},{qualityId:"energy",subtract:10}]},{id:"turn_away",label:"Turn your back on the sunset",style:"retreat",tone:"dark",description:"You have seen enough beauty. It hurts too much to watch it go.",consequence:"You face the stairwell, back to the light. Behind you, someone gasps at the final color—a violent pink you will never see. You descend into the building's shadow. You have chosen to remember sunsets as they were, not as they are becoming.",memory:"Refused to watch the sunset because endings are too heavy.",effects:[{qualityId:"despair",add:15},{qualityId:"courage",subtract:10},{qualityId:"isolation",add:10}]}]},{id:"rooftop_finding_the_note",title:"The Note in the Planter",scene:'You are checking the tomatoes when you find it: a folded paper tucked under a stone. "If you are reading this," it says, "I am already gone. The key is under the third solar panel. Use what I built. Take care of the peppers—they need more water than you think." No name. Just instructions for a future the writer knew they would not see.',baseSalience:42,requirements:[{qualityId:"familiarity",min:25}],locationIds:["rooftop"],tags:["rooftop","legacy","absence"],maxAppearances:1,branches:[{id:"follow_instructions",label:"Follow the instructions exactly",style:"connect",tone:"bright",description:"Find the key. Water the peppers. Become the gardener they could not be.",consequence:"The key opens a shed full of tools, seeds, preserves. You spend the afternoon learning what they built. The peppers do need more water. By dusk, you are talking to them as if they can hear you—thanking them, promising to continue. You are a bridge across absence.",memory:"Continued a stranger's garden from their instructions.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"connection",add:20},{qualityId:"hope",add:15},{qualityId:"energy",subtract:20}]},{id:"write_a_reply",label:"Write a reply and leave it for them",style:"accept",tone:"quiet",description:"They may never read it, but the conversation matters anyway.",consequence:'"The peppers are watered," you write. "The tomatoes are strong. I will stay until the end. Thank you for trusting a stranger." You fold it back into the planter, weight it with the same stone. If they return, they will know they were heard. If not, the earth will keep both notes.',memory:"Answered a stranger's trust with a promise in writing.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"connection",add:15},{qualityId:"despair",subtract:10}]},{id:"discard_it",label:"Throw the note away",style:"retreat",tone:"dark",description:"They are dead or gone. Their instructions are debris. Clear the space.",consequence:"The paper flutters into the trash with the dead leaves. You water the peppers incorrectly—they wilt over the next days. The key stays under the solar panel, rusting. You have cleaned the space, but you have also erased a voice that wanted to be heard.",memory:"Erased a stranger's last words like they were nothing.",effects:[{qualityId:"despair",add:15},{qualityId:"hope",subtract:10},{qualityId:"isolation",add:15}]}]},{id:"library_recording_last_voices",title:"The Oral History Project",scene:'A student has set up a recording booth in the reading room. "Thirty seconds," she explains. "Say whatever you want preserved. We are archiving voices, not stories. The sound of us." She hands you a card with a number: you are the 847th voice. Behind you, an old man practices what he will say, lips moving silently.',baseSalience:48,requirements:[{qualityId:"hasConfessed",is:!1}],locationIds:["library"],tags:["library","preservation","legacy"],maxAppearances:1,branches:[{id:"record_truth",label:"Record the truth of what you are",style:"risk",tone:"bright",description:"Tell the recorder about the witness. The bodies. The thirty days.",consequence:`"I am not who I appear to be," you say into the microphone. "I am a traveler wearing borrowed lives. I have seen the end, and I am still here." The student's eyes widen. When you finish, she asks if it is fiction. You smile. "Archive it either way."`,memory:"Left proof of the witness in a recording for future ears.",effects:[{qualityId:"hasConfessed",setTrue:!0},{qualityId:"connection",add:20},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"record_love",label:"Record a message for someone specific",style:"connect",tone:"quiet",description:"Use your thirty seconds to reach across the dark.",consequence:'You speak a name, an apology, a memory of hands touching in rain. The student does not know who you are addressing, but her eyes are wet when you finish. "They will hear this," she promises. "If anyone survives, they will know you loved them."',memory:"Sent a message forward in time, hoping for ears to hear it.",effects:[{qualityId:"connection",add:25},{qualityId:"isolation",subtract:15},{qualityId:"hasMadePeace",setTrue:!0}]},{id:"refuse_recording",label:"Decline to be recorded",style:"retreat",tone:"dark",description:"Your voice is yours. You will not give it to archives, to strangers, to time.",consequence:'"No," you say, and walk past her. The old man goes in after you, and you hear him begin: "To my grandchildren, whom I never met..." You walk faster. His voice fades behind you, joining the archive, becoming permanent. You remain a ghost, unproven, free.',memory:"Chose invisibility over the archive of human voices.",effects:[{qualityId:"isolation",add:20},{qualityId:"courage",subtract:5}]}]},{id:"library_the_childs_question",title:"Why?",scene:`A child—maybe eight—sits in the children's section surrounded by books she is too young to read. She looks up as you pass. "Why is the sun dying?" she asks. Not "is it" or "when"—why. Her mother is asleep in a chair nearby, exhausted. The child waits for your answer with the patience of someone who has been waiting for answers all her short life.`,baseSalience:52,requirements:[{qualityId:"despair",max:70}],locationIds:["library"],tags:["library","philosophy","children"],maxAppearances:1,branches:[{id:"tell_her_we_dont_know",label:"Tell her we do not know why",style:"accept",tone:"quiet",description:"It is the only honest answer. Scientists, priests, poets—none of them know.",consequence:'"Then why are people still being nice to each other?" she asks. You kneel to her level. "Because we do not know why," you say. "Maybe that is the reason." She nods slowly, as if you have confirmed something she suspected. She returns to her book. You have given her the truth, and she has given you a gift in return.',memory:"Told a child the truth: that we do not know why, and that is okay.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"courage",add:15},{qualityId:"despair",subtract:10}]},{id:"tell_her_its_natural",label:"Tell her everything dies, and that is natural",style:"connect",tone:"bright",description:"Stars are born and stars die. The sun is just doing what stars do.",consequence:`"Like my hamster?" she asks. "Like the flowers?" You nod. "Like us?" she adds. You nod again, and she accepts this with a child's capacity for large truths. "Then we should be extra nice to each other," she concludes. "While we are all alive together." She runs to wake her mother to tell her.`,memory:"Taught a child that death is natural, and she taught you how to live.",effects:[{qualityId:"connection",add:20},{qualityId:"hope",add:20},{qualityId:"collectiveHope",add:5}]},{id:"tell_her_its_punishment",label:"Tell her it is punishment",style:"retreat",tone:"dark",description:"We did this. We broke the world. Now the world is breaking us.",consequence:'Her eyes widen. She starts to cry, and her mother wakes, furious. You leave before they can confront you. Behind you, the child sobs: "What did we do? What did we do?" You have given her a burden no child should carry—the weight of cosmic guilt. The library feels colder as you leave.',memory:"Burdened a child with guilt that was not hers to carry.",effects:[{qualityId:"despair",add:25},{qualityId:"hope",subtract:20},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"beach_the_last_ship",title:"The Departure",scene:'A cargo ship waits at the horizon, the last one leaving port. On the beach, families say goodbye to those who have chosen to try the open ocean—to sail until the food runs out or the ice comes, whichever first. A teenage boy stands apart from his family, watching the ship. He is not boarding. He turns to you. "Would you have gone?" he asks. "If you could?"',baseSalience:46,requirements:[{qualityId:"courage",min:30}],locationIds:["beach"],tags:["beach","departure","choice"],maxAppearances:1,branches:[{id:"say_yes_i_would_go",label:"Tell him you would have gone",style:"risk",tone:"bright",description:"The chance, however slim, is worth more than waiting for the end.",consequence:'"Then why are you still here?" he asks. You have no answer. He smiles—sad, knowing. "Maybe the bravest thing is staying," he says. "Facing it. I just wanted to know if someone else felt the way I do." He walks back to his family. The ship sounds its horn, a goodbye in the language of metal.',memory:"Admitted you would run, and learned that staying is braver.",effects:[{qualityId:"courage",add:15},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"hope",add:10}]},{id:"say_no_staying_is_right",label:"Tell him staying is the right choice",style:"connect",tone:"quiet",description:"We die where we are meant to die. The ocean is just another way to be alone.",consequence:'"That is what I think too," he says. "But everyone looks at me like I am giving up." You stand with him as the ship shrinks to a dot. "You are not giving up," you say. "You are choosing where to be. That is different." His shoulders relax. When his mother calls, he goes to her with lighter steps.',memory:"Gave a boy permission to stay when others were leaving.",effects:[{qualityId:"connection",add:20},{qualityId:"courage",add:10},{qualityId:"isolation",subtract:15}]},{id:"say_nothing",label:"Say nothing",style:"retreat",tone:"dark",description:"You do not know what you would do. You do not know anything.",consequence:'He waits for your answer, then realizes it is not coming. "Never mind," he mutters, and walks away. You have failed him—not by giving bad advice, but by refusing to engage with his question. The ship disappears. You stand alone on the beach, wondering what you should have said.',memory:"Failed a boy who needed guidance by offering silence.",effects:[{qualityId:"isolation",add:15},{qualityId:"despair",add:10},{qualityId:"courage",subtract:10}]}]},{id:"beach_message_in_bottle",title:"The Bottle",scene:'You find it wedged between rocks: green glass, corked, with paper inside. The message is dated three months ago: "If you find this, we made it to the island. Fish are plentiful. Hope is hard but we are trying. Tell our daughter we love her. Tell her we chose life." No name. No way to trace them. Just a message thrown into the dark, trusting someone would catch it.',baseSalience:44,requirements:[{qualityId:"hope",min:20}],locationIds:["beach"],tags:["beach","message","hope"],maxAppearances:1,branches:[{id:"try_to_find_daughter",label:"Try to find the daughter",style:"connect",tone:"bright",description:"Someone should deliver this. Someone should complete the circuit.",consequence:'You ask at the boardwalk, at the aid station, at the church. No one knows a girl with those parents. But word spreads. A week later, an old woman finds you: the grandmother. She weeps reading the note. "They made it," she says. "They really made it." You have carried hope across the impossible distance.',memory:"Delivered a message across an ocean to complete a family's story.",effects:[{qualityId:"connection",add:30},{qualityId:"hope",add:25},{qualityId:"collectiveHope",add:10},{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"energy",subtract:25}]},{id:"add_yown_message",label:"Add your own message and throw it back",style:"accept",tone:"quiet",description:"Continue the chain. Someone else might need to hear from you.",consequence:`"I found your parents' message," you write. "They made it. They chose life. I do not know who you are, but I am glad you exist. The sun is dying but I am still here, sending this to you." You hurl the bottle as far as you can. It disappears into the gray waves. The chain continues.`,memory:"Added your voice to a message in a bottle and returned it to the sea.",effects:[{qualityId:"connection",add:15},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"hope",add:15}]},{id:"keep_it_for_yourself",label:"Keep the message for yourself",style:"retreat",tone:"dark",description:"You need this hope more than some stranger does.",consequence:"You pocket the bottle. The daughter will never know. The parents' triumph stays with you alone—a secret warmth you carry. Is this theft or preservation? You tell yourself someone had to hold this truth. But when you look at the ocean, you feel the weight of an interrupted message, a voice that trusted the world and was failed.",memory:"Kept a stranger's hope for yourself and broke their trust.",effects:[{qualityId:"hope",add:10},{qualityId:"isolation",add:20},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"the_small_kindness",title:"The Small Kindness",scene:"A stranger needs something small: directions, a light, someone to hold their bag while they tie their shoe. They do not know the world is ending. Or maybe they do, and they are asking anyway. The request is trivial. The choice is not.",baseSalience:35,requirements:[],locationIds:void 0,tags:["universal","kindness","daily"],maxAppearances:3,branches:[{id:"help_generously",label:"Help with more than they asked",style:"connect",tone:"bright",description:"Give directions and walk with them. Offer your lighter and a conversation.",consequence:'They look surprised, then grateful. You walk together for a block, two strangers pretending the world is not ending. When you part, they say: "You made today better." You will never see them again, but you have added one small warmth to the cooling world.',memory:"Gave more than was asked and received gratitude in return.",effects:[{qualityId:"connection",add:15},{qualityId:"isolation",subtract:10},{qualityId:"hope",add:10}]},{id:"help_minimally",label:"Help exactly what they asked, no more",style:"accept",tone:"quiet",description:"Point the way. Hold the bag. Do your duty and move on.",consequence:"They thank you. You nod. The transaction is complete, fair, unremarkable. You have not added warmth to the world, but you have not taken any either. Sometimes neutrality is its own virtue. You continue your day, one small interaction lighter on your conscience.",memory:"Met a request with exactly what was needed, nothing more.",effects:[{qualityId:"familiarity",add:5},{qualityId:"energy",subtract:5}]},{id:"refuse_help",label:"Refuse",style:"retreat",tone:"dark",description:"You have your own burdens. The world is ending. Everyone should handle their own problems.",consequence:'Their face shifts from hope to resignation. They understand, or they think they do. "Sorry to bother you," they mutter. You walk away knowing you could have given sixty seconds of your time. You chose not to. In a dying world, this is the shape you are becoming.',memory:"Refused a small request and felt the world grow colder.",effects:[{qualityId:"isolation",add:15},{qualityId:"connection",subtract:10},{qualityId:"despair",add:5}]}]},{id:"the_moment_of_beauty",title:"Unexpected Beauty",scene:"It happens suddenly: light through glass, a stranger's laugh, a bird singing a song you did not know you remembered. For one moment, the ending does not matter. The beauty exists complete, whole, requiring nothing. You stand in it like a blessing.",baseSalience:40,requirements:[{qualityId:"despair",min:40}],locationIds:void 0,tags:["universal","beauty","transcendent"],maxAppearances:2,branches:[{id:"savor_completely",label:"Savor it completely",style:"accept",tone:"quiet",description:"Stop walking. Stop thinking. Let the beauty fill you until you are only sensation.",consequence:"Time stops. The world narrows to this: light, sound, the fact of being alive to witness. You do not think about the sun, the days remaining, the bodies you have worn. You are only here, only now, only grateful. When it passes, you are different—softer, somehow.",memory:"Was saved by beauty when despair was winning.",effects:[{qualityId:"despair",subtract:20},{qualityId:"hope",add:15},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"energy",subtract:10}]},{id:"try_to_capture_it",label:"Try to capture or share it",style:"connect",tone:"bright",description:"Point it out to someone. Take a photo. Make it permanent.",consequence:'You gesture to a passerby: "Look." They look. For a moment, you share the beauty, doubling it. They smile. "Thank you," they say. "I needed that." The bird flies away. The light changes. But you have made a small alliance against the dark, two people who saw something beautiful together.',memory:"Shared a moment of beauty and doubled its presence.",effects:[{qualityId:"connection",add:20},{qualityId:"isolation",subtract:15},{qualityId:"despair",subtract:10}]},{id:"reject_it",label:"Turn away from the beauty",style:"retreat",tone:"dark",description:"It is a trick. False hope. Beauty is just another thing that will die.",consequence:"You keep walking. The bird song fades behind you. You tell yourself you are being realistic, protecting yourself from disappointment. But something in you aches—the part that wanted to stop, to witness, to be grateful. You have chosen numbness over risk. The world is grayer now, and you did it to yourself.",memory:"Refused beauty because it was temporary.",effects:[{qualityId:"despair",add:15},{qualityId:"hope",subtract:15},{qualityId:"isolation",add:10}]}]},{id:"the_argument_overheard",title:"Words Through Walls",scene:"You hear them fighting—lovers, neighbors, strangers. The words are sharp, familiar: accusations about waste, about time, about love misspent. One voice breaks. The other goes silent. You stand in the corridor, invisible witness to a private collapse.",baseSalience:38,requirements:[{qualityId:"connection",min:25}],locationIds:void 0,tags:["universal","conflict","privacy"],maxAppearances:2,branches:[{id:"knock_and_intervene",label:"Knock and offer comfort",style:"connect",tone:"bright",description:"Break the fourth wall. Become present. Offer to listen.",consequence:'The door opens. Two faces—tear-stained, furious, surprised. "We are fine," one says automatically. But the other steps aside. "Actually," they say, "we are not fine." You sit with them. You do not solve anything. But you hold space for their pain, and that is enough.',memory:"Interrupted a private grief and was invited in.",effects:[{qualityId:"connection",add:25},{qualityId:"isolation",subtract:15},{qualityId:"energy",subtract:15}]},{id:"listen_and_move_on",label:"Listen silently, then move on",style:"accept",tone:"quiet",description:"Their fight is theirs. You are just a passing witness. Respect their privacy.",consequence:"You stand for a moment, honoring their pain with your attention. Then you walk on, carrying their words with you—an echo of someone else's ending. You will never know how it resolved. You are not meant to. Some stories belong only to those living them.",memory:"Witnessed a private collapse and respected its boundaries.",effects:[{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"fear",subtract:5}]},{id:"eavesdrop_greedily",label:"Stay and listen for ammunition",style:"retreat",tone:"dark",description:"Information is currency. Their pain might be useful.",consequence:"You memorize details: names, dates, betrayals. Later, you find one of them alone and mention what you know. The fear in their eyes is power. You have not helped them. You have not helped yourself. But for a moment, you felt in control of something, even if it was only someone else's shame.",memory:"Used someone's private pain as leverage.",effects:[{qualityId:"isolation",add:20},{qualityId:"connection",subtract:15},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"final_the_goodbye_letter",title:"The Unsent Letter",scene:"You find yourself writing. Not a confession, not a testament—just a goodbye. To everyone you have been. To everyone you will not become. The pen moves without your permission, saying things your voice never could. When you finish, you have a choice: burn it, send it, or keep it.",baseSalience:75,requirements:[{qualityId:"day",min:27},{qualityId:"hasConfessed",is:!1}],locationIds:void 0,tags:["final_days","confession","legacy"],maxAppearances:1,branches:[{id:"send_it_to_someone",label:"Send it to someone who knew this body",style:"connect",tone:"bright",description:"They deserve to know who they shared time with. They deserve to know you were here.",consequence:"You address the envelope with shaking hands. Drop it in the box. It will arrive after you are gone—after this body is dead, after the sun is dark. But they will know. They will read your words and understand that someone wore their loved one with care, with gratitude, with love.",memory:"Sent a letter that would arrive after the end.",effects:[{qualityId:"hasConfessed",setTrue:!0},{qualityId:"connection",add:30},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"collectiveHope",add:10}]},{id:"bury_it",label:"Bury it where only the earth will read it",style:"accept",tone:"quiet",description:"The words were for the writing, not the reading. Let the soil hold them.",consequence:"You dig with your hands in a garden, a park, a pot of soil. The paper goes in. You cover it. Someone might find it in a thousand years, if anyone is left. Or it will rot into the earth, becoming part of what comes next. Either way, you have spoken. That is enough.",memory:"Buried your words for the earth to keep.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"despair",subtract:15}]},{id:"burn_it_unread",label:"Burn it without reading it again",style:"retreat",tone:"dark",description:"The words are too raw. The vulnerability is too dangerous. Destroy the evidence.",consequence:"The flame eats your handwriting, your truths, your goodbye. You watch it curl and blacken. For a moment, you want to reach in and save it. Too late. The letter is ash. You are ash. Everything you had to say is smoke rising into the dying light. You tell yourself this was necessary. You are not sure you believe it.",memory:"Destroyed your own goodbye before it could be shared.",effects:[{qualityId:"isolation",add:25},{qualityId:"despair",add:20},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"final_the_last_meal",title:"The Shared Table",scene:'Someone has organized a dinner. Nothing special—canned goods, stale bread, wine from bottles they were saving. But the table is set with candles, with flowers stolen from parks, with napkins folded like origami. Twelve places. Twelve strangers. The host looks at you: "We are not family. But we could pretend for one night."',baseSalience:72,requirements:[{qualityId:"day",min:25},{qualityId:"connection",min:15}],locationIds:void 0,tags:["final_days","community","ritual"],maxAppearances:1,branches:[{id:"bring_something_to_share",label:"Bring what you have and share generously",style:"connect",tone:"bright",description:"Empty your pockets. Give your best. Make the feast real.",consequence:"You add your contribution: a chocolate bar, a packet of seeds, a story. The table grows richer. You sit between a doctor and a musician. You talk about everything except the end. When the candles burn low, you hold hands around the table—not praying, just holding. The family you invented holds you back.",memory:"Created a family from strangers for one last dinner.",effects:[{qualityId:"connection",add:40},{qualityId:"isolation",subtract:30},{qualityId:"collectiveHope",add:15},{qualityId:"energy",subtract:20}]},{id:"accept_the_hospitality",label:"Accept their food with gratitude",style:"accept",tone:"quiet",description:"You have nothing to give. Receive what is offered. Let them care for you.",consequence:'"Thank you for having me," you say, and mean it. They do not ask what you bring. They give anyway—bread, wine, attention. You eat slowly, tasting every bite as if it is the first and last. The conversation flows around you. You are a stone in a river, letting it wear you smooth. You are held without holding.',memory:"Received hospitality when you had nothing to offer.",effects:[{qualityId:"connection",add:25},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"despair",subtract:15}]},{id:"refuse_the_invitation",label:"Decline and eat alone",style:"retreat",tone:"dark",description:"False families are worse than real solitude. You will not pretend.",consequence:"You leave them to their candles. In your room, you eat cold food from a can. You tell yourself you are being honest, refusing sentimentality. But the silence is heavy. Down the hall, you hear their laughter. You have chosen your solitude. Now you must inhabit it fully.",memory:"Chose to eat alone rather than join the false family.",effects:[{qualityId:"isolation",add:30},{qualityId:"connection",subtract:20},{qualityId:"despair",add:15}]}]},{id:"final_night_falls",title:"The Last Light",scene:"This is it. Day 30. The final scene. The sun struggles on the horizon—smaller, weaker, but still there. For now. You stand in this borrowed body, in this borrowed life, and you face the end not as a concept but as a physical fact. The air tastes different. The shadows are longer. This is the last day. What will you do with it?",baseSalience:100,requirements:[{qualityId:"day",min:30}],locationIds:void 0,tags:["final_days","ending","day30"],maxAppearances:1,branches:[{id:"reach_out",label:"Spend it reaching out to everyone you can touch",style:"connect",tone:"bright",description:"Call everyone. Touch everyone. Leave love like breadcrumbs.",consequence:"You spend the day in a frenzy of connection. Strangers hugged. Friends called. Enemies forgiven. When the dark comes, you are exhausted, emptied, radiant. You have given everything. The last thing you feel is hands holding yours—many hands, the whole city, everyone you touched, touching you back.",memory:"Spent the last day spending love like currency.",effects:[{qualityId:"connection",add:50},{qualityId:"collectiveHope",add:20},{qualityId:"hasMadePeace",setTrue:!0}]},{id:"go_quietly",label:"Find a quiet place and simply be present",style:"accept",tone:"quiet",description:"No drama. No spectacle. Just breathe until the breathing stops.",consequence:"You find a window seat, a park bench, a bed with clean sheets. You sit. You breathe. You watch the light fade—not with fear, but with attention. This is how it ends: not with a bang, but with a witness. Someone was here. Someone saw. That is enough. The dark comes gentle, like sleep.",memory:"Witnessed the end with quiet attention.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"hasFoundPurpose",setTrue:!0},{qualityId:"despair",subtract:30}]},{id:"rage_rage",label:"Rage against the dying of the light",style:"retreat",tone:"dark",description:"Scream. Break things. Refuse to go gentle. Make them remember you were angry.",consequence:"You spend your last hours in fury. Windows smashed. Words screamed. The world will know you did not accept this. When the dark comes, you are still fighting it—fists raised against the inevitable. It does not change the ending. But it changes you. You die as you lived: unbowed, unbroken, alone.",memory:"Died raging against the dark.",effects:[{qualityId:"despair",add:30},{qualityId:"courage",add:20},{qualityId:"isolation",add:30}]}]},{id:"final_days_gathering",title:"The Gathering",scene:"People are coming together. Not for any purpose—just to be near each other. To share heat, share breath, share the final hours. You are invited.",baseSalience:70,requirements:[{qualityId:"day",min:25},{qualityId:"connection",min:20}],locationIds:void 0,tags:["final_days","community","endgame"],maxAppearances:1,branches:[{id:"join_and_share",label:"Join and share something true",style:"connect",tone:"bright",description:"Tell them who you are. What you have seen. The thirty lives.",consequence:"They listen. They believe, or they pretend to believe. It does not matter. For one evening, you are not alone, and you are known.",memory:"Was known and accepted in the final gathering.",effects:[{qualityId:"connection",add:40},{qualityId:"isolation",subtract:40},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"collectiveHope",add:15}]},{id:"observe_from_distance",label:"Observe from a distance",style:"accept",tone:"quiet",description:"You cannot join, but you can witness. You can remember them.",consequence:"You watch from the shadows. You memorize faces. When the dark comes, you will carry their images with you.",memory:"Witnessed the final gathering from shadows.",effects:[{qualityId:"connection",add:20},{qualityId:"hasFoundPurpose",setTrue:!0}]},{id:"reject_the_gathering",label:"Reject the gathering",style:"retreat",tone:"dark",description:"You do not need their comfort. You will face the end alone, as you have lived.",consequence:"You walk away. The sound of their voices fades. You have chosen solitude over connection, and the choice is final.",memory:"Chose solitude in the final hours.",effects:[{qualityId:"isolation",add:30},{qualityId:"connection",subtract:20},{qualityId:"despair",add:10}]}]}];function jm(u){return Pl.filter(h=>h.locationIds===void 0||h.locationIds.includes(u))}const Hm=[{id:"promise_made",title:"The Asked Promise",scene:'A stranger stops you on the street. Their hands shake. "I need someone to promise me something," they say. "If you see my daughter—she wears a red scarf, she works at the hospital—tell her I tried to make it right. Tell her the box is under the floorboard."',baseSalience:50,requirements:[],locationIds:void 0,tags:["chain","promise","universal"],maxAppearances:1,branches:[{id:"accept_promise",label:"Accept the burden",style:"connect",tone:"bright",description:"You meet their eyes and nod. You will carry this. You will find her.",consequence:'Their shoulders drop with relief. They press a key into your palm—cold, old, familiar. "Under the floorboard," they repeat, then walk away before you can ask their name. The burden is yours now.',memory:"Promised a stranger to find their daughter.",effects:[{qualityId:"connection",add:20},{qualityId:"energy",subtract:10}],createsEcho:"promise_to_daughter"},{id:"refuse_promise",label:"Refuse",style:"retreat",tone:"dark",description:"You have enough weight to carry. You cannot take on another dying wish.",consequence:'They nod, unsurprised. "I understand," they say, but their eyes say something else. They walk away, and you feel the judgment like a bruise you cannot see.',memory:"Refused to carry a dying wish.",effects:[{qualityId:"isolation",add:15},{qualityId:"despair",add:10}]},{id:"conditional_promise",label:"Promise to try, not to succeed",style:"accept",tone:"quiet",description:"You will do what you can. You cannot guarantee the message reaches her.",consequence:'"Trying is enough," they say. They give you the key anyway, and a scrap of paper with her name: Lila. You pocket both, wondering if you will remember.',memory:"Made a conditional promise, uncertain if it can be kept.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"connection",add:10},{qualityId:"fear",add:5}],createsEcho:"promise_to_daughter"}]},{id:"promise_encounter",title:"A Red Scarf",scene:"She works the desk at the hospital. The red scarf is unmistakable—wool, hand-knitted, fraying at the edges. She looks up as you approach, and you see her father's eyes. You have a choice: fulfill the promise now, or wait.",baseSalience:70,requirements:[{qualityId:"familiarity",min:10}],locationIds:["hospital"],requiresEcho:"promise_to_daughter",resolvesEcho:"promise_to_daughter",chainId:"the_promise",chainPosition:1,maxAppearances:1,tags:["chain","hospital","promise"],branches:[{id:"tell_her_now",label:"Tell her immediately, here in the lobby",style:"risk",tone:"bright",description:"She deserves to know. Even in public, even without context.",consequence:`You speak the words: her father's message, the box, the floorboard. She freezes. Then she weeps, right there at the desk. She reaches across and grips your hand. "Thank you for carrying him to me."`,memory:"Delivered a dying message in a hospital lobby.",effects:[{qualityId:"connection",add:30},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"collectiveHope",add:10}],createsEcho:"witness_to_grief"},{id:"wait_for_privacy",label:"Wait for her break, speak in private",style:"accept",tone:"quiet",description:"This deserves walls, silence, space for her to fall apart.",consequence:'You wait two hours. When she steps outside, you follow. You tell her everything. She asks, "Did he seem at peace?" You say yes. She goes back inside without another word, but her step is lighter.',memory:"Delivered a private message with care.",effects:[{qualityId:"connection",add:20},{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"courage",add:10}]},{id:"leave_without_speaking",label:"Leave without speaking",style:"retreat",tone:"dark",description:"You cannot carry this weight. Let someone else find her.",consequence:"You turn and walk away. The promise dies in your pocket. You tell yourself she will find out another way. The lies we tell ourselves are the most important ones.",memory:"Broke a promise by silence.",effects:[{qualityId:"isolation",add:25},{qualityId:"despair",add:15},{qualityId:"hasBurnedBridge",setTrue:!0}]}]},{id:"the_traveler_met",title:"The Passing Traveler",scene:'You meet them on the road—backpack worn, boots muddy, eyes fixed on a horizon. "I am walking the city," they say. "Collecting last words. If you have one, I will carry it."',baseSalience:45,requirements:[],locationIds:void 0,tags:["chain","traveler","universal"],maxAppearances:1,branches:[{id:"give_them_words",label:"Give them a message for someone you will never meet",style:"connect",tone:"bright",description:"Create a message. Let it be carried into the unknown.",consequence:'You speak for five minutes, or five seconds. They listen without writing. "I will remember," they say. "That is my function." They walk on.',memory:"Gave words to a traveling carrier.",effects:[{qualityId:"connection",add:15},{qualityId:"hasFoundPurpose",setTrue:!0}],createsEcho:"words_with_traveler"},{id:"ask_their_destination",label:"Ask where they are going",style:"accept",tone:"quiet",description:"Learn their path. Perhaps you will cross it again.",consequence:'"Where the sun is still shining," they say. "If you need me, walk that way too." They point toward the beach. You watch them until they are a speck.',memory:"Met a traveler walking toward the remaining light.",effects:[{qualityId:"familiarity",add:20},{qualityId:"hope",add:10}],createsEcho:"traveler_destination_known"},{id:"ignore_them",label:"Pass without speaking",style:"retreat",tone:"dark",description:"Another wanderer. The city is full of them now.",consequence:"You walk past. They do not call out. Two strangers, choosing separation. Later, you will wonder what you missed.",memory:"Passed a traveler in silence.",effects:[{qualityId:"isolation",add:10},{qualityId:"fear",add:5}]}]},{id:"the_traveler_found",title:"The Traveler Reappears",scene:'You did not expect to see them again, but here they are—same worn backpack, different mud. They recognize you. "You are the one who... yes. I have carried your words. Would you hear where they landed?"',baseSalience:65,requirements:[{qualityId:"day",min:5}],locationIds:void 0,requiresEcho:"words_with_traveler",chainId:"the_traveler",chainPosition:1,maxAppearances:1,tags:["chain","traveler","return"],branches:[{id:"hear_the_story",label:"Yes. Tell me where my words went.",style:"connect",tone:"bright",description:"Learn the fate of your message. See how far ripples travel.",consequence:"They tell you: a library, a stranger reading, tears, a decision made to call home after twenty years. Your words crossed the city and changed a life. You are connected now, linked by this traveler.",memory:"Learned that my words changed a stranger's life.",effects:[{qualityId:"connection",add:25},{qualityId:"hope",add:20},{qualityId:"hasFoundPurpose",setTrue:!0}],resolvesEcho:"words_with_traveler",createsEcho:"witness_to_ripples"},{id:"give_more_words",label:"Give them new words instead",style:"risk",tone:"quiet",description:"The past is past. What matters is what you say now.",consequence:'They listen to your new message. "Different," they say. "Heavier. But I will carry this too." They walk on, now doubly burdened.',memory:"Added more weight to the traveler's burden.",effects:[{qualityId:"connection",add:15},{qualityId:"despair",add:5}]},{id:"no_more_words",label:"Decline. Some things should stay unknown.",style:"accept",tone:"quiet",description:"Let the message exist without verification. Trust it found its mark.",consequence:'"The mystery is its own gift," they say. "I will keep walking." They leave you with the comfort of not knowing—the freedom of faith over fact.',memory:"Chose not to know where my words landed.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"courage",add:10}],resolvesEcho:"words_with_traveler"}]},{id:"echo_the_peace_left_behind",title:"A Familiar Calm",scene:"You wake in this new body and immediately know: you have been here before. Not you, exactly, but someone who wore you. The peace they made still hangs in the air. You can feel it—a softness, an acceptance.",baseSalience:40,requirements:[],locationIds:void 0,requiresEcho:"peace_made_here",echoSalienceBoost:30,maxAppearances:3,tags:["echo","peace","memory"],branches:[{id:"embrace_the_peace",label:"Embrace the calm they left",style:"accept",tone:"quiet",description:"Let their peace become yours. Build on what they built.",consequence:"You breathe deeply. The peace enters you—not yours originally, but yours now. You are a continuation. The chain of acceptance stretches backward and forward.",memory:"Inherited peace from a previous self.",effects:[{qualityId:"hasMadePeace",setTrue:!0},{qualityId:"despair",subtract:15},{qualityId:"hope",add:10}],resolvesEcho:"peace_made_here"},{id:"disrupt_the_peace",label:"Disrupt it with urgency",style:"risk",tone:"bright",description:"Peace is a luxury. There is work t y. Or as ready as anyone can be.","You wake not as a stranger, but as a traveler returning to a familiar road.","You wake with the count heavy in your mind. So few left now.","The transitions feel faster, as if time itself is accelerating toward the end.","You surface into consciousness already mourning the day's end.","This body feels more precious somehow, knowing how few remain.","You arrive with urgency, with the need to make this one matter.","The morning light seems dimmer than you remember, or perhaps it is just you.","You wake and immediately check: how many days? How many left to witness?","Each body now feels like a last chance at something you cannot name.","You are so many people, and soon you will be no one at all.","The transition hurts more now, or perhaps you are just more aware of the leaving.","You wake into a life that feels borrowed even by your borrowed standards.","The body you wear is breathing fast, as if they too sense the approaching end.","You arrive already calculating what can be done, what can be saved, what can be witnessed.","Another dawn, and you are running out of mornings to spend.","You wake with grief already present, anticipating the loss of this self you have not yet met.","The familiar disorientation is tinged now with desperation. Make it count.","You surface into someone else's final days, feeling the weight of that responsibility.","You have walked in so many skins. Soon you will walk in none.","The morning comes whether you are ready or not. You wake anyway.","You arrive as you have arrived before, but now you know: this is almost the end."],hp=[{id:"morning",label:"Morning",leadIns:["Dawn arrives cold and pale.","The first light crawls across concrete and glass.","The city wakes before it is ready.","Morning comes with a hesitation you can feel in your bones.","The sun struggles over the horizon, weaker than yesterday.","You open unfamiliar eyes to a room you do not recognize.","Consciousness arrives in fragments: a ceili
