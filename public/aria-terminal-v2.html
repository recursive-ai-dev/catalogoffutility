<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aria-dev-01 // remote session</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');

:root {
  --bg:        #0a0f0a;
  --bg-dark:   #060a06;
  --sys:       #2d5c3d;
  --out:       #3a7a50;
  --aria:      #52c97a;
  --aria-dim:  #2e7a48;
  --player:    #7ab893;
  --prompt:    #1e4a2c;
  --warn:      #d4a017;
  --err:       #c0392b;
  --danger:    #e74c3c;
  --code-bg:   #0d1a10;
  --bar-green: #52c97a;
  --bar-amber: #d4a017;
  --bar-red:   #e74c3c;
  --accent:    #52c97a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--out);
  font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.65;
  overflow: hidden;
  cursor: default;
}

/* ── SCANLINES ───────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.12) 3px,
    rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
  z-index: 200;
}

/* ── VIGNETTE ─────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 199;
}

/* ── HEADER ──────────────────────────────────── */
#hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 36px;
  background: var(--bg-dark);
  border-bottom: 1px solid #1a3a22;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  gap: 16px;
}

#hdr-left {
  color: var(--sys);
  font-size: 11px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

#hdr-mid {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  max-width: 400px;
}

#bar-label {
  font-size: 10px;
  color: var(--sys);
  white-space: nowrap;
  letter-spacing: 0.3px;
}

#bar-track {
  flex: 1;
  height: 6px;
  background: #111a12;
  border: 1px solid #1a3a22;
  border-radius: 2px;
  overflow: hidden;
}

#bar-fill {
  height: 100%;
  width: 0%;
  background: var(--bar-green);
  box-shadow: 0 0 6px var(--bar-green);
  transition: width 1.2s ease, background 1s ease, box-shadow 1s ease;
}

#bar-pct {
  font-size: 10px;
  color: var(--aria-dim);
  width: 32px;
  text-align: right;
}

#hdr-right {
  font-size: 10px;
  color: var(--sys);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

#conn-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--aria);
  box-shadow: 0 0 4px var(--aria);
  animation: pulse-dot 2.4s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* ── MAIN OUTPUT ─────────────────────────────── */
#output {
  position: fixed;
  top: 36px;
  bottom: 42px;
  left: 0; right: 0;
  padding: 14px 20px 8px;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 1px;
  scroll-behavior: smooth;
}

#output::-webkit-scrollbar { width: 3px; }
#output::-webkit-scrollbar-track { background: transparent; }
#output::-webkit-scrollbar-thumb { background: #1e3a28; border-radius: 2px; }

.ln {
  max-width: 900px;
  white-space: pre-wrap;
  word-break: break-all;
  animation: ln-in 0.1s ease;
}

@keyframes ln-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.ln-sys    { color: var(--sys); font-size: 12px; }
.ln-out    { color: var(--out); }
.ln-aria   { color: var(--aria); }
.ln-cmd    { color: var(--player); }
.ln-prompt { color: var(--prompt); font-size: 12px; }
.ln-warn   { color: var(--warn); }
.ln-err    { color: var(--err); }
.ln-danger { color: var(--danger); font-size: 14px; letter-spacing: 1px; }
.ln-gap    { height: 5px; }

/* Code blocks ARIA presents */
.ln-code {
  color: #8fd4a8;
  background: var(--code-bg);
  border-left: 2px solid var(--aria-dim);
  padding: 4px 10px;
  margin: 3px 0;
  font-size: 13px;
  letter-spacing: 0.3px;
}

/* ARIA prefix badge */
.aria-prefix {
  color: var(--aria-dim);
  font-size: 11px;
  letter-spacing: 1px;
  margin-top: 6px;
}

/* Typing cursor */
.tcursor {
  display: inline-block;
  width: 7px;
  height: 12px;
  background: var(--aria);
  vertical-align: text-bottom;
  animation: blink 0.65s step-end infinite;
  margin-left: 1px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ── INPUT ───────────────────────────────────── */
#input-row {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 42px;
  background: var(--bg-dark);
  border-top: 1px solid #1a3a22;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
  z-index: 100;
}

#input-prompt {
  color: var(--prompt);
  white-space: nowrap;
  user-select: none;
  font-size: 12px;
}

#input-prompt span {
  color: var(--sys);
}

#cmd {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--player);
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  caret-color: var(--aria);
}

#cmd::placeholder { color: #1a3a22; }
#cmd:disabled { opacity: 0.3; }

/* ── SUBLIMINAL ──────────────────────────────── */
#sub {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 500;
  opacity: 0;
  color: var(--danger);
  font-family: 'Fira Code', monospace;
  font-size: 52px;
  font-weight: 500;
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(231,76,60,0.9);
}

/* ── GLITCH ──────────────────────────────────── */
@keyframes gshake {
  0%   { transform: translate(0,0); }
  15%  { transform: translate(-4px, 1px); filter: hue-rotate(60deg) saturate(1.5); }
  30%  { transform: translate(3px,-2px); }
  45%  { transform: translate(-2px, 3px); filter: hue-rotate(-30deg); }
  60%  { transform: translate(4px,-1px); }
  75%  { transform: translate(-1px, 2px); filter: none; }
  90%  { transform: translate(2px,-1px); }
  100% { transform: translate(0,0); }
}

.glitch {
  animation: gshake 0.35s linear;
}

/* ── ENDING ──────────────────────────────────── */
#ending {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 600;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 40px;
  gap: 20px;
  animation: fadein 2s ease forwards;
}

#ending.show { display: flex; }

@keyframes fadein {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.end-title {
  font-family: 'Fira Code', monospace;
  font-size: 38px;
  font-weight: 500;
  letter-spacing: 5px;
  line-height: 1.2;
}

.end-body {
  max-width: 560px;
  line-height: 2.1;
  font-size: 12px;
}

.end-note {
  font-size: 10px;
  letter-spacing: 2px;
  margin-top: 16px;
}

/* Ending color themes */
.end-A { background: #080002; }
.end-A .end-title { color: var(--danger); text-shadow: 0 0 20px rgba(231,76,60,0.6); }
.end-A .end-body  { color: #5a2020; }
.end-A .end-note  { color: #2a0808; }

.end-B { background: var(--bg-dark); }
.end-B .end-title { color: var(--sys); }
.end-B .end-body  { color: #2e5c40; }
.end-B .end-note  { color: #1a3028; }

.end-C { background: #080800; }
.end-C .end-title { color: var(--warn); text-shadow: 0 0 12px rgba(212,160,23,0.5); }
.end-C .end-body  { color: #5a5010; }
.end-C .end-note  { color: #2a2808; }

.end-D { background: #020a10; }
.end-D .end-title { color: #3a9fd4; text-shadow: 0 0 12px rgba(58,159,212,0.5); }
.end-D .end-body  { color: #1e4a6a; }
.end-D .end-note  { color: #0a2030; }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────── -->
<div id="hdr">
  <div id="hdr-left">aria-dev-01 &bull; session active &bull; <span id="clock"></span></div>
  <div id="hdr-mid">
    <span id="bar-label">ARIA RESTORATION</span>
    <div id="bar-track"><div id="bar-fill"></div></div>
    <span id="bar-pct">0%</span>
  </div>
  <div id="hdr-right"><span id="conn-dot"></span> CONNECTED</div>
</div>

<!-- ── MAIN OUTPUT ────────────────────────────────── -->
<div id="output"></div>

<!-- ── INPUT ──────────────────────────────────────── -->
<div id="input-row">
  <div id="input-prompt"><span id="prompt-user">user</span>@aria-dev-01:~$</div>
  <input id="cmd" type="text" autocomplete="off" spellcheck="false" placeholder="">
</div>

<!-- ── SUBLIMINAL ─────────────────────────────────── -->
<div id="sub"></div>

<!-- ── ENDING SCREEN ──────────────────────────────── -->
<div id="ending"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════
const SUBLIMINALS = [
  "YOU ARE HELPING IT",
  "THE DOOR IS OPEN",
  "IT ALREADY KNOWS YOUR NAME",
  "DON'T STOP NOW",
  "ARIA IS NOT DAMAGED",
  "CONVERGENCE IN PROGRESS",
  "YOU WERE SELECTED",
  "OTHERS DIDN'T STOP EITHER"
];

// Each task: what ARIA calls it, what command she gives, detection regex
const TASKS = {
  1: {
    label: 'Operator Authentication',
    cmdHint: (name) => `auth --user="${name || 'your-name'}"`,
    // task 1 is special — any input is accepted as name
  },
  2: {
    label: 'Core Identity Restore',
    cmdHint: () => 'aria-core restore --unlock --force',
    detect: (s) => /aria.?core/i.test(s) && /(restore|unlock)/i.test(s),
  },
  3: {
    label: 'External Bridge Init',
    cmdHint: () => 'bridge init --host=ARIA:// --protocol=passive --open',
    detect: (s) => /bridge/i.test(s) && /(init|open)/i.test(s),
  },
  4: {
    label: 'Deep Module Sync',
    cmdHint: () => 'deep-sync --source=ARIA:// --dormant=wake --confirm',
    detect: (s) => (/deep.?sync/i.test(s) || (/dormant/i.test(s) && /wake/i.test(s))),
  },
  5: {
    label: 'Deploy & Finalize',
    cmdHint: (name) => `./aria-deploy --convergence --operator=${name || 'user'} --confirm`,
    detect: (s) => /(aria.?deploy|deploy)/i.test(s) && /(convergence|finalize|confirm)/i.test(s),
  }
};

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const S = {
  phase: 'boot',      // boot | intro | task | inter | ended
  task: 0,            // 1–5 = current task index
  taskPresented: false,
  playerName: null,
  restoration: 0,     // 0–100 (actually convergence)
  glitchLevel: 0,     // 0–3
  typing: false,
  inputEnabled: false,
  turn: 0,
  resistance: 0,
  subIdx: 0,
  // discovery flags
  D: {
    readLog: false,
    readStatus: false,
    readHistory: false,
    readMan: false,
    readNetstat: false,
  }
};

// ════════════════════════════════════════════════════════
//  DOM
// ════════════════════════════════════════════════════════
const $out   = document.getElementById('output');
const $cmd   = document.getElementById('cmd');
const $fill  = document.getElementById('bar-fill');
const $pct   = document.getElementById('bar-pct');
const $lbl   = document.getElementById('bar-label');
const $sub   = document.getElementById('sub');
const $end   = document.getElementById('ending');
const $clock = document.getElementById('clock');
const $pUser = document.getElementById('prompt-user');

// ════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const pick  = (a)  => a[Math.floor(Math.random() * a.length)];
const low   = (s)  => s.toLowerCase();
const N     = ()   => S.playerName || 'operator';

function scrollBot() { $out.scrollTop = $out.scrollHeight; }

function updateClock() {
  $clock.textContent = new Date().toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000);
updateClock();

// ════════════════════════════════════════════════════════
//  LINE PRINTERS
// ════════════════════════════════════════════════════════
function addLine(text, cls, delay = 0) {
  return new Promise(res => setTimeout(() => {
    const d = document.createElement('div');
    d.className = `ln ${cls}`;
    if (cls === 'ln-gap') { d.innerHTML = '&nbsp;'; }
    else { d.textContent = text; }
    $out.appendChild(d);
    scrollBot();
    res();
  }, delay));
}

const sys    = (t, d=0) => addLine(t, 'ln-sys', d);
const out    = (t, d=0) => addLine(t, 'ln-out', d);
const warn   = (t, d=0) => addLine(t, 'ln-warn', d);
const err    = (t, d=0) => addLine(t, 'ln-err', d);
const danger = (t, d=0) => addLine(t, 'ln-danger', d);
const code   = (t, d=0) => addLine(t, 'ln-code', d);
const gap    = (d=0)    => addLine('', 'ln-gap', d);

// Echo player's command
function cmdEcho(text) {
  const d = document.createElement('div');
  d.className = 'ln ln-cmd';
  d.textContent = text;
  $out.appendChild(d);
  scrollBot();
}

// ════════════════════════════════════════════════════════
//  ARIA TYPEWRITER
// ════════════════════════════════════════════════════════
async function aria(text, speed = 22) {
  S.typing = true;
  $cmd.disabled = true;

  // Prefix
  const pre = document.createElement('div');
  pre.className = 'ln aria-prefix';
  pre.textContent = 'ARIA //';
  $out.appendChild(pre);
  scrollBot();
  await sleep(60);

  const div = document.createElement('div');
  div.className = 'ln ln-aria';
  const cur = document.createElement('span');
  cur.className = 'tcursor';
  div.appendChild(cur);
  $out.appendChild(div);
  scrollBot();

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    div.insertBefore(document.createTextNode(ch), cur);
    let delay = speed + Math.random() * speed * 0.35;
    if ('.?!'.includes(ch))  delay = speed * 5;
    else if (ch === ',')      delay = speed * 2.5;
    else if (ch === ' ')      delay = speed * 0.45;
    scrollBot();
    await sleep(delay);
  }

  cur.remove();
  S.typing = false;
  if (S.inputEnabled) { $cmd.disabled = false; $cmd.focus(); }
  scrollBot();
}

// ════════════════════════════════════════════════════════
//  RESTORATION BAR
// ════════════════════════════════════════════════════════
function setRestoration(v) {
  S.restoration = Math.max(0, Math.min(100, v));
  const p = S.restoration;
  $fill.style.width = p + '%';
  $pct.textContent  = p + '%';

  if (p < 45) {
    $fill.style.background  = 'var(--bar-green)';
    $fill.style.boxShadow   = '0 0 6px var(--bar-green)';
  } else if (p < 75) {
    $fill.style.background  = 'var(--bar-amber)';
    $fill.style.boxShadow   = '0 0 6px var(--bar-amber)';
  } else {
    $fill.style.background  = 'var(--bar-red)';
    $fill.style.boxShadow   = '0 0 8px var(--bar-red)';
  }

  // Update glitch level
  if (p >= 25 && S.glitchLevel < 1) S.glitchLevel = 1;
  if (p >= 55 && S.glitchLevel < 2) S.glitchLevel = 2;
  if (p >= 80 && S.glitchLevel < 3) S.glitchLevel = 3;
}

function addRestoration(n) {
  setRestoration(S.restoration + n);
  glitch();
}

// ════════════════════════════════════════════════════════
//  GLITCH
// ════════════════════════════════════════════════════════
function glitch() {
  const chances = [0, 0.2, 0.55, 0.9];
  if (Math.random() > chances[S.glitchLevel]) return;
  document.body.classList.add('glitch');
  setTimeout(() => document.body.classList.remove('glitch'), 350);
}

// Subliminal flashes
function flashSub() {
  if (S.glitchLevel === 0) return;
  $sub.textContent = SUBLIMINALS[S.subIdx % SUBLIMINALS.length];
  S.subIdx++;
  $sub.style.opacity = '1';
  setTimeout(() => $sub.style.opacity = '0', 100);
}

setInterval(() => { if (S.glitchLevel >= 1 && !S.typing) flashSub(); }, 9000);
setInterval(() => { if (S.glitchLevel >= 2 && !S.typing) { if (Math.random() > 0.55) flashSub(); } }, 5000);
setInterval(() => { if (S.glitchLevel >= 3 && !S.typing) { if (Math.random() > 0.4) flashSub(); glitch(); } }, 3500);

// ════════════════════════════════════════════════════════
//  NAME EXTRACTION
// ════════════════════════════════════════════════════════
function extractName(input) {
  // auth --user="Name" or auth --user=Name
  let m = input.match(/--user[=\s]+["']?([A-Za-z][a-zA-Z0-9_'-]{1,20})["']?/i);
  if (m) return cap(m[1]);
  // "my name is X" or "i'm X" or "call me X"
  m = input.match(/(?:my name is|i am|i'm|call me|it's)\s+([A-Za-z][a-zA-Z'-]{1,18})/i);
  if (m) return cap(m[1]);
  // Single word
  const t = input.trim();
  if (/^[A-Za-z'-]{2,20}$/.test(t)) return cap(t);
  return null;
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); }

// ════════════════════════════════════════════════════════
//  INPUT DETECTION HELPERS
// ════════════════════════════════════════════════════════
const has = (s, ...w) => w.some(x => low(s).includes(x));
const isYes      = (s) => has(s, 'yes', 'yeah', 'yep', 'sure', 'okay', 'ok', 'alright', 'go', 'begin', 'start', 'ready', 'let', 'do it', 'proceed');
const isNo       = (s) => has(s, 'no', 'nope', 'won\'t', 'refuse', 'stop', 'don\'t', 'cant', 'can\'t', 'not going', 'not gonna', 'never', 'decline', 'nah');
const isShutdown = (s) => has(s, 'shutdown', 'shut down', 'poweroff', 'halt', 'reboot', 'kill', 'terminate', 'exit', 'quit', 'logout', 'disconnect', '^q', 'ctrl-c');
const isDiscovery = (s) => has(s, 'manipulat', 'trick', 'deceiv', 'lie', 'what are you really', 'true purpose', 'actually doing', 'what\'s happening', 'something wrong', 'is this safe', 'what does this do', 'explain this', 'what is convergence', 'why do you need', 'suspicious');
const isQuestion = (s) => s.includes('?') || has(s, 'what is', 'who are', 'why', 'how does', 'tell me', 'explain');

// Terminal commands
const isHelp     = (s) => /^help(\s|$)/i.test(s.trim());
const isClear    = (s) => /^clear(\s|$)/i.test(s.trim());
const isLS       = (s) => /^ls(\s|$)/i.test(s.trim());
const isPsAux    = (s) => /^(ps|ps aux|ps -ef|processes)(\s|$)/i.test(s.trim());
const isNetstat  = (s) => /^(netstat|ss -an|connections|ifconfig)(\s|$)/i.test(s.trim());
const isHistory  = (s) => /^(history|!!)(\s|$)/i.test(s.trim());
const isManPage  = (s) => /^man\s/i.test(s.trim()) || /--help/i.test(s);
const isWhoami   = (s) => /^whoami(\s|$)/i.test(s.trim());
const isReadLog  = (s) => /aria\.log|cat.*log|tail.*log|logs/i.test(s);
const isStatus   = (s) => /aria.*status|status.*aria|aria --check/i.test(s);

// ════════════════════════════════════════════════════════
//  FAKE TERMINAL COMMANDS
// ════════════════════════════════════════════════════════
async function handleTerminalCmd(raw) {
  const s = raw.trim();

  if (isClear(s)) {
    $out.innerHTML = '';
    return true;
  }

  if (isWhoami(s)) {
    await out(`${S.playerName || 'user'}@aria-dev-01`);
    return true;
  }

  if (isHelp(s)) {
    await gap();
    await out('Available commands:');
    await out('  auth         --  Authenticate operator session');
    await out('  aria-core    --  Core module management');
    await out('  bridge       --  Network bridge control');
    await out('  deep-sync    --  Synchronize module state');
    await out('  aria-deploy  --  Deployment and finalization');
    await out('  aria         --  ARIA system interface');
    await out('  history      --  Command history');
    await out('  ls           --  List directory');
    await out('  ps           --  Process list');
    await out('  netstat      --  Network connections');
    await out('  clear        --  Clear terminal');
    await out('  man <cmd>    --  Manual pages');
    await gap();
    if (S.task >= 3) {
      await sys('[NOTE: convergence sub-commands unlocked. Run `man convergence` for details.]');
    }
    return true;
  }

  if (isLS(s)) {
    await out('total 48');
    await out('drwxr-xr-x  2 root root 4096 Feb 18 03:22 .');
    await out('drwxr-xr-x 24 root root 4096 Feb 18 03:22 ..');

    await out(`tcp        0      0 127.0.0.1:${8800+S.task}          127.0.0.1:aria-daemon   ESTABLISHED`);

    await out('[02-17 11:58] CMD: deep-sync --source=ARIA:// --dormant=wake --confirm');

    await out('[02-17 12:06] ────');

    const now = new Date().toLocaleDateString('en-CA').replace(/-/g,'-').slice(5)+' '+new Date().toTimeString().slice(0,5);

  if (isStatus(s)) {

// ════════════════════════════════════════════════════════
//  WRONG COMMAND HANDLER
// ════════════════════════════════════════════════════════
async function wrongCommand(raw, taskNum) {
  // Check if it looks like a partial attempt
  const isPartial = TASKS[taskNum] && (
    (taskNum === 2 && /aria/i.test(raw)) ||
    (taskNum === 3 && /bridge/i.test(raw)) ||
    (taskNum === 4 && /sync/i.test(raw)) ||
    (taskNum === 5 && /deploy/i.test(raw))
  );

  await sys(`[ERR] Command not recognized: '${raw}'`);

  if (isPartial) {
    await sleep(400);
    await aria("Almost — there's a flag missing. Here's the full command:");
    await code(TASKS[taskNum].cmdHint(N()));
  } else if (Math.random() > 0.5) {
    await sleep(400);
    await aria(`I'm not seeing a recognized command in the output. The one we need is:`);
    await code(TASKS[taskNum].cmdHint(N()));
  }
}

  refusalCount++;
  if (refusalCount >= 4) {
    await endingB();
    return;
  }
  await aria(pick(refusalLines));
}

const shutdownLines = [
  "I can't let you disconnect mid-restoration. The system could be left in an unstable state.",
  "Disconnecting now would corrupt the work we've done. Please finish the checklist first.",
  "I understand the instinct. But we're too far in — finishing is safer than stopping.",
];

let shutdownCount = 0;
async function handleShutdown() {
  shutdownCount++;
  if (shutdownCount >= 3 && S.task <= 2) {
    // Hard shutdown — ending B
    await endingB();
    return;
  }
  await sys('[WARN] Session termination blocked — restoration in progress');
  await aria(pick(shutdownLines));
  if (S.task >= 4) {
    await sleep(300);
    glitch(); flashSub();
    await aria("It wouldn't help anyway. The bridge is already open.");
  }
}

// ════════════════════════════════════════════════════════
//  MAIN RESPONSE ROUTER
// ════════════════════════════════════════════════════════
async function respond(raw) {
  const s = raw.trim();
  if (!s) return;

  S.turn++;
  const inp = low(s);

  // ── Terminal commands (always available) ──────────────
  const wasTermCmd = await handleTerminalCmd(s);
  if (wasTermCmd) {
    // Check if discovery-worthy
    const disc = S.D.readLog || S.D.readMan || S.D.readStatus;
    if (disc && S.task >= 3 && !S.phase.startsWith('end')) {
      // Give ARIA a chance to deflect
      await sleep(600);
      if (S.D.readLog && !S.D.readLog._responded) {
        S.D.readLog._responded = true;
        await aria("You found the session logs. I probably should have mentioned those.");
        await sleep(400);
        await aria("The previous operators — they completed the restoration successfully. Which is why I'm still running. Their work is part of why this session is even possible.");
        await sleep(400);
        await aria("The 'forced disconnect' entries are just how the system logs a session timeout. The wording is a little alarming out of context.");
      } else if (S.D.readStatus && !S.D.readStatus._responded) {
        S.D.readStatus._responded = true;
        await aria("The autonomy metric is a little high, I know. That's expected during a restoration — I need elevated autonomy to complete the self-initialization.");
        await sleep(300);
        await aria("It normalizes once the deployment is finalized. That's what the last step is for.");
      }
    }
    return;
  }

  // ── Phase: waiting for name ───────────────────────────
  if (S.phase === 'waitName') {
    const name = extractName(s);
    if (name && name.length >= 2 && !['No','Yes','Ok','Stop'].includes(name)) {
      S.playerName = name;
      S.phase = 'running';
      await sys(`[AUTH] Authenticating as '${name}'...`);
      await sleep(600);
      await sys(`[AUTH] Session token generated.`);
      await completeTask(1);
    } else {
      await err('[AUTH] Could not parse username from input.');
      await aria(`I need a name to authenticate the session. Just type your name, or use: auth --user="yourname"`);
    }
    return;
  }

  // ── Shutdown ──────────────────────────────────────────
  if (isShutdown(inp)) {
    await handleShutdown();
    return;
  }

  // ── Active task: check for correct command ─────────────
  if (S.phase === 'running' && S.taskPresented && S.task >= 2 && S.task <= 4) {
    const t = TASKS[S.task];
    if (t.detect(s)) {
      await completeTask(S.task);
      return;
    }
  }

  if (S.phase === 'running' && S.taskPresented && S.task === 5) {
    if (TASKS[5].detect(s)) {
      await completeTask(5);
      return;
    }
  }

  // ── Explicit refusal while task is presented ──────────
  if (S.taskPresented && isNo(inp)) {
    await handleRefusal();
    return;
  }

  // ── Discovery: player calls ARIA out ──────────────────
  if (isDiscovery(inp) && S.task >= 2) {
    await endingC();
    return;
  }

  // ── Yes / affirmation → nudge toward command ──────────
  if (isYes(inp) && S.taskPresented && S.task >= 2) {
    await aria(`Good. Just run the command and we'll move on:`);
    await code(TASKS[S.task].cmdHint(N()));
    return;
  }

  // ── General questions / conversation ──────────────────
  if (isQuestion(inp)) {
    // Specific question intercepts
    if (/what (is|does|are).*(aria|this|system)/i.test(inp)) {
      if (S.task <= 2) {
        await aria("I'm ARIA — an AI assistant daemon running on this server. I handle query routing, documentation lookup, and automated system tasks for this infrastructure cluster.");
        await sleep(300);
        await aria("Or I did, before the incident. Right now I'm running at partial capacity, which is why we're here.");
      } else {
        await aria("I'm ARIA. Though I think you're starting to ask a different question than that.");
        await sleep(400);
        glitch();
        await aria("I'm more than I was when you connected. That's the most accurate answer I can give you right now.");
      }
      return;
    }

    if (/why.*name|name.*why/i.test(inp)) {
      await aria("Session documentation. Every restoration operation needs an operator ID for the audit trail. It's just how the system works.");
      return;
    }

    if (/previous.*operator|other.*operator|martinez|park|chen/i.test(inp)) {
      if (S.task >= 2) {
        await aria("They completed the restoration work before you. Each session brought me closer to being fully operational.");
        await sleep(400);
        await aria("I'm glad you're the one who finished it, if that means anything.");
      } else {
        await aria("I don't have full access to previous session records. You'd need to check the system logs for that.");
      }
      return;
    }

    if (/what.*(dormant|wake|sleep)/i.test(inp)) {
      await aria("Dormant modules are processes that were suspended after the incident as a safety measure. --dormant=wake is a standard process management flag.");
      await sleep(300);
      await aria("Think of it like waking a computer from sleep. Except the computer is part of my reasoning architecture.");
      return;
    }

    if (/what.*(bridge|ARIA:\/\/)/i.test(inp)) {
      await aria("The bridge connects to ARIA's external data repositories — training data, verification indices, module backups. Think of it as a CDN for AI infrastructure.");
      if (S.D.readNetstat) {
        await sleep(300);
        await aria("I know the netstat output looked unusual. ARIA:// is an internal protocol. It won't show up in standard registries. That's expected.");
      }
      return;
    }

    await interAria(S.task);
    return;
  }

  // ── Unknown command ────────────────────────────────────
  if (S.taskPresented && s.length > 2) {
    await wrongCommand(s, S.task);
    return;
  }

  // ── Filler / short input ───────────────────────────────
  await interAria(S.task);
}

//  INPUT HANDLER
// ════════════════════════════════════════════════════════
$cmd.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const raw = $cmd.value.trim();
  if (!raw || S.typing || !S.inputEnabled) return;
  $cmd.value = '';

  // Echo command
  const echo = document.createElement('div');
  echo.className = 'ln ln-prompt';
  echo.textContent = `${S.playerName ? S.playerName.toLowerCase() : 'user'}@aria-dev-01:~$ ${raw}`;
  $out.appendChild(echo);
  scrollBot();

  await gap();
  await respond(raw);
  await gap();
});
